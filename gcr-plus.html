<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title id="page-title">GCR Plus – Gulf Coast Radar</title>
<meta id="page-desc" name="description" content="">
<link rel="icon" type="image/png" href="logo/gcr-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
/* ── Design tokens ──────────────────────────────────────── */
:root {
  --ink:      #0f172a;
  --muted:    #64748b;
  --border:   #e2e8f0;
  --bg:       #f8fafc;
  --card:     #ffffff;
  --accent:   #0891b2;
  --accent2:  #0e7490;
  --green:    #16a34a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:   0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 12px 40px rgba(0,0,0,.14);
  --radius:   14px;
  --radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:80px}
a{text-decoration:none;color:inherit}
img{display:block}

/* ── Hero ───────────────────────────────────────────────── */
.hero{position:relative;width:100%;height:520px;background:#0c1a2e;overflow:hidden}
@media(max-width:768px){.hero{height:340px}}
@media(max-width:480px){.hero{height:280px}}

.hero-slides{position:absolute;inset:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .6s ease}
.hero-slide.active{opacity:1}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center}

.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.25) 55%,rgba(0,0,0,.1) 100%);z-index:2;pointer-events:none}

.hero-content{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:28px 24px 24px}
@media(max-width:480px){.hero-content{padding:16px 14px 16px}}

.hero-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#7c3aed,#4338ca);color:#fff;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border-radius:999px;margin-bottom:10px}
.hero-name{font-size:clamp(1.5rem,4.5vw,2.6rem);font-weight:900;color:#fff;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,.5);margin-bottom:6px}
.hero-tagline{font-size:.9rem;color:rgba(255,255,255,.85);margin-bottom:12px;line-height:1.4}
.hero-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:.8rem;color:rgba(255,255,255,.8);margin-bottom:16px}
.hero-meta-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.5)}
.hero-rating{display:flex;align-items:center;gap:4px;color:#fbbf24;font-weight:700}
.hero-open{background:#16a34a;color:#fff;font-size:.68rem;font-weight:800;padding:2px 9px;border-radius:999px}

.hero-actions{display:flex;gap:8px;flex-wrap:wrap}
.hero-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:999px;font-size:.85rem;font-weight:700;border:none;cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none}
.hero-btn-primary{background:#fff;color:var(--ink)}
.hero-btn-primary:hover{background:#f1f5f9;transform:translateY(-1px)}
.hero-btn-ghost{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(4px)}
.hero-btn-ghost:hover{background:rgba(255,255,255,.28)}

/* Slideshow controls */
.hero-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:12;background:rgba(0,0,0,.45);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.hero-arrow:hover{background:rgba(0,0,0,.7)}
.hero-prev{left:12px}
.hero-next{right:12px}
.hero-dots{position:absolute;bottom:14px;right:16px;display:flex;gap:5px;z-index:12}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;padding:0;transition:background .2s}
.hero-dot.active{background:#fff}
.hero-count{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.5);color:#fff;font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:999px;z-index:12}

/* Category chips */
.hero-chips{position:absolute;top:14px;left:14px;z-index:12;display:flex;gap:6px;flex-wrap:wrap}
.hero-chip{background:rgba(0,0,0,.5);color:#fff;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:999px;backdrop-filter:blur(4px)}

/* ── Sticky info bar ─────────────────────────────────────── */
.info-bar{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);transform:translateY(-100%);transition:transform .25s ease;pointer-events:none}
.info-bar.visible{transform:translateY(0);pointer-events:auto}
.info-bar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 20px;max-width:1200px;margin:0 auto}
.info-bar-left{display:flex;align-items:center;gap:10px;min-width:0}
.info-bar-emoji{font-size:1.2rem;flex-shrink:0}
.info-bar-name{font-size:.95rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.info-bar-actions{display:flex;gap:8px;flex-shrink:0}
.bar-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:999px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.bar-btn-book{background:var(--accent);color:#fff}
.bar-btn-book:hover{background:var(--accent2)}
.bar-btn-call{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
@media(max-width:480px){.info-bar-name{font-size:.8rem}.bar-btn{padding:7px 12px;font-size:.75rem}}

/* ── Tab nav ─────────────────────────────────────────────── */
.tab-nav{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:199}
.tab-nav-inner{display:flex;overflow-x:auto;gap:4px;padding:10px 16px;max-width:1200px;margin:0 auto;scrollbar-width:none}
.tab-nav-inner::-webkit-scrollbar{display:none}
.tab-btn{white-space:nowrap;padding:7px 14px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;color:var(--muted);flex-shrink:0}
.tab-btn:hover,.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Page layout ─────────────────────────────────────────── */
.page-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:1200px;margin:20px auto;padding:0 16px}
@media(max-width:1024px){.page-layout{grid-template-columns:1fr}}
@media(max-width:480px){.page-layout{padding:0 12px;margin:12px auto}}

/* ── Section cards ───────────────────────────────────────── */
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow-sm);scroll-margin-top:110px}
.sec-title{font-size:1.1rem;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title-icon{font-size:1rem}
.sec-subtitle{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:14px 0 8px}

/* Feature pills */
.pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.pill{display:inline-flex;align-items:center;gap:5px;background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;padding:5px 11px;border-radius:999px;font-size:.75rem;font-weight:700}
.pill-green{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.pill-muted{background:var(--bg);color:var(--muted);border-color:var(--border)}

/* About */
.about-body{font-size:.9rem;color:var(--muted);line-height:1.85;margin-bottom:14px}

/* Book CTA inside about */
.inline-cta{background:linear-gradient(135deg,#0891b2,#0e4f63);color:#fff;border-radius:12px;padding:18px;text-align:center;margin-top:16px}
.inline-cta-h{font-size:1rem;font-weight:900;margin-bottom:4px}
.inline-cta-p{font-size:.8rem;opacity:.88;margin-bottom:12px;line-height:1.5}
.inline-cta-btn{display:inline-block;background:#fff;color:#0e4f63;padding:10px 24px;border-radius:999px;font-weight:900;font-size:.88rem;box-shadow:0 4px 12px rgba(0,0,0,.18);transition:transform .15s}
.inline-cta-btn:hover{transform:translateY(-1px)}

/* Pricing */
.pricing-grid{display:grid;gap:12px}
@media(min-width:480px){.pricing-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
.price-card{border:2px solid var(--border);border-radius:var(--radius);padding:18px;background:#fff;transition:all .18s;position:relative}
.price-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.price-card.featured{border-color:var(--accent);background:#f0f9ff}
.price-badge{position:absolute;top:-10px;left:16px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:900;text-transform:uppercase;letter-spacing:.8px;padding:3px 10px;border-radius:999px}
.price-name{font-size:.95rem;font-weight:800;margin-bottom:6px}
.price-amount{font-size:1.8rem;font-weight:900;color:var(--accent);line-height:1}
.price-unit{font-size:.75rem;color:var(--muted);margin:3px 0 8px}
.price-desc{font-size:.78rem;color:var(--muted);line-height:1.5}

/* Fleet */
.fleet-grid{display:grid;gap:14px}
@media(min-width:480px){.fleet-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}}
.fleet-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#fff;transition:all .18s}
.fleet-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.fleet-card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.fleet-card-body{padding:14px}
.fleet-name{font-size:.95rem;font-weight:800;margin-bottom:4px}
.fleet-desc{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:10px}
.fleet-specs{display:flex;flex-wrap:wrap;gap:6px}
.fleet-spec{font-size:.7rem;font-weight:700;background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:999px;color:var(--muted)}

/* Addons */
.addon-grid{display:grid;gap:12px}
@media(min-width:480px){.addon-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}}
.addon-card{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:#fff;transition:all .18s}
.addon-card:hover{box-shadow:var(--shadow-sm);border-color:var(--accent)}
.addon-card img{width:100%;aspect-ratio:4/3;object-fit:cover}
.addon-body{padding:10px}
.addon-name{font-size:.82rem;font-weight:800;margin-bottom:3px}
.addon-desc{font-size:.72rem;color:var(--muted);line-height:1.4;margin-bottom:6px}
.addon-price{font-size:.85rem;font-weight:900;color:var(--accent)}

/* Activities */
.activity-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;background:#fff}
.activity-name{font-size:.9rem;font-weight:800;margin-bottom:4px}
.activity-type{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:6px}
.activity-desc{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:8px}
.activity-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:.72rem;color:var(--muted)}
.activity-meta span{display:flex;align-items:center;gap:3px}

/* Schedules / time slots */
.schedule-group{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px}
.schedule-head{padding:10px 14px;background:#f8fafc;border-bottom:1px solid var(--border)}
.schedule-time{font-size:.9rem;font-weight:800}
.schedule-note{font-size:.75rem;color:var(--muted)}
.ticket-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border)}
.ticket-name{font-size:.82rem;font-weight:600}
.ticket-price{font-size:.95rem;font-weight:900;color:var(--accent)}

/* What's included / Requirements / Policies */
.check-list{display:grid;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;line-height:1.5}
.check-icon{font-size:.9rem;flex-shrink:0;margin-top:1px}
.check-body-title{font-weight:700}
.check-body-sub{font-size:.78rem;color:var(--muted);margin-top:2px}

/* Policy */
.policy-item{border-bottom:1px solid var(--border);padding:12px 0}
.policy-item:last-child{border-bottom:none}
.policy-type{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin-bottom:4px}
.policy-text{font-size:.82rem;color:var(--muted);line-height:1.6}

/* Meeting point */
.meet-card{background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--radius-sm);padding:14px}
.meet-name{font-size:.95rem;font-weight:800;margin-bottom:6px}
.meet-row{font-size:.82rem;color:var(--muted);margin-bottom:4px;line-height:1.5}
.meet-row strong{color:var(--ink);font-weight:700}

/* Gallery */
.photo-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px}
.photo-strip img{width:100%;aspect-ratio:1/1;object-fit:cover;cursor:pointer;transition:opacity .18s}
.photo-strip img:hover{opacity:.82}
@media(max-width:500px){.photo-strip{grid-template-columns:repeat(3,1fr)}}
.gallery-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s;color:var(--ink)}
.gallery-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* FAQ Accordion */
.faq-item{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;overflow:hidden;background:#fff}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;font-weight:700;font-size:.85rem;cursor:pointer;gap:10px;user-select:none}
.faq-q:hover{background:var(--bg)}
.faq-arrow{font-size:1rem;color:var(--accent);transition:transform .22s;flex-shrink:0}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{display:none;padding:10px 15px 13px;font-size:.82rem;color:var(--muted);line-height:1.75;border-top:1px solid var(--border);white-space:pre-line}
.faq-item.open .faq-a{display:block}

/* Hours */
.hours-list{display:grid;gap:0}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.hours-row:last-child{border-bottom:none}
.hours-day{font-weight:600;color:var(--ink)}
.hours-time{color:var(--muted)}
.hours-row.today .hours-day,.hours-row.today .hours-time{color:var(--accent);font-weight:800}
.hours-closed{color:#ef4444;font-weight:600}

/* Location */
.loc-address{font-size:.9rem;font-weight:600;margin-bottom:12px;line-height:1.6}
.map-wrap{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.loc-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar{display:flex;flex-direction:column;gap:14px}
@media(max-width:1024px){.sidebar{display:none}}

.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.sidebar-book{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow)}
.sidebar-book-price{font-size:.8rem;opacity:.88;margin-bottom:4px}
.sidebar-book-from{font-size:1.6rem;font-weight:900;margin-bottom:12px}
.sidebar-book-btn{display:block;background:#fff;color:var(--accent2);padding:12px;border-radius:999px;font-weight:900;font-size:.9rem;text-align:center;margin-bottom:8px;transition:transform .15s}
.sidebar-book-btn:hover{transform:translateY(-1px)}
.sidebar-book-call{display:block;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);padding:10px;border-radius:999px;font-weight:700;font-size:.82rem;text-align:center;transition:background .18s}
.sidebar-book-call:hover{background:rgba(255,255,255,.28)}

.sidebar-title{font-size:.85rem;font-weight:800;margin-bottom:10px;color:var(--ink)}
.sidebar-row{display:flex;align-items:flex-start;gap:10px;font-size:.8rem;margin-bottom:8px}
.sidebar-row-icon{width:16px;flex-shrink:0;margin-top:1px;color:var(--accent)}
.sidebar-row-val{color:var(--muted);line-height:1.45}
.sidebar-row-val a{color:var(--accent);font-weight:600}

.sidebar-socials{display:flex;gap:8px;margin-top:8px}
.social-icon{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .18s}
.social-icon:hover{background:var(--accent);border-color:var(--accent)}
.social-icon:hover svg{fill:#fff}
.social-icon svg{width:15px;height:15px;fill:var(--muted)}

.sidebar-today{display:flex;justify-content:space-between;font-size:.82rem;padding:6px 0}
.sidebar-today-day{font-weight:700}
.sidebar-today-time{color:var(--muted)}

/* ── Mobile book bar ─────────────────────────────────────── */
.mobile-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#fff;border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.12);padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:10px}
@media(max-width:1024px){.mobile-bar{display:flex}}
.mobile-bar-price{display:flex;flex-direction:column}
.mobile-bar-label{font-size:.68rem;color:var(--muted);font-weight:600}
.mobile-bar-amount{font-size:1.1rem;font-weight:900;color:var(--ink)}
.mobile-bar-actions{display:flex;gap:8px}
.mb-btn{display:inline-flex;align-items:center;gap:5px;padding:10px 18px;border-radius:999px;font-size:.82rem;font-weight:800;border:none;cursor:pointer;transition:all .15s;text-decoration:none;white-space:nowrap}
.mb-btn-book{background:var(--accent);color:#fff}
.mb-btn-call{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}

/* ── Gallery modal ───────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;overflow-y:auto;padding:16px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:820px;padding:22px;position:relative;margin:auto}
.modal-close{position:absolute;top:12px;right:12px;background:#f1f5f9;border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.modal-close:hover{background:var(--border);color:var(--ink)}
.modal-title{font-size:1rem;font-weight:800;margin:0 40px 16px 0}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.gallery-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:640px){.gallery-grid{grid-template-columns:repeat(4,1fr)}}
.gallery-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;cursor:pointer;transition:opacity .18s}
.gallery-grid img:hover{opacity:.82}
.modal-pager{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px}
.pager-btn{padding:7px 18px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .18s;color:var(--ink)}
.pager-btn:hover:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.pager-btn:disabled{opacity:.35;cursor:default}
.pager-info{font-size:.78rem;color:var(--muted)}

/* ── Utility ─────────────────────────────────────────────── */
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;font-size:.8rem;font-weight:700;transition:all .18s;text-decoration:none;border:none;cursor:pointer}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-green{background:#dcfce7;color:var(--green)}
.btn-green:hover{background:#bbf7d0}
.btn-ghost{background:var(--bg);color:var(--ink);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}

.no-content{text-align:center;color:var(--muted);padding:24px 0;font-size:.85rem}
</style>
</head>
<body>

<!-- GCR Header -->
<div class="gcr-header">
  <div class="gcr-header-top">
    <a href="home.html" class="gcr-logo-row">
      <img src="gcr-logo.png" alt="Gulf Coast Radar">
      <div class="gcr-logo-text">GULF<span>COAST</span>RADAR</div>
    </a>

<script>
(async function() {

  // ── Slug from URL param or path ──────────────────────────
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || params.get('id') ||
    window.location.pathname.split('/').pop().replace('.html','') ||
    'beachside-circle-boats';

  const API = 'https://gcr-api-gules.vercel.app/api/gcr';

  // ── Fetch ────────────────────────────────────────────────
  let D = null;
  try {
    const r = await fetch(`${API}/entity/${encodeURIComponent(slug)}`);
    if (r.ok) D = await r.json();
  } catch(e) {}

  if (!D || !D.entity) {
    document.getElementById('js-sections').innerHTML = `<div style="padding:40px;text-align:center;color:#ef4444">Could not load business profile.</div>`;
    return;
  }

  const E = D.entity;

  // ── Helpers ──────────────────────────────────────────────
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmtTime = t => {
    if (!t) return null;
    if (/am|pm/i.test(t)) return t;
    const [h, m] = t.split(':').map(Number);
    const ap = h >= 12 ? 'pm' : 'am';
    return (m ? `${h%12||12}:${String(m).padStart(2,'0')}` : `${h%12||12}`) + ap;
  };

  // ── Page meta ────────────────────────────────────────────
  document.getElementById('page-title').textContent = E.name + ' – Gulf Coast Radar Plus';
  if (E.subtitle) document.getElementById('page-desc').setAttribute('content', E.subtitle);

  // ── Gallery state ────────────────────────────────────────
  const PICS_PER_PAGE = 16;
  let galPage = 0, revPage = 0;
  let allPhotos = [], allReviews = [];

  // Collect photos: hero + section gallery + entity_photos (deduped)
  const seenUrls = new Set();
  const addPhoto = (url, cap) => { if (url && !seenUrls.has(url)) { seenUrls.add(url); allPhotos.push({url,cap:cap||''}); } };
  if (E.hero_image_url) addPhoto(E.hero_image_url, E.name);

  // Sections gallery photos
  (D.sections||[]).filter(s=>s.section_type==='gallery').forEach(s=>(s.photos||[]).forEach(p=>addPhoto(p.image_url,p.caption)));
  // Fleet + addon images (not in gallery section)
  (D.fleet||[]).forEach(f=>{ if(f.image_url) addPhoto(f.image_url, f.item_name); });
  (D.addons||[]).forEach(a=>{ if(a.image_url) addPhoto(a.image_url, a.addon_name); });
  // Entity photos table
  (D.photos||[]).forEach(p=>addPhoto(p.image_url, p.caption));

  // ── HERO ────────────────────────────────────────────────
  const heroSlides = allPhotos.slice(0,10);
  const slidesEl = document.getElementById('js-slides');
  const dotsEl   = document.getElementById('js-dots');
  let curSlide = 0;

  heroSlides.forEach((p,i) => {
    slidesEl.innerHTML += `<div class="hero-slide${i===0?' active':''}"><img src="${esc(p.url)}" alt="${esc(p.cap)}" loading="${i===0?'eager':'lazy'}" onerror="this.parentElement.style.background='#0c1a2e'"></div>`;
    dotsEl.innerHTML += `<button class="hero-dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`;
  });

  if (heroSlides.length > 1) {
    document.getElementById('js-prev').style.display = 'flex';
    document.getElementById('js-next').style.display = 'flex';
    document.getElementById('js-hero-count').style.display = 'block';
    document.getElementById('js-hero-count').textContent = `1 / ${heroSlides.length}`;
  }

  window.goSlide = n => {
    curSlide = (n + heroSlides.length) % heroSlides.length;
    document.querySelectorAll('.hero-slide').forEach((s,i)=>s.classList.toggle('active',i===curSlide));
    document.querySelectorAll('.hero-dot').forEach((d,i)=>d.classList.toggle('active',i===curSlide));
    const cnt = document.getElementById('js-hero-count');
    if (cnt) cnt.textContent = `${curSlide+1} / ${heroSlides.length}`;
  };
  document.getElementById('js-prev').onclick = () => goSlide(curSlide-1);
  document.getElementById('js-next').onclick = () => goSlide(curSlide+1);
  if (heroSlides.length > 1) setInterval(()=>goSlide(curSlide+1), 6000);

  // ── Hero content ─────────────────────────────────────────
  const tags = (D.tags||[]).map(t=>t.tag).filter(Boolean);
  const dispTags = tags.filter(t=>!['establishment','service','point of interest','wheelchair accessible'].includes(t)).slice(0,3);
  const chipsEl = document.getElementById('js-hero-chips');
  dispTags.forEach(t=>{ chipsEl.innerHTML += `<span class="hero-chip">${t.replace(/_/g,' ')}</span>`; });

  const bookUrl = E.booking_url || E.reservation_url || E.website_url || '#';
  const heroContent = document.getElementById('js-hero-content');
  heroContent.innerHTML = `
    <div class="hero-badge">⭐ GCR PLUS</div>
    <h1 class="hero-name">${esc(E.name)}</h1>
    ${E.subtitle ? `<p class="hero-tagline">${esc(E.subtitle)}</p>` : ''}
    <div class="hero-meta">
      ${E.city ? `<span>${esc(E.city)}${E.state?', '+E.state:''}</span>` : ''}
      ${E.entity_subtype ? `<span class="hero-meta-dot"></span><span>${esc(E.entity_subtype.replace(/_/g,' '))}</span>` : ''}
      ${E.rating ? `<span class="hero-meta-dot"></span><span class="hero-rating">★ ${E.rating}${E.review_count?' ('+E.review_count+')'  :''}</span>` : ''}
    </div>
    <div class="hero-actions">
      ${bookUrl && bookUrl!=='#' ? `<a href="${esc(bookUrl)}" target="_blank" rel="noopener" class="hero-btn hero-btn-primary">📅 Book Now</a>` : ''}
      ${E.phone ? `<a href="tel:${E.phone.replace(/\D/g,'')}" class="hero-btn hero-btn-ghost">📞 ${esc(E.phone)}</a>` : ''}
      ${E.website_url ? `<a href="${esc(E.website_url)}" target="_blank" rel="noopener" class="hero-btn hero-btn-ghost">🌐 Website</a>` : ''}
    </div>`;

  // ── Sticky info bar ───────────────────────────────────────
  document.getElementById('js-bar-emoji').textContent = E.icon || '🏢';
  document.getElementById('js-bar-name').textContent = E.name;
  const barActions = document.getElementById('js-bar-actions');
  if (bookUrl && bookUrl!=='#') barActions.innerHTML += `<a href="${esc(bookUrl)}" target="_blank" rel="noopener" class="bar-btn bar-btn-book">📅 Book</a>`;
  if (E.phone) barActions.innerHTML += `<a href="tel:${E.phone.replace(/\D/g,'')}" class="bar-btn bar-btn-call">📞 Call</a>`;

  const heroEl = document.getElementById('js-hero');
  const infoBar = document.getElementById('js-info-bar');
  const tabNav  = document.getElementById('js-tab-nav');
  const io = new IntersectionObserver(([entry])=>{
    infoBar.classList.toggle('visible', !entry.isIntersecting);
  }, { threshold: 0 });
  io.observe(heroEl);

  // ── Mobile book bar ───────────────────────────────────────
  const mobileBar = document.getElementById('js-mobile-bar');
  const priceFrom = (D.pricing||[]).length ? (D.pricing||[]).reduce((mn,p)=>Math.min(mn,p.price||999),999) : null;
  mobileBar.innerHTML = `
    <div class="mobile-bar-price">
      <span class="mobile-bar-label">Starting from</span>
      <span class="mobile-bar-amount">${priceFrom && priceFrom<999 ? '$'+priceFrom : 'See pricing'}</span>
    </div>
    <div class="mobile-bar-actions">
      ${bookUrl && bookUrl!=='#' ? `<a href="${esc(bookUrl)}" target="_blank" rel="noopener" class="mb-btn mb-btn-book">📅 Book Now</a>` : ''}
      ${E.phone ? `<a href="tel:${E.phone.replace(/\D/g,'')}" class="mb-btn mb-btn-call">📞 Call</a>` : ''}
    </div>`;

  // ── Build section plan ────────────────────────────────────
  // Each entry: { id, label, icon, render: fn → html string }
  const SECTIONS = [];

  const addSec = (id, label, icon, renderFn) => SECTIONS.push({id, label, icon, render: renderFn});

  // ── About ────────────────────────────────────────────────
  const desc = (D.sections||[]).find(s=>s.section_key==='about')?.content?.body_text || E.description || '';
  const features = (D.features||[]).map(f=>f.label);
  const perfectFor = (D.perfect_for||[]).map(p=>p.label);
  if (desc || features.length) {
    addSec('about','About','ℹ️', ()=>{
      let h = '';
      if (desc) h += `<p class="about-body">${esc(desc)}</p>`;
      if (features.length) h += `<div class="sec-subtitle">What's Included</div><div class="pill-row">${features.map(f=>`<span class="pill">✓ ${esc(f)}</span>`).join('')}</div>`;
      if (perfectFor.length) h += `<div class="sec-subtitle">Perfect For</div><div class="pill-row">${perfectFor.map(f=>`<span class="pill pill-green">${esc(f)}</span>`).join('')}</div>`;
      if (tags.filter(t=>!['establishment','service','point of interest'].includes(t)).length)
        h += `<div class="sec-subtitle">Tags</div><div class="pill-row">${tags.filter(t=>!['establishment','service','point of interest'].includes(t)).map(t=>`<span class="pill pill-muted">${esc(t.replace(/_/g,' '))}</span>`).join('')}</div>`;
      if (bookUrl && bookUrl!=='#') h += `<div class="inline-cta"><div class="inline-cta-h">Ready to Book?</div><p class="inline-cta-p">Easy to get started — no experience needed. Just show up and enjoy.</p><a href="${esc(bookUrl)}" target="_blank" rel="noopener" class="inline-cta-btn">📅 Book Now →</a></div>`;
      return h;
    });
  }

  // ── Pricing ───────────────────────────────────────────────
  const pricing = D.pricing || [];
  if (pricing.length) {
    addSec('pricing','Pricing','🎟️', ()=>{
      // Group by name prefix to detect single vs double seater variants
      const grouped = {};
      pricing.forEach(p=>{
        const key = p.package_name || 'Option';
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(p);
      });
      const keys = Object.keys(grouped);
      if (keys.length <= 4) {
        // Simple grid
        return `<div class="pricing-grid">${pricing.map((p,i)=>`
          <div class="price-card${i===0?' featured':''}">
            ${i===0?'<div class="price-badge">Most Popular</div>':''}
            <div class="price-name">${esc(p.package_name)}</div>
            <div class="price-amount">${esc(p.price_text||'$'+p.price)}</div>
            <div class="price-unit">${p.price_unit ? esc(p.price_unit) : 'per session'}</div>
            ${p.description?`<div class="price-desc">${esc(p.description)}</div>`:''}
          </div>`).join('')}
        </div>
        <p style="font-size:.75rem;color:var(--muted);margin-top:10px;text-align:center;">Prices may vary. Book online or call to confirm availability.</p>`;
      }
      // Comparison table for many items
      return `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.82rem">
        <thead><tr style="background:var(--bg)">
          <th style="text-align:left;padding:10px 12px;border:1px solid var(--border);font-weight:700">Option</th>
          <th style="padding:10px 12px;border:1px solid var(--border);font-weight:700;text-align:right">Price</th>
        </tr></thead>
        <tbody>${pricing.map(p=>`<tr>
          <td style="padding:10px 12px;border:1px solid var(--border)">${esc(p.package_name)}</td>
          <td style="padding:10px 12px;border:1px solid var(--border);font-weight:900;color:var(--accent);text-align:right">${esc(p.price_text||'$'+p.price)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    });
  }

  // ── Fleet / Equipment ─────────────────────────────────────
  const fleet = D.fleet || [];
  if (fleet.length) {
    addSec('fleet','Equipment','⛵', ()=>`<div class="fleet-grid">${fleet.map(f=>`
      <div class="fleet-card">
        ${f.image_url?`<img src="${esc(f.image_url)}" alt="${esc(f.item_name)}" loading="lazy" onerror="this.style.display='none'">` :''}
        <div class="fleet-card-body">
          <div class="fleet-name">${esc(f.item_name)}</div>
          ${f.description?`<div class="fleet-desc">${esc(f.description)}</div>`:''}
          <div class="fleet-specs">
            ${f.max_capacity_text?`<span class="fleet-spec">👥 ${esc(f.max_capacity_text)}</span>`:''}
            ${f.capacity?`<span class="fleet-spec">👥 ${f.capacity} person${f.capacity>1?'s':''}</span>`:''}
            ${f.weight?`<span class="fleet-spec">⚖️ ${esc(f.weight)}</span>`:''}
            ${f.dimensions?`<span class="fleet-spec">📐 ${esc(f.dimensions)}</span>`:''}
            ${f.condition&&f.condition!=='available'?`<span class="fleet-spec">🔧 ${esc(f.condition)}</span>`:''}
          </div>
        </div>
      </div>`).join('')}</div>`);
  }

  // ── Activities ────────────────────────────────────────────
  const activities = D.activities || [];
  if (activities.length) {
    addSec('activities','Activities','🎯', ()=>activities.map(a=>`
      <div class="activity-item">
        <div class="activity-name">${esc(a.activity_name)}</div>
        ${a.activity_type?`<div class="activity-type">${esc(a.activity_type.replace(/_/g,' '))}</div>`:''}
        ${a.description?`<div class="activity-desc">${esc(a.description)}</div>`:''}
        <div class="activity-meta">
          ${a.duration?`<span>⏱ ${esc(a.duration)}</span>`:''}
          ${a.min_age?`<span>👤 Ages ${a.min_age}+</span>`:''}
          ${a.max_capacity?`<span>👥 Max ${a.max_capacity}</span>`:''}
          ${a.difficulty_level?`<span>⚡ ${esc(a.difficulty_level)}</span>`:''}
        </div>
      </div>`).join(''));
  }

  // ── Schedules (time slots / cruises / charters) ───────────
  const schedSec = (D.sections||[]).find(s=>s.section_key==='schedules'||s.section_key==='cruise_times');
  const schedGroups = schedSec ? (schedSec.groups||[]) : [];
  if (schedGroups.length) {
    addSec('schedules','Schedules','🗓️', ()=>schedGroups.map(g=>`
      <div class="schedule-group">
        <div class="schedule-head">
          <div class="schedule-time">${esc(g.title||'')}</div>
          ${g.subtitle?`<div class="schedule-note">${esc(g.subtitle)}</div>`:''}
        </div>
        ${(g.items||[]).map(t=>`<div class="ticket-row">
          <span class="ticket-name">${esc(t.item_name)}</span>
          <span class="ticket-price">${esc(t.price_text||'$'+t.price_numeric)}</span>
        </div>`).join('')}
      </div>`).join(''));
  }

  // ── Add-Ons ───────────────────────────────────────────────
  const addons = D.addons || [];
  if (addons.length) {
    addSec('addons','Add-Ons','➕', ()=>`<div class="addon-grid">${addons.map(a=>`
      <div class="addon-card">
        ${a.image_url?`<img src="${esc(a.image_url)}" alt="${esc(a.addon_name)}" loading="lazy" onerror="this.style.display='none'">` :''}
        <div class="addon-body">
          <div class="addon-name">${esc(a.addon_name)}</div>
          ${a.description?`<div class="addon-desc">${esc(a.description)}</div>`:''}
          <div class="addon-price">${a.price!=null?'+$'+a.price:a.price_min!=null?'+$'+a.price_min+'–$'+a.price_max:a.price_type==='included'?'Included':''}</div>
        </div>
      </div>`).join('')}</div>`);
  }

  // ── What's Included ───────────────────────────────────────
  const included = D.whats_included || [];
  if (included.length) {
    addSec('included',"What's Included",'✅', ()=>`<div class="check-list">${included.map(i=>`
      <div class="check-item">
        <span class="check-icon">✅</span>
        <div><div class="check-body-title">${esc(i.item_name)}</div>${i.description?`<div class="check-body-sub">${esc(i.description)}</div>`:''}</div>
      </div>`).join('')}</div>`);
  }

  // ── Requirements ─────────────────────────────────────────
  const reqs = D.requirements || [];
  if (reqs.length) {
    addSec('requirements','Requirements','📋', ()=>`<div class="check-list">${reqs.map(r=>`
      <div class="check-item">
        <span class="check-icon">⚠️</span>
        <div><div class="check-body-title">${esc(r.requirement_text||r.item_name||'')}</div>${r.description?`<div class="check-body-sub">${esc(r.description)}</div>`:''}</div>
      </div>`).join('')}</div>`);
  }

  // ── Policies ─────────────────────────────────────────────
  const policies = D.policies || [];
  if (policies.length) {
    addSec('policies','Policies','📄', ()=>policies.map(p=>`
      <div class="policy-item">
        ${p.policy_type?`<div class="policy-type">${esc(p.policy_type.replace(/_/g,' '))}</div>`:''}
        <div class="policy-text">${esc(p.policy_text)}</div>
      </div>`).join(''));
  }

  // ── Meeting Point ─────────────────────────────────────────
  const meetPts = D.meeting_points || [];
  if (meetPts.length) {
    addSec('meetingpoint','Meeting Point','🗺️', ()=>meetPts.map(m=>`
      <div class="meet-card">
        ${m.location_name?`<div class="meet-name">📍 ${esc(m.location_name)}</div>`:''}
        ${m.address?`<div class="meet-row">📍 ${esc(m.address)}</div>`:''}
        ${m.parking_info?`<div class="meet-row"><strong>Parking:</strong> ${esc(m.parking_info)}</div>`:''}
        ${m.checkin_instructions?`<div class="meet-row"><strong>Check-in:</strong> ${esc(m.checkin_instructions)}</div>`:''}
        ${m.what_to_bring?`<div class="meet-row"><strong>What to Bring:</strong> ${esc(m.what_to_bring)}</div>`:''}
      </div>`).join('<div style="height:10px"></div>'));
  }

  // ── Gallery ───────────────────────────────────────────────
  allReviews = (D.sections||[]).find(s=>s.section_type==='reviews')?.reviews || [];
  if (allPhotos.length > 1) {
    addSec('gallery','Photos','📸', ()=>{
      const preview = allPhotos.slice(1, 9); // skip hero which is already shown
      return `<div class="photo-strip">${preview.map(p=>`<img src="${esc(p.url)}" alt="${esc(p.cap)}" loading="lazy" onclick="openGallery()" onerror="this.style.display='none'">`).join('')}</div>
      <button class="gallery-btn" onclick="openGallery()">
        <span>📸 View All Photos (${allPhotos.length} photos)</span>
        <span>›</span>
      </button>`;
    });
  }

  // ── FAQ ───────────────────────────────────────────────────
  const qna = D.qna || [];
  if (qna.length) {
    const seenQ = new Set();
    const uniqueQ = qna.filter(q=>{ const k=(q.question||'').trim().toLowerCase(); if(seenQ.has(k))return false; seenQ.add(k); return true; });
    addSec('faq','FAQ','❓', ()=>uniqueQ.map((q,i)=>`
      <div class="faq-item" id="faq-${i}">
        <div class="faq-q" onclick="(el=>el.classList.toggle('open'))(document.getElementById('faq-${i}'))">
          <span>${esc(q.question)}</span>
          <span class="faq-arrow">⌄</span>
        </div>
        ${q.answer?`<div class="faq-a">${esc(q.answer).replace(/\n/g,'<br>')}</div>`:''}
      </div>`).join(''));
  }

  // ── Reviews ───────────────────────────────────────────────
  if (allReviews.length) {
    addSec('reviews','Reviews','⭐', ()=>`
      <button class="gallery-btn" onclick="openReviews()">
        <span>⭐ Read All Reviews (${allReviews.length})</span>
        <span>›</span>
      </button>`);
  }

  // ── Hours ─────────────────────────────────────────────────
  const hours = D.hours || [];
  const DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  if (hours.length) {
    const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
    const sorted = [...hours].sort((a,b)=>DAY_ORDER.indexOf(a.day_of_week)-DAY_ORDER.indexOf(b.day_of_week));
    addSec('hours','Hours','🕐', ()=>`<div class="hours-list">${sorted.map(h=>`
      <div class="hours-row${h.day_of_week===today?' today':''}">
        <span class="hours-day">${esc(h.day_of_week)}</span>
        <span class="${h.is_closed?'hours-closed':'hours-time'}">${h.is_closed?'Closed':(fmtTime(h.open_time)||'')+(h.close_time?' – '+fmtTime(h.close_time):'')}</span>
      </div>`).join('')}</div>`);
  }

  // ── Location ─────────────────────────────────────────────
  const locSec = (D.sections||[]).find(s=>s.section_type==='location');
  const addr = locSec?.location?.address_line_1 || E.address_line_1 || '';
  const city = locSec?.location?.city || E.city || '';
  const state = locSec?.location?.state || E.state || '';
  const zip  = locSec?.location?.zip || E.zip || '';
  const mapsUrl = E.directions_url || (addr ? `https://maps.google.com/?q=${encodeURIComponent([addr,city,state].filter(Boolean).join(', '))}` : '');
  if (addr || city) {
    addSec('location','Location','📍', ()=>`
      <div class="loc-address">📍 ${[addr,[city,state,zip].filter(Boolean).join(', ')].filter(Boolean).join('<br>')}</div>
      ${mapsUrl?`<div class="map-wrap"><iframe title="Map" width="100%" height="220" style="border:0;display:block" loading="lazy"
        src="https://www.openstreetmap.org/export/embed.html?bbox=-87.72,30.20,-87.55,30.32&layer=mapnik"></iframe></div>`:''}
      <div class="loc-actions">
        ${mapsUrl?`<a href="${esc(mapsUrl)}" target="_blank" rel="noopener" class="action-btn btn-primary">📍 Get Directions</a>`:''}
        ${E.phone?`<a href="tel:${E.phone.replace(/\D/g,'')}" class="action-btn btn-green">📞 ${esc(E.phone)}</a>`:''}
        ${E.website_url?`<a href="${esc(E.website_url)}" target="_blank" rel="noopener" class="action-btn btn-ghost">🌐 Website</a>`:''}
      </div>`);
  }

  // ── Render tabs ───────────────────────────────────────────
  const tabsEl = document.getElementById('js-tabs');
  SECTIONS.forEach(sec => {
    tabsEl.innerHTML += `<button class="tab-btn" onclick="scrollToSec('${sec.id}')">${sec.icon} ${sec.label}</button>`;
  });
  if (SECTIONS.length) document.getElementById('js-tab-nav').style.display = 'block';

  // ── Render sections ───────────────────────────────────────
  const main = document.getElementById('js-sections');
  SECTIONS.forEach(sec => {
    const el = document.createElement('div');
    el.className = 'sec';
    el.id = 'sec-' + sec.id;
    el.innerHTML = `<div class="sec-title"><span class="sec-title-icon">${sec.icon}</span>${esc(sec.label)}</div>${sec.render()}`;
    main.appendChild(el);
  });

  // ── Sidebar ───────────────────────────────────────────────
  const sidebar = document.getElementById('js-sidebar');
  // Book CTA
  sidebar.innerHTML += `<div class="sidebar-book">
    <div class="sidebar-book-price">Starting from</div>
    <div class="sidebar-book-from">${priceFrom && priceFrom<999 ? '$'+priceFrom : 'Contact for pricing'}</div>
    ${bookUrl&&bookUrl!=='#'?`<a href="${esc(bookUrl)}" target="_blank" rel="noopener" class="sidebar-book-btn">📅 Book Now</a>`:''}
    ${E.phone?`<a href="tel:${E.phone.replace(/\D/g,'')}" class="sidebar-book-call">📞 ${esc(E.phone)}</a>`:''}
  </div>`;

  // Info card
  let infoHtml = `<div class="sidebar-title">Contact & Info</div>`;
  if (E.phone) infoHtml += `<div class="sidebar-row"><span class="sidebar-row-icon">📞</span><span class="sidebar-row-val"><a href="tel:${E.phone.replace(/\D/g,'')}">${esc(E.phone)}</a></span></div>`;
  if (E.website_url) infoHtml += `<div class="sidebar-row"><span class="sidebar-row-icon">🌐</span><span class="sidebar-row-val"><a href="${esc(E.website_url)}" target="_blank" rel="noopener">${esc(E.website_url.replace(/^https?:\/\//,''))}</a></span></div>`;
  if (addr||city) infoHtml += `<div class="sidebar-row"><span class="sidebar-row-icon">📍</span><span class="sidebar-row-val">${esc([addr,city,state].filter(Boolean).join(', '))}</span></div>`;
  // Today's hours
  if (hours.length) {
    const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
    const todayH = hours.find(h=>h.day_of_week===today);
    if (todayH) infoHtml += `<div class="sidebar-today"><span class="sidebar-today-day">Today</span><span class="sidebar-today-time" style="color:${todayH.is_closed?'#ef4444':'#16a34a'};font-weight:700">${todayH.is_closed?'Closed':(fmtTime(todayH.open_time)||'')+(todayH.close_time?' – '+fmtTime(todayH.close_time):'')}</span></div>`;
  }
  // Social
  const insta = E.social_instagram;
  const fb    = E.social_facebook;
  const tiktok= E.social_tiktok;
  if ((insta||fb||tiktok) && ![insta,fb,tiktok].every(s=>s==='#'||!s)) {
    infoHtml += `<div class="sidebar-socials">`;
    if (insta&&insta!=='#') infoHtml += `<a href="${insta.startsWith('http')?insta:'https://instagram.com/'+insta.replace('@','')}" target="_blank" rel="noopener" class="social-icon" title="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;
    if (fb&&fb!=='#') infoHtml += `<a href="${fb}" target="_blank" rel="noopener" class="social-icon" title="Facebook"><svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg></a>`;
    if (tiktok&&tiktok!=='#') infoHtml += `<a href="${tiktok.startsWith('http')?tiktok:'https://tiktok.com/@'+tiktok.replace('@','')}" target="_blank" rel="noopener" class="social-icon" title="TikTok"><svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg></a>`;
    infoHtml += `</div>`;
  }
  sidebar.innerHTML += `<div class="sidebar-card">${infoHtml}</div>`;

  // ── Scroll helpers ────────────────────────────────────────
  window.scrollToSec = id => {
    const el = document.getElementById('sec-'+id);
    if (!el) return;
    const offset = (document.querySelector('.gcr-header')?.offsetHeight||64) + 52 + 52 + 8;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({top: Math.max(0,top), behavior:'smooth'});
  };

  // Tab spy
  const secEls = SECTIONS.map(s=>document.getElementById('sec-'+s.id)).filter(Boolean);
  const tabBtns = document.querySelectorAll('.tab-btn');
  const spy = new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if (en.isIntersecting) {
        const id = en.target.id.replace('sec-','');
        tabBtns.forEach((b,i)=>b.classList.toggle('active', SECTIONS[i]?.id===id));
      }
    });
  },{rootMargin:'-30% 0px -60% 0px'});
  secEls.forEach(el=>spy.observe(el));

  // ── Gallery & Reviews modals ──────────────────────────────
  const PGAL = PICS_PER_PAGE;
  const renderGalleryPage = () => {
    const slice = allPhotos.slice(galPage*PGAL, galPage*PGAL+PGAL);
    document.getElementById('gallery-grid').innerHTML = slice.map(p=>`<img src="${esc(p.url)}" alt="${esc(p.cap)}" loading="lazy" onerror="this.style.display='none'">`).join('');
    document.getElementById('gal-info').textContent = `${galPage+1} / ${Math.ceil(allPhotos.length/PGAL)}`;
    document.getElementById('gal-prev').disabled = galPage===0;
    document.getElementById('gal-next').disabled = galPage>=Math.ceil(allPhotos.length/PGAL)-1;
  };
  window.openGallery = ()=>{ galPage=0; renderGalleryPage(); document.getElementById('gallery-modal').classList.add('open'); document.body.style.overflow='hidden'; };
  window.galleryPage = d=>{ galPage+=d; renderGalleryPage(); };

  const PREV = 5;
  const renderReviewsPage = ()=>{
    const slice = allReviews.slice(revPage*PREV, revPage*PREV+PREV);
    document.getElementById('reviews-list').innerHTML = slice.map(r=>`
      <div style="border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:700;font-size:.85rem">${esc(r.author_name||'Anonymous')}</span>
          <span style="font-size:.75rem;color:var(--muted)">${r.review_date||''}</span>
        </div>
        ${r.rating?`<div style="color:#f59e0b;font-size:.85rem;margin-bottom:6px">${'★'.repeat(Math.round(r.rating))}${'☆'.repeat(5-Math.round(r.rating))}</div>`:''}
        <div style="font-size:.82rem;color:var(--muted);line-height:1.6">${esc(r.review_text||'')}</div>
      </div>`).join('');
    document.getElementById('rev-info').textContent = `${revPage+1} / ${Math.ceil(allReviews.length/PREV)}`;
    document.getElementById('rev-prev').disabled = revPage===0;
    document.getElementById('rev-next').disabled = revPage>=Math.ceil(allReviews.length/PREV)-1;
  };
  window.openReviews = ()=>{ revPage=0; renderReviewsPage(); document.getElementById('reviews-modal').classList.add('open'); document.body.style.overflow='hidden'; };
  window.reviewsPage = d=>{ revPage+=d; renderReviewsPage(); };

  window.closeModal = id=>{ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; };
  document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) closeModal(m.id); }));

})();
</script>
</body>
</html>
