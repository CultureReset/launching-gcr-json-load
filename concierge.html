<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Your Gulf Coast Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0b7a75;
      --teal-dark: #065f5b;
      --sand: #fdf6ec;
      --white: #ffffff;
      --bubble-ai: #f0f4f8;
      --bubble-user: #0b7a75;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --radius: 18px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sand);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── header ── */
    .chat-header {
      background: var(--teal);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .chat-header-avatar {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 1rem; font-weight: 700; }
    .chat-header-status { font-size: .75rem; opacity: .8; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; }

    /* ── messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--teal); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; flex-shrink: 0; margin-top: 2px;
    }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: .93rem;
      line-height: 1.55;
      max-width: 100%;
    }
    .msg.ai   .msg-bubble { background: var(--bubble-ai); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }

    /* typing indicator */
    .typing .msg-bubble {
      display: flex; align-items: center; gap: 4px; padding: 14px 18px;
    }
    .typing .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); animation: bounce .9s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: .15s; }
    .typing .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* quick replies */
    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 4px 14px 0;
    }
    .quick-btn {
      background: var(--white); border: 1.5px solid var(--teal);
      color: var(--teal); border-radius: 20px;
      padding: 7px 14px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      font-family: inherit;
    }
    .quick-btn:hover { background: var(--teal); color: #fff; }

    /* ── input bar ── */
    .chat-input-bar {
      background: var(--white);
      border-top: 1px solid #e5e7eb;
      padding: 12px 14px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      padding: 11px 18px;
      font-size: .95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border .2s;
    }
    .chat-input:focus { border-color: var(--teal); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--teal); color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background .2s;
      font-size: 1.1rem;
    }
    .send-btn:hover { background: var(--teal-dark); }
    .send-btn:disabled { background: #9ca3af; cursor: default; }
  </style>
</head>
<body>

  <div class="gcr-header">
    <div class="gcr-header-top">
      <a href="index3.html" class="gcr-logo-row">
        <img src="gcr-logo.png" alt="Gulf Coast Radar">
        <div class="gcr-logo-text">GULF<span>COAST</span>RADAR</div>
      </a>
      <button class="gcr-install-btn" id="installBtn" style="display:none;" onclick="installApp()">📲 Install App</button>
    </div>
    <div class="gcr-cat-tabs" id="gcrCatTabs">
      <a href="restaurants.html"  class="gcr-cat-tab">🍽️ Restaurants</a>
      <a href="coffee-sweets.html" class="gcr-cat-tab">☕ Coffee &amp; Sweets</a>
      <a href="happy-hours.html"  class="gcr-cat-tab">🍻 Happy Hours</a>
      <a href="specials.html"     class="gcr-cat-tab">🏷️ Specials</a>
      <a href="events.html"       class="gcr-cat-tab">🎉 Events</a>
      <a href="things-to-do.html" class="gcr-cat-tab">🎯 Things To Do</a>
      <a href="services.html"    class="gcr-cat-tab">🛠️ Services</a>
      <a href="nightlife.html"    class="gcr-cat-tab">🎶 Bars &amp; Nightlife</a>
      <a href="artists.html"      class="gcr-cat-tab">🎸 Artists</a>
      <a href="shopping.html"     class="gcr-cat-tab">🛍️ Shopping</a>
      <a href="public-spots.html"        class="gcr-cat-tab">✨ Public Spots</a>
      <a href="feed.html"         class="gcr-cat-tab">📡 Live Feed</a>
    </div>
    <div class="gcr-action-strip">
      <button class="gcr-strip-btn gcr-strip-gold" onclick="openSignupModal()">⭐ Join Our Loyalty Program 🎁</button>
      <button class="gcr-strip-btn gcr-strip-teal" onclick="openCalendarModal()">📅 Master Calendar 🎉</button>
    </div>
  </div>

  <!-- header -->
  <div class="chat-header">
    <div class="chat-header-avatar">🌊</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Gulf Coast Concierge</div>
      <div class="chat-header-status"><span class="status-dot"></span> Online — ask me anything</div>
    </div>
  </div>

  <!-- messages -->
  <div class="chat-messages" id="messages"></div>

  <!-- quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="send('Best seafood restaurants?')">🦞 Seafood</button>
    <button class="quick-btn" onclick="send('Happy hour deals tonight?')">🍹 Happy Hour</button>
    <button class="quick-btn" onclick="send('Live music tonight?')">🎵 Live Music</button>
    <button class="quick-btn" onclick="send('Kid-friendly places?')">👨‍👩‍👧 Kids</button>
    <button class="quick-btn" onclick="send('Things to do today?')">🏄 Activities</button>
    <button class="quick-btn" onclick="send('Gluten free options?')">🌿 Gluten Free</button>
  </div>

  <!-- input -->
  <div class="chat-input-bar">
    <textarea class="chat-input" id="input" placeholder="Ask me anything about the Gulf Coast..." rows="1"></textarea>
    <button class="mic-btn" id="micBtn" onclick="startVoice()" title="Click to record" style="background:none;border:none;font-size:1.4rem;cursor:pointer;padding:4px 8px;">🎙️</button>
    <button class="send-btn" id="sendBtn" onclick="sendInput()">➤</button>
  </div>

<script>
  const API = 'https://cybercheck-api-database.vercel.app/api/gcr';
  const params = new URLSearchParams(location.search);
  let sessionId = params.get('s') || null;
  let chatHistory = [];
  let waiting = false;
  let _voiceMode = false;
  let _continuousMode = false;
  let _autoListeningEnabled = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
  });

  function addMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    if (role === 'ai') {
      wrap.innerHTML = `<div class="msg-avatar">🌊</div><div class="msg-bubble">${text}</div>`;
    } else {
      wrap.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai typing';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="msg-avatar">🌊</div><div class="msg-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  async function send(text) {
    if (!text.trim() || waiting) return;
    waiting = true;
    sendBtn.disabled = true;
    document.getElementById('quickReplies').style.display = 'none';

    addMsg('user', text);
    showTyping();

    try {
      chatHistory.push({ role: 'user', content: text });

      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory.slice(-10) })
      });
      const data = await res.json();
      const reply = data.reply || 'Sorry, try again!';
      chatHistory.push({ role: 'assistant', content: reply });

      removeTyping();
      addMsg('ai', reply.replace(/\n/g, '<br>'));
      if (_voiceMode) speakWithOpenAI(reply);
    } catch (e) {
      removeTyping();
      addMsg('ai', 'Sorry, something went wrong. Try again in a moment.');
    }

    waiting = false;
    sendBtn.disabled = false;
  }

  function sendInput() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    if (!_voiceMode) _voiceMode = false;
    send(text);
  }

  /* ── Text-to-Speech ── */
  function speakReply(text) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.05;
    const voices = speechSynthesis.getVoices();
    const pick = voices.find(v => v.name.includes('Samantha')) ||
                 voices.find(v => v.lang === 'en-US' && v.localService) || voices[0];
    if (pick) utter.voice = pick;
    speechSynthesis.speak(utter);
  }
  // preload voices
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => {};

  /* ── Voice Input with OpenAI Whisper ── */
  let _mediaRecorder = null;
  let _audioChunks = [];
  let _isRecording = false;

  let _silenceTimer = null;
  let _audioAnalyser = null;

  async function startVoice() {
    console.log('🎤 startVoice called, _isRecording:', _isRecording);
    const micBtn = document.getElementById('micBtn');
    if (_isRecording) {
      console.log('⏹️ Manually stopping recording...');
      _mediaRecorder.stop();
      clearTimeout(_silenceTimer);
      return;
    }

    try {
      console.log('🎤 Requesting microphone access...');
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      _audioChunks = [];
      _mediaRecorder = new MediaRecorder(stream);
      _isRecording = true;
      micBtn.style.color = '#ff4444';
      micBtn.textContent = '⏺️';
      console.log('🎤 Recording started (auto-stops after 3 sec silence)...');

      // Detect silence and auto-stop
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      _audioAnalyser = audioContext.createAnalyser();
      const source = audioContext.createMediaStreamSource(stream);
      source.connect(_audioAnalyser);
      const dataArray = new Uint8Array(_audioAnalyser.frequencyBinCount);
      let silenceStart = null;

      const checkSilence = () => {
        _audioAnalyser.getByteFrequencyData(dataArray);
        const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
        if (average < 15) {
          if (!silenceStart) silenceStart = Date.now();
          if (Date.now() - silenceStart > 3000) {
            console.log('🔇 Silence detected, auto-stopping...');
            _mediaRecorder.stop();
            return;
          }
        } else {
          silenceStart = null;
        }
        if (_isRecording) requestAnimationFrame(checkSilence);
      };
      checkSilence();

      _mediaRecorder.ondataavailable = (e) => {
        console.log('📦 Audio chunk received:', e.data.size, 'bytes');
        _audioChunks.push(e.data);
      };

      _mediaRecorder.onstop = async () => {
        console.log('⏹️ Recording stopped, total chunks:', _audioChunks.length);
        _isRecording = false;
        micBtn.style.color = '';
        micBtn.textContent = '🎙️';

        if (_audioChunks.length === 0) {
          console.error('❌ No audio recorded!');
          addMsg('ai', 'No audio recorded — try again');
          stream.getTracks().forEach(track => track.stop());
          return;
        }

        const audioBlob = new Blob(_audioChunks, { type: 'audio/wav' });
        console.log('🎙️ Audio blob created, size:', audioBlob.size, 'bytes');
        if (audioBlob.size === 0) {
          console.error('❌ Audio blob is empty!');
          addMsg('ai', 'Audio is empty — try again');
          stream.getTracks().forEach(track => track.stop());
          return;
        }
        await transcribeWithOpenAI(audioBlob);
        stream.getTracks().forEach(track => track.stop());
      };

      _mediaRecorder.start();
    } catch (err) {
      console.error('❌ Mic error:', err);
      addMsg('ai', `Mic error: ${err.message}`);
    }
  }

  async function transcribeWithOpenAI(audioBlob) {
    const formData = new FormData();
    formData.append('file', audioBlob, 'audio.wav');
    formData.append('model', 'whisper-1');

    try {
      console.log('🔵 Starting Whisper transcription...');
      showTyping();
      const whisperRes = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer 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' },
        body: formData
      });
      console.log('Whisper response status:', whisperRes.status);
      const data = await whisperRes.json();
      console.log('📝 Transcribed text:', data.text);
      removeTyping();

      if (data.text) {
        console.log('✅ Got transcription, sending to chat API...');
        _voiceMode = true;
        addMsg('user', data.text);
        chatHistory.push({ role: 'user', content: data.text });
        showTyping();

        console.log('🔍 Calling:', `${API}/chat`);
        const chatRes = await fetch(`${API}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: data.text, history: chatHistory.slice(-10) })
        });
        console.log('Chat API response status:', chatRes.status);
        const respData = await chatRes.json();
        console.log('💬 AI response:', respData.reply);
        const reply = respData.reply || 'Sorry, try again!';

        removeTyping();
        chatHistory.push({ role: 'assistant', content: reply });
        addMsg('ai', reply.replace(/\n/g, '<br>'));
        console.log('🔊 Speaking with TTS and listening...');
        speakWithOpenAIAndListen(reply);
      } else {
        console.log('❌ No text from Whisper:', data);
      }
    } catch (err) {
      console.error('💥 Error in transcribeWithOpenAI:', err);
      removeTyping();
      addMsg('ai', `Error: ${err.message}`);
    }
  }

  async function speakWithOpenAI(text) {
    try {
      console.log('Speaking:', text);
      const res = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
        body: JSON.stringify({ model: 'tts-1', input: text, voice: 'alloy' })
      });
      if (!res.ok) {
        const err = await res.json();
        console.error('OpenAI TTS error:', err);
        return;
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      console.log('Playing audio...');
      new Audio(audioUrl).play();
    } catch (err) {
      console.error('TTS error:', err);
    }
  }


  async function speakWithOpenAIAndListen(text) {
    try {
      console.log('🔊 TTS: Speaking text:', text.substring(0, 50) + '...');
      const res = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer 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' },
        body: JSON.stringify({ model: 'tts-1', input: text, voice: 'alloy' })
      });
      console.log('TTS response status:', res.status);
      if (!res.ok) {
        const err = await res.json();
        console.error('❌ OpenAI TTS error:', err);
        return;
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      console.log('🎵 Playing audio (click mic to ask next question)');
      const audio = new Audio(audioUrl);
      audio.play();
    } catch (err) {
      console.error('💥 TTS error:', err);
    }
  }

  window.addEventListener('load', () => {
    if (sessionId) {
      // returning user — load right in
      addMsg('ai', "Welcome back! 👋 What are you looking for today?");
    } else {
      addMsg('ai', "Hey! 👋 I'm your personal Gulf Coast concierge.<br><br>I know every restaurant, happy hour, live music spot, and activity around here. What can I help you find?");
    }
  });
</script>
</body>
</html>
