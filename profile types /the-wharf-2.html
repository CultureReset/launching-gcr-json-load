<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Wharf v2 – Venue – Gulf Coast Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', system-ui, sans-serif; background: #f4f6f9; color: #0e1726; }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    .top-nav { background: #0b1f3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-logo { color: #fff; font-weight: 900; font-size: 1.1rem; letter-spacing: .5px; }
    .nav-logo span { color: #38bdf8; }
    .nav-back { color: #94a3b8; font-size: .85rem; font-weight: 600; cursor: pointer; }
    .nav-back:hover { color: #fff; }

    /* ── CAROUSEL ── */
    .carousel { position: relative; width: 100%; height: 500px; background: #0c2d48; overflow: hidden; }
    .carousel-slides { width: 100%; height: 100%; position: relative; }
    .carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity .5s ease; }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
    .carousel-slide .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 6rem; }
    .car-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.65) 0%, transparent 50%); pointer-events: none; }
    .car-hero { position: absolute; bottom: 36px; left: 32px; z-index: 10; color: #fff; }
    .car-hero-badge { display: inline-block; background: rgba(255,255,255,.15); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,.25); color: #fff; font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 5px 14px; border-radius: 999px; margin-bottom: 10px; }
    .car-hero-name { font-size: clamp(1.8rem, 4.5vw, 2.8rem); font-weight: 900; line-height: 1.1; text-shadow: 0 2px 14px rgba(0,0,0,.4); margin-bottom: 8px; }
    .car-hero-addr { font-size: .88rem; color: rgba(255,255,255,.8); }
    .car-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.45); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: background .2s; }
    .car-btn:hover { background: rgba(0,0,0,.8); }
    .car-prev { left: 16px; } .car-next { right: 16px; }
    .car-dots { position: absolute; bottom: 14px; right: 60px; display: flex; gap: 6px; z-index: 10; }
    .car-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.45); border: none; cursor: pointer; padding: 0; transition: background .2s; }
    .car-dot.active { background: #fff; }
    .car-count { position: absolute; bottom: 14px; right: 16px; background: rgba(0,0,0,.5); color: #fff; font-size: .7rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; z-index: 10; }

    /* ── QUICK STATS ── */
    .stats-bar { display: flex; flex-wrap: wrap; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; overflow: hidden; margin-bottom: 22px; }
    .stat-box { flex: 1; min-width: 90px; padding: 16px 10px; text-align: center; border-right: 1px solid #e2e8f0; }
    .stat-box:last-child { border-right: none; }
    .stat-icon { font-size: 1.3rem; }
    .stat-val { font-size: 1.15rem; font-weight: 900; color: #0b1f3a; margin-top: 3px; }
    .stat-lbl { font-size: .67rem; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; font-weight: 600; margin-top: 2px; }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 80px; }
    .two-col { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
    @media (max-width: 860px) { .two-col { grid-template-columns: 1fr; } .carousel { height: 300px; } }
    @media (max-width: 480px) {
      .carousel { height: 220px; }
      .car-hero { bottom: 16px; left: 16px; right: 16px; }
      .car-hero-name { font-size: 1.4rem; }
      .section { padding: 14px; border-radius: 12px; }
      .page-wrap { padding: 14px 12px 90px; }
      .action-bar { padding: 0 8px; }
      .action-tab { padding: 12px 14px; font-size: .78rem; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .hh-banner { padding: 14px; }
      .hh-icon { font-size: 1.6rem; }
      .biz-filter { padding: 0 8px; }
      .biz-filter-btn { padding: 7px 14px; font-size: .78rem; }
      .stats-bar { flex-wrap: wrap; gap: 8px; padding: 14px; }
      .stat-item { min-width: 80px; }
      .fleet-card { padding: 16px; }
      .price-row { font-size: .78rem; }
      .book-bar { padding: 12px 16px; }
      .top-nav { padding: 12px 16px; }
    }

    /* ── SECTION ── */
    .section { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 18px; border: 1px solid #e2e8f0; }
    .section-title { font-size: 1rem; font-weight: 800; color: #0b1f3a; margin-bottom: 16px; }

    /* ── ABOUT ── */
    .about-text { font-size: .92rem; color: #475569; line-height: 1.8; }
    .about-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .about-chip { background: #f1f5f9; color: #475569; font-size: .78rem; font-weight: 600; padding: 5px 12px; border-radius: 999px; border: 1px solid #e2e8f0; }

    /* ── DIRECTORY FILTER ── */
    .dir-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .dir-btn { padding: 7px 16px; border-radius: 999px; border: 1.5px solid #e2e8f0; background: #fff; font-size: .8rem; font-weight: 700; cursor: pointer; transition: all .15s; color: #475569; white-space: nowrap; }
    .dir-btn.active, .dir-btn:hover { background: #0b1f3a; color: #fff; border-color: #0b1f3a; }

    /* ── BUSINESS GRID ── */
    .biz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .biz-card { border: 1.5px solid #e2e8f0; border-radius: 14px; overflow: hidden; cursor: pointer; transition: border-color .2s, box-shadow .2s; background: #fff; text-decoration: none; color: inherit; display: block; }
    .biz-card:hover { border-color: #0b7a75; box-shadow: 0 4px 16px rgba(11,122,117,.1); }
    .biz-card-img { height: 110px; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
    .biz-card-cat { position: absolute; top: 8px; left: 8px; font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; padding: 3px 8px; border-radius: 999px; }
    .cat-dining        { background: #fef3c7; color: #92400e; }
    .cat-retail        { background: #ede9fe; color: #6d28d9; }
    .cat-entertainment { background: #dbeafe; color: #1e40af; }
    .cat-health        { background: #dcfce7; color: #166534; }
    .cat-bars          { background: #fce7f3; color: #9d174d; }
    .cat-accom         { background: #f0fdf4; color: #15803d; }
    .cat-services      { background: #fff7ed; color: #c2410c; }
    .cat-realestate    { background: #f8fafc; color: #475569; }
    .cat-events        { background: #fdf4ff; color: #7e22ce; }
    .cat-marina        { background: #cffafe; color: #0e7490; }
    .cat-bars         { background: #fce7f3; color: #9d174d; }
    .cat-sweets       { background: #fdf4ff; color: #7e22ce; }
    .biz-card-body { padding: 12px 14px 14px; }
    .biz-card-name { font-size: .9rem; font-weight: 800; color: #0b1f3a; margin-bottom: 3px; }
    .biz-card-desc { font-size: .75rem; color: #64748b; line-height: 1.5; margin-bottom: 8px; }
    .biz-card-meta { display: flex; align-items: center; justify-content: space-between; }
    .biz-card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .biz-tag { background: #f1f5f9; color: #64748b; font-size: .65rem; font-weight: 600; padding: 2px 7px; border-radius: 999px; }
    .biz-card-arrow { color: #94a3b8; font-size: .8rem; font-weight: 700; flex-shrink: 0; }
    .biz-card:hover .biz-card-arrow { color: #0b7a75; }

    /* ── ATTRACTIONS ── */
    .attractions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .attraction-card { border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px 16px; background: #f8fafc; text-align: center; }
    .attraction-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .attraction-name { font-size: .88rem; font-weight: 800; color: #0b1f3a; margin-bottom: 4px; }
    .attraction-desc { font-size: .75rem; color: #64748b; line-height: 1.5; }
    .attraction-badge { display: inline-block; margin-top: 8px; background: #dbeafe; color: #1e40af; font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; }

    /* ── EVENTS ── */
    .events-list { display: flex; flex-direction: column; gap: 10px; }
    .event-card { display: flex; gap: 14px; padding: 14px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; align-items: flex-start; }
    .event-date-box { background: #0b1f3a; color: #fff; border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 52px; flex-shrink: 0; }
    .event-month { font-size: .6rem; text-transform: uppercase; letter-spacing: 1px; color: #38bdf8; font-weight: 700; }
    .event-day { font-size: 1.3rem; font-weight: 900; line-height: 1; }
    .event-name { font-size: .9rem; font-weight: 800; color: #0b1f3a; margin-bottom: 3px; }
    .event-detail { font-size: .78rem; color: #64748b; line-height: 1.5; }
    .event-time { font-size: .75rem; font-weight: 700; color: #0b7a75; margin-top: 4px; }

    /* ── PHOTO GRID ── */
    .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (max-width: 600px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    .photo-thumb { aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; }
    .photo-thumb .ph-sm { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: linear-gradient(135deg, #dbeafe, #eff6ff); transition: transform .2s; }
    .photo-thumb:hover .ph-sm { transform: scale(1.05); }

    /* ── REVIEWS ── */
    .review-item { padding: 14px 0; border-bottom: 1px solid #f1f5f9; }
    .review-item:last-child { border-bottom: none; }
    .rev-top { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
    .rev-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #0b7a75, #38bdf8); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: .85rem; flex-shrink: 0; }
    .rev-name { font-weight: 700; font-size: .86rem; }
    .rev-date { font-size: .72rem; color: #94a3b8; }
    .rev-stars { color: #f59e0b; font-size: .82rem; margin-bottom: 5px; }
    .rev-text { font-size: .83rem; color: #475569; line-height: 1.65; }

    /* ── MAP ── */
    .map-ph { width: 100%; height: 220px; border-radius: 14px; background: linear-gradient(135deg, #dbeafe, #bfdbfe); display: flex; align-items: center; justify-content: center; font-size: .9rem; color: #3b82f6; font-weight: 700; gap: 8px; margin-bottom: 16px; }
    .loc-list { display: flex; flex-direction: column; gap: 7px; }
    .loc-row { display: flex; align-items: flex-start; gap: 8px; font-size: .85rem; color: #475569; }
    .loc-icon { font-size: .9rem; width: 18px; flex-shrink: 0; margin-top: 1px; }

    /* ── SIDEBAR ── */
    .sidebar-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 14px; }
    .sidebar-card.sticky { position: sticky; top: 80px; }
    .sc-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
    .sc-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .sc-title { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; font-weight: 700; margin-bottom: 10px; }
    .sc-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; border-radius: 10px; font-family: inherit; font-size: .85rem; font-weight: 700; cursor: pointer; border: none; margin-bottom: 8px; transition: all .15s; }
    .sc-btn:last-child { margin-bottom: 0; }
    .sc-btn-primary { background: #0b7a75; color: #fff; }
    .sc-btn-primary:hover { background: #096560; }
    .sc-btn-outline { background: transparent; color: #0b1f3a; border: 1.5px solid #e2e8f0; }
    .sc-btn-outline:hover { background: #0b1f3a; color: #fff; border-color: #0b1f3a; }
    .hours-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .82rem; border-bottom: 1px solid #f8fafc; }
    .hours-row:last-child { border-bottom: none; }
    .hours-day { font-weight: 600; color: #334155; }
    .hours-time { color: #64748b; }
    .hours-row.today .hours-day, .hours-row.today .hours-time { color: #0b7a75; font-weight: 800; }
    .info-row { display: flex; align-items: flex-start; gap: 8px; font-size: .82rem; color: #475569; padding: 5px 0; }
    .info-icon { font-size: .9rem; width: 18px; flex-shrink: 0; margin-top: 1px; }
    .social-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .social-btn { flex: 1; min-width: 70px; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 8px; border-radius: 8px; font-size: .75rem; font-weight: 700; cursor: pointer; border: 1.5px solid #e2e8f0; background: #f8fafc; color: #334155; transition: all .15s; }
    .social-btn:hover { background: #0b1f3a; color: #fff; border-color: #0b1f3a; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-logo">GULF<span>COAST</span>RADAR</div>
    <span class="nav-back" onclick="history.back()">← Back</span>
  </nav>

  <div class="carousel">
    <div class="carousel-slides" id="carSlides"></div>
    <div class="car-overlay"></div>
    <div class="car-hero">
      <div class="car-hero-badge" id="heroBadge"></div>
      <div class="car-hero-name" id="heroName">Loading...</div>
      <div class="car-hero-addr" id="heroAddr"></div>
    </div>
    <button class="car-btn car-prev" onclick="slideCarousel(-1)">&#8592;</button>
    <button class="car-btn car-next" onclick="slideCarousel(1)">&#8594;</button>
    <div class="car-dots" id="carDots"></div>
    <div class="car-count" id="carCount"></div>
  </div>

  <div class="page-wrap">
    <div class="two-col">

      <!-- LEFT -->
      <div>

        <div class="stats-bar" id="statsBar"></div>

        <div class="section">
          <div class="section-title">📖 About</div>
          <div class="about-text" id="aboutText"></div>
          <div class="about-chips" id="aboutChips"></div>
        </div>

        <!-- BUSINESS DIRECTORY -->
        <div class="section">
          <div class="section-title">🏪 Directory</div>
          <div class="dir-filter" id="dirFilter"></div>
          <div class="biz-grid" id="bizGrid"></div>
        </div>

        <!-- ATTRACTIONS -->
        <div class="section">
          <div class="section-title">🎡 Attractions & Entertainment</div>
          <div class="attractions-grid" id="attractionsGrid"></div>
        </div>

        <!-- EVENTS -->
        <div class="section">
          <div class="section-title">🎉 Events</div>
          <div class="events-list" id="eventsList"></div>
        </div>

        <!-- PHOTOS -->
        <div class="section">
          <div class="section-title">📸 Photos</div>
          <div class="photo-grid" id="photoGrid"></div>
        </div>

        <!-- REVIEWS -->
        <div class="section">
          <div class="section-title">⭐ Reviews</div>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
            <div style="font-size:2.8rem;font-weight:900;color:#0b1f3a;" id="revScore">–</div>
            <div>
              <div style="color:#f59e0b;font-size:1.1rem;" id="revStars"></div>
              <div style="font-size:.8rem;color:#94a3b8;margin-top:2px;" id="revCount"></div>
            </div>
          </div>
          <div id="reviewsList"></div>
        </div>

        <!-- LOCATION -->
        <div class="section">
          <div class="section-title">📍 Location & Parking</div>
          <div class="map-ph">🗺️ Interactive Map</div>
          <div class="loc-list" id="locList"></div>
        </div>

      </div>

      <!-- SIDEBAR -->
      <div>
        <div class="sidebar-card sticky">

          <div class="sc-section">
            <button class="sc-btn sc-btn-primary"  onclick="handleDirections()">🗺️ Get Directions</button>
            <button class="sc-btn sc-btn-outline"   onclick="handleCall()">📞 Call Us</button>
            <button class="sc-btn sc-btn-outline"   onclick="handleWebsite()">🌐 Visit Website</button>
          </div>

          <div class="sc-section">
            <div class="sc-title">Hours</div>
            <div id="hoursRows"></div>
          </div>

          <div class="sc-section">
            <div class="sc-title">Info</div>
            <div id="infoRows"></div>
          </div>

          <div class="sc-section">
            <div class="sc-title">Social</div>
            <div class="social-row" id="socialRow"></div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      const slug = new URLSearchParams(window.location.search).get('slug') || 'the-wharf-2';
      const s = document.createElement('script');
      s.src = 'data/' + slug + '.js';
      s.onload = function() { render(window.BUSINESS_DATA); };
      document.head.appendChild(s);
    })();
  </script>
  <script>
    let VENUE;

    // ── RENDER ─────────────────────────────────────────────────────
    function render(data) {
      VENUE = data;
      const V = data;
      document.title = V.name + ' – Gulf Coast Radar';
      document.getElementById('heroBadge').textContent = V.badge;
      document.getElementById('heroName').textContent  = V.name;
      document.getElementById('heroAddr').textContent  = V.address;
      document.getElementById('revScore').textContent  = V.rating.toFixed(1);
      document.getElementById('revStars').textContent  = '★'.repeat(Math.round(V.rating)) + '☆'.repeat(5 - Math.round(V.rating));
      document.getElementById('revCount').textContent  = V.reviewCount.toLocaleString() + ' reviews';

      // Carousel
      const slidesEl = document.getElementById('carSlides');
      const dotsEl   = document.getElementById('carDots');
      V.photos.forEach((ph, i) => {
        const s = document.createElement('div');
        s.className = 'carousel-slide' + (i === 0 ? ' active' : '');
        s.style.background = `linear-gradient(135deg,#0c2d48,#${['1a5276','0b4f78','0a3d62','154360','1c3a5e'][i % 5]})`;
        s.innerHTML = `<div class="ph">${ph.emoji}</div>`;
        slidesEl.appendChild(s);
        const d = document.createElement('button');
        d.className = 'car-dot' + (i === 0 ? ' active' : '');
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
      });
      updateCount();

      // Stats
      V.stats.forEach(s => {
        document.getElementById('statsBar').innerHTML +=
          `<div class="stat-box"><div class="stat-icon">${s.icon}</div><div class="stat-val">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`;
      });

      // About
      document.getElementById('aboutText').textContent = V.description;
      V.chips.forEach(c => { document.getElementById('aboutChips').innerHTML += `<span class="about-chip">${c}</span>`; });

      // Directory filter + grid
      const cats = ['All', ...new Set(V.businesses.map(b => b.cat))];
      let activeCat = 'All';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'dir-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
          activeCat = cat;
          document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderBizGrid(cat === 'All' ? V.businesses : V.businesses.filter(b => b.cat === cat));
        };
        document.getElementById('dirFilter').appendChild(btn);
      });
      renderBizGrid(V.businesses);

      // Attractions
      V.attractions.forEach(a => {
        document.getElementById('attractionsGrid').innerHTML +=
          `<div class="attraction-card"><div class="attraction-icon">${a.icon}</div><div class="attraction-name">${a.name}</div><div class="attraction-desc">${a.desc}</div><span class="attraction-badge">${a.badge}</span></div>`;
      });

      // Events
      V.events.forEach(e => {
        document.getElementById('eventsList').innerHTML +=
          `<div class="event-card"><div class="event-date-box"><div class="event-month">${e.month}</div><div class="event-day">${e.day}</div></div><div><div class="event-name">${e.name}</div><div class="event-detail">${e.detail}</div><div class="event-time">${e.time}</div></div></div>`;
      });

      // Photos
      V.photos.forEach(ph => {
        document.getElementById('photoGrid').innerHTML +=
          `<div class="photo-thumb"><div class="ph-sm">${ph.emoji}</div></div>`;
      });

      // Reviews
      V.reviews.forEach(r => {
        document.getElementById('reviewsList').innerHTML +=
          `<div class="review-item"><div class="rev-top"><div class="rev-avatar">${r.initials}</div><div><div class="rev-name">${r.name}</div><div class="rev-date">${r.date}</div></div></div><div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div><div class="rev-text">${r.text}</div></div>`;
      });

      // Location
      V.location.forEach(l => {
        document.getElementById('locList').innerHTML +=
          `<div class="loc-row"><span class="loc-icon">${l.icon}</span>${l.label}</div>`;
      });

      // Hours
      V.hours.forEach(h => {
        document.getElementById('hoursRows').innerHTML +=
          `<div class="hours-row${h.today ? ' today' : ''}"><span class="hours-day">${h.day}</span><span class="hours-time">${h.time}</span></div>`;
      });

      // Info
      V.info.forEach(i => {
        document.getElementById('infoRows').innerHTML +=
          `<div class="info-row"><span class="info-icon">${i.icon}</span><span>${i.label}</span></div>`;
      });

      // Social
      V.social.forEach(s => {
        document.getElementById('socialRow').innerHTML +=
          `<div class="social-btn">${s.icon} ${s.name}</div>`;
      });
    }

    function renderBizGrid(list) {
      const catClassMap = {
        'Restaurants + Eateries':      'cat-dining',
        'Retail':                      'cat-retail',
        'Entertainment + Attractions': 'cat-entertainment',
        'Health + Beauty':             'cat-health',
        'Bars + Tasting Rooms':        'cat-bars',
        'Accommodations':              'cat-accom',
        'Businesses + Services':       'cat-services',
        'Real Estate + Rentals':       'cat-realestate',
        'Event Venues':                'cat-events',
        'Marine Sales':                'cat-marina',
      };
      document.getElementById('bizGrid').innerHTML = list.map(b =>
        `<a href="${b.page || '#'}" class="biz-card" ${!b.page ? 'onclick="return false"' : ''}>
          <div class="biz-card-img" style="background:linear-gradient(135deg,#0c2d48,#1a5276);">
            ${b.emoji}
            <span class="biz-card-cat ${catClassMap[b.cat] || ''}">${b.cat}</span>
          </div>
          <div class="biz-card-body">
            <div class="biz-card-name">${b.name}</div>
            <div class="biz-card-desc">${b.desc}</div>
            <div class="biz-card-meta">
              <div class="biz-card-tags">${b.tags.map(t => `<span class="biz-tag">${t}</span>`).join('')}</div>
              <span class="biz-card-arrow">${b.page ? '→' : ''}</span>
            </div>
          </div>
        </a>`
      ).join('');
    }

    // ── CAROUSEL ───────────────────────────────────────────────────
    let cur = 0;
    function goTo(n) {
      const slides = document.querySelectorAll('.carousel-slide');
      const dots   = document.querySelectorAll('.car-dot');
      slides[cur].classList.remove('active'); dots[cur].classList.remove('active');
      cur = (n + slides.length) % slides.length;
      slides[cur].classList.add('active'); dots[cur].classList.add('active');
      updateCount();
    }
    function slideCarousel(dir) { goTo(cur + dir); }
    function updateCount() {
      const t = document.querySelectorAll('.carousel-slide').length;
      document.getElementById('carCount').textContent = (cur + 1) + ' / ' + t;
    }
    setInterval(() => slideCarousel(1), 5000);

    // ── ACTIONS ────────────────────────────────────────────────────
    function handleDirections() { window.open('https://maps.google.com/?q=' + encodeURIComponent(VENUE.address)); }
    function handleCall()       { window.location.href = 'tel:' + VENUE.phone; }
    function handleWebsite()    { window.open('https://' + VENUE.website); }

  </script>
</body>
</html>
