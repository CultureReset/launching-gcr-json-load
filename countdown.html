<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gulf Coast Radar - Coming Tomorrow!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 40%, #FFE4B5 70%, #F4A460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,30 Q300,0 600,30 T1200,30 L1200,120 L0,120 Z" fill="%2300CED1" opacity="0.3"/><path d="M0,50 Q300,30 600,50 T1200,50 L1200,120 L0,120 Z" fill="%231E90FF" opacity="0.2"/><path d="M0,70 Q300,50 600,70 T1200,70 L1200,120 L0,120 Z" fill="%230099CC" opacity="0.2"/></svg>') repeat-x;
            animation: wave 8s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(1200px); }
        }

        .countdown-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
            border: 2px solid rgba(0, 206, 209, 0.2);
            margin: 40px auto;
        }

        .gcr-logo {
            width: 140px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 8px 20px rgba(0, 206, 209, 0.2);
            border-radius: 12px;
        }

        h1 {
            font-size: 42px;
            color: #0099CC;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tagline {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .countdown-item {
            background: linear-gradient(135deg, #00CED1 0%, #0099CC 100%);
            border-radius: 12px;
            padding: 25px 15px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 206, 209, 0.3);
        }

        .countdown-value {
            font-size: 42px;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 8px;
        }

        .countdown-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .description {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin: 40px 0;
        }

        .signup-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }

        .signup-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            display: block;
        }

        .email-form {
            display: grid;
            gap: 12px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .email-form input,
        .email-form select {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .email-form input:focus,
        .email-form select:focus {
            outline: none;
            border-color: #00CED1;
        }

        .checkbox-group {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            text-align: left;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00CED1;
        }

        .checkbox-item label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
            margin: 0;
        }

        .email-form button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00CED1 0%, #0099CC 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 206, 209, 0.3);
            margin-top: 12px;
            width: 100%;
        }

        .email-form button:hover {
            transform: scale(1.02);
        }

        .email-form button:active {
            transform: scale(0.98);
        }

        .social-links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #E0F6FF;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0099CC;
            text-decoration: none;
            transition: all 0.3s;
            border: 2px solid #00CED1;
        }

        .social-links a:hover {
            background: linear-gradient(135deg, #00CED1 0%, #0099CC 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 206, 209, 0.3);
        }

        @media (max-width: 500px) {
            .countdown-container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 32px;
            }

            .gcr-logo {
                width: 100px;
            }

            .countdown {
                gap: 12px;
            }

            .countdown-value {
                font-size: 32px;
            }

            .countdown-label {
                font-size: 11px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .email-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="countdown-container">
        <img src="gcr-logo.png" alt="Gulf Coast Radar" class="gcr-logo">

        <h1>Gulf Coast Radar</h1>
        <p class="tagline">Coming Tomorrow!</p>

        <div class="countdown">
            <div class="countdown-item">
                <div class="countdown-value" id="days">0</div>
                <div class="countdown-label">Days</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="hours">0</div>
                <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="minutes">0</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-item">
                <div class="countdown-value" id="seconds">0</div>
                <div class="countdown-label">Seconds</div>
            </div>
        </div>

        <p class="description">
            Your guide to the best dining, events, activities, and everything Gulf Shores & Orange Beach has to offer.
        </p>

        <div class="signup-section">
            <label class="signup-label">Join us when we launch tomorrow!</label>
            <form class="email-form" onsubmit="handleSignup(event)">
                <div class="form-row">
                    <input type="text" placeholder="First & Last Name" id="fullName" required>
                    <input type="email" placeholder="Email" id="email" required>
                </div>
                <div class="form-row">
                    <input type="tel" placeholder="Phone Number" id="phone" required>
                </div>
                <div class="form-row">
                    <input type="date" id="arrivalDate" placeholder="Arrival Date" required>
                    <input type="date" id="departureDate" placeholder="Departure Date" required>
                </div>

                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="emailOptIn" checked>
                        <label for="emailOptIn">📧 Send me email updates</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="smsOptIn" checked>
                        <label for="smsOptIn">📱 Send me SMS updates</label>
                    </div>
                </div>

                <button type="submit">Get Early Access</button>
            </form>
        </div>

        <div class="social-links">
            <a href="#" title="Facebook">f</a>
            <a href="#" title="Instagram">📷</a>
            <a href="#" title="Twitter">𝕏</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.1"></script>
    <script>
        // Supabase for backup storage
        const supabase = window.supabase.createClient(
            'https://mhafixflyffflwjhcgfn.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYWZpeGZseWZmZmx3amhjZ2ZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTA4MzUsImV4cCI6MjA4NzM4NjgzNX0.3KW-rGnLhJQ1u3IsSeoGFfgQpcoJNdBGFOGnhc88tHw'
        );

        function updateCountdown() {
            // Target: May 7, 2026 at 12:00 PM
            const launchDate = new Date('2026-05-07T12:00:00').getTime();
            const now = new Date().getTime();
            const timeLeft = launchDate - now;

            if (timeLeft <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                return;
            }

            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        async function handleSignup(event) {
            event.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const arrivalDate = document.getElementById('arrivalDate').value;
            const departureDate = document.getElementById('departureDate').value;
            const emailOptIn = document.getElementById('emailOptIn').checked;
            const smsOptIn = document.getElementById('smsOptIn').checked;
            const button = event.target.querySelector('button');
            const originalText = button.textContent;

            // Calculate days in town
            const arrival = new Date(arrivalDate);
            const departure = new Date(departureDate);
            const daysInTown = Math.ceil((departure - arrival) / (1000 * 60 * 60 * 24));

            try {
                button.disabled = true;
                button.textContent = 'Saving...';

                const leadData = {
                    lead_name: fullName,
                    stage: 'new',
                    product_interest: ['GCR Countdown'],
                    notes: `Email: ${email}\nPhone: ${phone}\nArrival: ${arrivalDate}\nDeparture: ${departureDate}\nDays: ${daysInTown}\nEmail Opt-in: ${emailOptIn ? 'Yes' : 'No'}\nSMS Opt-in: ${smsOptIn ? 'Yes' : 'No'}\nSource: GCR Countdown Launch Page`
                };

                let saved = false;

                // Try API first
                try {
                    const response = await fetch('http://localhost:3000/api/leads', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(leadData)
                    });
                    const data = await response.json();
                    if (data.success) saved = true;
                } catch (apiErr) {
                    console.warn('API unavailable, using Supabase backup');
                }

                // Backup to Supabase
                if (!saved) {
                    try {
                        await supabase.from('gcr_countdown_signups').insert([{
                            name: fullName,
                            email: email,
                            phone: phone,
                            arrival_date: arrivalDate,
                            departure_date: departureDate,
                            days_in_town: daysInTown,
                            email_optin: emailOptIn,
                            sms_optin: smsOptIn,
                            created_at: new Date().toISOString()
                        }]);
                        saved = true;
                    } catch (sbErr) {
                        console.error('Supabase backup error:', sbErr);
                    }
                }

                alert(`Thanks ${fullName}! We've got your info. We'll notify you when we launch!`);
                event.target.reset();
            } catch (err) {
                console.error('Signup error:', err);
                alert(`Thanks! We'll notify you when we launch!`);
                event.target.reset();
            } finally {
                button.disabled = false;
                button.textContent = originalText;
            }
        }

        // Update countdown every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
