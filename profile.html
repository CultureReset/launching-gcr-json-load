<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">Business Profile – Gulf Coast Radar</title>
  <meta id="page-desc" name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <script>
  // ── Load business data from GCR API ──
  (async function () {
    const slug = new URLSearchParams(location.search).get('id') || window.GCR_SLUG;
    if (!slug) { document.body.innerHTML = '<p style="padding:40px;color:red">No business slug in URL (?id=your-slug)</p>'; return; }

    const GCR_API = 'https://cybercheck-api-database.vercel.app/api/gcr/businesses/';
    let raw;
    try {
      const res = await fetch(GCR_API + encodeURIComponent(slug));
      if (!res.ok) throw new Error('Not found');
      raw = await res.json();
    } catch (e) {
      document.body.innerHTML = `<p style="padding:40px;color:red">Could not load business: ${slug}</p>`;
      return;
    }

    // ── Map API response → BUSINESS_DATA format ──
    function buildSections(d) {
      const s = [];
      s.push({ id: 'about', label: 'About', icon: 'ℹ️' });
      if (d.happyHour)                    s.push({ id: 'happy-hour',   label: 'Happy Hour',   icon: '🍺' });
      if (d.highlights?.length)           s.push({ id: 'highlights',   label: 'Highlights',   icon: '✦'  });
      if (d.schedules?.length)            s.push({ id: 'schedules',    label: 'Times & Tickets', icon: '🎟️' });
      if (d.fleet?.length)                s.push({ id: 'fleet',        label: 'Fleet',        icon: '⛵' });
      if (d.addons?.length)               s.push({ id: 'addons',       label: 'Add-Ons',      icon: '🎒' });
      if (d.specials?.length)             s.push({ id: 'specials',     label: 'Specials',     icon: '⭐' });
      if (d.events?.length)               s.push({ id: 'events',       label: 'Events',       icon: '📅' });
      if (d.restrictions?.length)         s.push({ id: 'restrictions', label: 'Guest Info',   icon: '📋' });
      if (d.whatToBring?.length)          s.push({ id: 'whatToBring',  label: 'What to Bring',icon: '🎒' });
      // Don't show Packages tab if packages are cruise/tour time slots (already shown as Times & Tickets)
      const _pkgsAreSlots = d.packages?.length && d.packages[0]?.desc?.includes(':');
      if (d.packages?.length && !_pkgsAreSlots) s.push({ id: 'packages', label: 'Packages', icon: '🎟️' });
      if (d.games?.length)                s.push({ id: 'games',        label: 'Games',        icon: '🎮' });
      if (d.bookABay)                     s.push({ id: 'book-a-bay',   label: 'Book a Bay',   icon: '🏌️' });
      if (d.league)                       s.push({ id: 'league',       label: 'League',       icon: '🏆' });
      // food menu sections — one tab per unique meal grouping
      const _foodMenu = Array.isArray(d.menu) ? d.menu : mapFoodMenu(d.menu);
      if (_foodMenu.length) {
        const mealLabels = { brunch:'Sunday Brunch', lunch:'Lunch', dinner:'Dinner', kids:'Kids Menu', 'gluten-free':'Gluten-Free', other:'Menu' };
        const mealIcons  = { brunch:'🥂', lunch:'🍽️', dinner:'🌙', kids:'👶', 'gluten-free':'🌿', other:'🍽️' };
        const seen = new Set();
        _foodMenu.forEach(cat => {
          const m = cat.meal || 'other';
          if (!seen.has(m)) {
            seen.add(m);
            s.push({ id: 'meal-'+m, mealId: m, label: mealLabels[m] || m.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), icon: mealIcons[m] || '🍽️' });
          }
        });
        // If all items are 'other' meal, collapse into single "Menu" tab
        if (seen.size === 1 && seen.has('other')) {
          const idx = s.findIndex(x => x.id === 'other');
          if (idx !== -1) s[idx].label = 'Menu';
        }
      }
      // bar menu sections
      if (d.barMenu) {
        d.barMenu.forEach(cat => {
          const id = cat.category.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
          s.push({ id, label: cat.category, icon: '🍹', barCat: cat.category });
        });
      }
      s.push({ id: 'gallery',  label: 'Photos',   icon: '📸' });
      s.push({ id: 'reviews',  label: 'Reviews',  icon: '⭐' });
      s.push({ id: 'hours',    label: 'Hours',    icon: '🕐' });
      s.push({ id: 'location', label: 'Location', icon: '📍' });
      return s;
    }

    // Map hours object/string from API to array format the template expects
    function mapHours(h) {
      if (Array.isArray(h)) return h;
      if (typeof h === 'object' && h !== null) {
        const dayMap = { mon:'Monday', tue:'Tuesday', wed:'Wednesday', thu:'Thursday', fri:'Friday', sat:'Saturday', sun:'Sunday',
                         monday:'Monday', tuesday:'Tuesday', wednesday:'Wednesday', thursday:'Thursday', friday:'Friday', saturday:'Saturday', sunday:'Sunday' };
        return Object.entries(h).map(([k, v]) => {
          const day = dayMap[k.toLowerCase()] || k;
          if (typeof v === 'string') {
            const parts = v.split(/[-–]/);
            return { day, open: parts[0]?.trim() || v, close: parts[1]?.trim() || '' };
          }
          return { day, open: v.open || '', close: v.close || '', closed: v.closed || false };
        });
      }
      return [];
    }

    // Map gallery — API returns array of URLs or objects with url property
    function mapGallery(g) {
      if (!Array.isArray(g)) return [];
      return g.map(item => typeof item === 'string' ? { url: item, caption: '' } : item);
    }

    // Build foodMenu — handles API array format, legacy object format, and template format
    function mapFoodMenu(menu) {
      if (!menu) return [];
      // New API format: array of {category, meal, items[]}
      if (Array.isArray(menu)) return menu;
      // Legacy object format with packages only — skip
      if (menu.packages && Object.keys(menu).length === 1) return [];
      // Old object format: { categoryKey: [{name,desc,price}] } or { meal: [{category,items[]}] }
      const MEAL_KEYS = ['brunch','lunch','dinner','kids','gluten-free','other'];
      return Object.entries(menu)
        .filter(([key]) => key !== 'packages')
        .flatMap(([key, val]) => {
          if (!Array.isArray(val) || !val.length) return [];
          if (val[0] && val[0].items) return val.map(cat => ({ ...cat, meal: key }));
          const meal = MEAL_KEYS.includes(key) ? key : 'other';
          const label = key.replace(/-/g,' ').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
          return [{ meal, category: label, items: val }];
        });
    }

    // ── Normalize features: handle both string[] and {icon,label,value}[] ──
    function mapFeatures(f) {
      if (!Array.isArray(f)) return [];
      return f.map(item => typeof item === 'string' ? item : [item.label, item.value].filter(Boolean).join(': '));
    }

    // ── Map schedules from multiple sources ──
    function mapSchedules(raw) {
      // 1. Explicit schedules JSONB field (most structured)
      if (raw.schedules?.length) return raw.schedules;
      // 2. rental_pricing table rows → group by time slot
      if (raw.pricing?.length) {
        const slots = {};
        raw.pricing.forEach(p => {
          const key = p.slot_label || p.name || 'Pricing';
          if (!slots[key]) slots[key] = { name: key, time: p.time || '', tickets: [] };
          slots[key].tickets.push({ name: p.name || p.description || '', price: p.price || p.rate || '' });
        });
        return Object.values(slots);
      }
      // 3. packages[] where each package is a cruise/tour time slot
      //    desc format: "Adult (Ages 13–59): $33 · Child (Ages 4–12): $26.40 · ..."
      if (raw.packages?.length && raw.packages[0]?.desc?.includes(':')) {
        return raw.packages.map(p => {
          const tickets = (p.desc || '').split('·').map(part => {
            const match = part.match(/^(.+?):\s*\$?([\d.]+)/);
            if (match) return { name: match[1].trim(), price: match[2].trim() };
            return null;
          }).filter(Boolean);
          return {
            time: p.name || '',
            name: [p.badge, p.duration].filter(Boolean).join(' · '),
            tickets: tickets.length ? tickets : [{ name: 'From', price: (p.price||'').replace(/[^0-9.]/g,'') }],
          };
        });
      }
      // 4. menu.packages (simple pricing list)
      if (raw.menu?.packages?.length) {
        return [{ name: 'Ticket Pricing', time: '', tickets: raw.menu.packages.map(p => ({ name: p.name, price: p.price })) }];
      }
      return [];
    }

    // ── Map highlights from multiple possible sources ──
    function mapHighlights(raw) {
      if (raw.highlights?.length) return raw.highlights;
      if (raw.whats_included?.length) return raw.whats_included;
      return [];
    }

    // ── Map restrictions/guest info from multiple sources ──
    function mapRestrictions(raw) {
      if (raw.restrictions?.length) return raw.restrictions;
      if (raw.qna?.length) return raw.qna.map(q => q.question ? `${q.question} ${q.answer || ''}`.trim() : String(q));
      return [];
    }

    // ── Map food menu (only for actual food businesses, not pricing) ──
    function mapFoodMenuSafe(raw) {
      if (!raw.menu) return [];
      if (Array.isArray(raw.menu)) return raw.menu; // new API array format
      if (raw.menu.packages && Object.keys(raw.menu).length === 1) return []; // pricing only
      return mapFoodMenu(raw.menu);
    }

    const _schedules    = mapSchedules(raw);
    const _highlights   = mapHighlights(raw);
    const _restrictions = mapRestrictions(raw);

    window.BUSINESS_DATA = {
      name:         raw.name        || '',
      slug:         raw.slug        || slug,
      tagline:      raw.tagline     || '',
      category:     raw.type        || '',
      emoji:        raw.emoji       || '🏢',
      phone:        raw.phone       || '',
      phoneDisplay: raw.phone       || '',
      address:      raw.address     || '',
      city:         raw.city        || '',
      state:        raw.state       || '',
      zip:          raw.zip         || '',
      website:      raw.website     || '',
      googleMaps:   raw.social?.google_maps || '',
      instagram:    raw.social?.instagram   || '',
      facebook:     raw.social?.facebook    || '',
      rating:       raw.rating      || null,
      reviewCount:  raw.review_count|| 0,
      coverImages:  mapGallery(raw.gallery).slice(0,5).map(g => g.url || g),
      gallery:      mapGallery(raw.gallery),
      reviews:      raw.reviews     || [],
      hours:        mapHours(raw.hours),
      about: {
        description: raw.description || '',
        features:    mapFeatures(raw.features),
        perfectFor:  raw.perfectFor  || [],
        included:    raw.whats_included || [],
      },
      happyHour:    raw.happyHour   || raw.happy_hour || null,
      fleet:        raw.fleet       || [],
      addons:       raw.addons      || [],
      specials:     raw.specials    || [],
      events:       raw.events      || [],
      schedules:    _schedules,
      highlights:   _highlights,
      restrictions: _restrictions,
      whatToBring:  raw.whatToBring || raw.what_to_bring || [],
      packages:     raw.packages    || [],
      games:        raw.games       || [],
      bookABay:     raw.bookABay    || null,
      league:       raw.league      || null,
      faq:          raw.faq         || [],
      foodMenu:     mapFoodMenuSafe(raw),
      barMenu:      raw.barMenu     || null,
      sections:     buildSections({ ...raw, schedules: _schedules, highlights: _highlights, restrictions: _restrictions }),
    };

    // Fire the render — defined below in the main script block
    if (typeof renderPage === 'function') renderPage();
  })();
  </script>

  <style>
    :root {
      --bg:     #0b1220;
      --card:   #ffffff;
      --ink:    #0e1726;
      --muted:  #5c6b81;
      --accent: #0ea5e9;
      --chip:   #eef6ff;
      --border: #e6ecf3;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#f6f8fb; color:var(--ink); font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    a { color:var(--accent); text-decoration:none; }

    /* Wrap */
    .wrap { max-width:980px; margin:0 auto; padding-bottom:64px; }

    /* Cover Slideshow */
    .cover { position:relative; width:100%; aspect-ratio:16/9; background:#0c2d48; overflow:hidden; }
    .cover-slides { display:flex; width:100%; height:100%; transition:transform .5s ease; }
    .cover-slide { min-width:100%; height:100%; background:linear-gradient(135deg,#cfe9ff,#e9f3ff); flex-shrink:0; }
    .cover-slide img { width:100%; height:100%; object-fit:cover; object-position:center bottom; display:block; }
    .cover-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.45); border:none; color:#fff; font-size:22px; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:background .2s; }
    .cover-arrow:hover { background:rgba(0,0,0,.7); }
    .cover-prev { left:12px; }
    .cover-next { right:12px; }
    .cover-dots { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:10; }
    .cover-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.5); border:none; cursor:pointer; padding:0; transition:background .2s; }
    .cover-dot.active { background:#fff; }

    /* Header */
    .header { padding:16px 20px; background:var(--card); border-bottom:1px solid var(--border); }
    .title { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
    .title h1 { font-size:clamp(22px,3.8vw,32px); margin:0; }
    .meta { display:flex; gap:16px; flex-wrap:wrap; color:var(--muted); margin-top:6px; font-size:14px; }
    .meta-item { display:flex; align-items:center; gap:6px; }
    .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .badge { background:var(--chip); color:#0b6aa3; border:1px solid #cfe6ff; padding:6px 10px; border-radius:999px; font-size:13px; }

    /* CTA buttons */
    .cta-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:999px; font-size:14px; font-weight:700; transition:all .2s; white-space:nowrap; text-decoration:none; }
    .btn-call { background:#22c55e; color:#fff; }
    .btn-call:hover { background:#16a34a; transform:translateY(-1px); }
    .btn-dir  { background:var(--accent); color:#fff; }
    .btn-dir:hover  { background:#0284c7; transform:translateY(-1px); }
    .btn-web  { background:var(--chip); color:var(--ink); border:1px solid var(--border); }
    .btn-web:hover  { background:var(--border); }

    /* Social */
    .social-row { display:flex; gap:10px; margin-top:12px; }
    .social-btn { width:36px; height:36px; border-radius:50%; background:var(--chip); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .social-btn:hover { background:var(--accent); border-color:var(--accent); }
    .social-btn:hover svg { fill:#fff; }
    .social-btn svg { width:17px; height:17px; fill:var(--muted); }

    /* Sticky nav */
    .sticky-wrap { position:sticky; top:var(--header-h,0px); z-index:999; }
    .sticky-nav { background:rgba(255,255,255,0.95); backdrop-filter:blur(6px); border-bottom:1px solid var(--border); box-shadow:var(--shadow); }
    .tabs { display:flex; overflow:auto; gap:8px; padding:10px 12px; scroll-snap-type:x mandatory; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { white-space:nowrap; padding:8px 14px; border:1px solid var(--border); border-radius:999px; background:#fff; font-size:14px; font-weight:500; cursor:pointer; scroll-snap-align:start; transition:all .2s; color:var(--ink); }
    .tab:hover { border-color:var(--accent); color:var(--accent); }
    .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* Sections */
    section { padding:20px; scroll-margin-top:72px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; box-shadow:var(--shadow); }
    h2 { font-size:20px; margin:0 0 8px 0; }
    h3 { font-size:15px; color:var(--accent); margin:16px 0 8px 0; border-bottom:1px solid var(--border); padding-bottom:6px; }

    /* Menu grid — 1 col → 2 col → 3 col */
    .menu-grid { display:grid; grid-template-columns:repeat(1, minmax(0,1fr)); gap:12px; }
    @media (min-width:640px)  { .menu-grid { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (min-width:900px)  { .menu-grid { grid-template-columns:repeat(3, minmax(0,1fr)); } }
    .item { border:1px solid var(--border); border-radius:10px; padding:12px; background:#fff; }
    .item .name { font-weight:600; font-size:14px; }
    .item .desc { color:var(--muted); font-size:13px; margin-top:4px; line-height:1.4; }
    .item .price { font-size:14px; font-weight:700; color:var(--accent); margin-top:6px; }

    /* Spirits chips */
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
    .chip { background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:13px; color:var(--ink); }

    /* Happy Hour */
    .hh-time { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:12px; }
    .hh-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .hh-row:last-child { border-bottom:none; }
    .hh-name { font-weight:600; font-size:14px; }
    .hh-desc { font-size:12px; color:var(--muted); margin-top:2px; }
    .hh-price { font-size:16px; font-weight:800; color:#22c55e; }

    /* Specials */
    .special { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; border:1px solid var(--border); border-radius:12px; padding:16px; background:#fff; }
    .special-badge { background:var(--accent); color:#fff; border-radius:8px; padding:6px 12px; font-size:14px; font-weight:800; white-space:nowrap; flex-shrink:0; }
    .special-name { font-weight:700; font-size:15px; margin-bottom:4px; }
    .special-desc { font-size:13px; color:var(--muted); line-height:1.5; }

    /* Packages */
    .pkg-grid { display:grid; grid-template-columns:repeat(1,1fr); gap:16px; }
    @media (min-width:640px) { .pkg-grid { grid-template-columns:repeat(3,1fr); } }
    .pkg { border:2px solid var(--border); border-radius:12px; padding:20px; background:#fff; transition:all .2s; }
    .pkg:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow); }
    .pkg-tag { display:inline-block; background:var(--accent); color:#fff; border-radius:6px; padding:3px 10px; font-size:11px; font-weight:700; text-transform:uppercase; margin-bottom:8px; }
    .pkg-name { font-size:18px; font-weight:800; margin-bottom:4px; }
    .pkg-price { font-size:30px; font-weight:900; color:var(--accent); }
    .pkg-dur { font-size:12px; color:var(--muted); margin:2px 0 10px; }
    .pkg-desc { font-size:13px; color:var(--muted); line-height:1.6; }

    /* League */
    .league-price { font-size:34px; font-weight:900; color:var(--accent); }
    .league-sched { font-size:13px; color:var(--muted); margin:4px 0 12px; }
    .league-desc { font-size:14px; line-height:1.7; margin-bottom:14px; }
    .perks { display:flex; flex-wrap:wrap; gap:8px; }
    .perk { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:999px; padding:5px 12px; font-size:12px; color:#166534; font-weight:500; }

    /* Bay */
    .bay { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
    .bay-price { font-size:42px; font-weight:900; color:var(--accent); white-space:nowrap; }
    .bay-name { font-size:18px; font-weight:700; margin-bottom:4px; }
    .bay-cap { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .bay-desc { font-size:13px; color:var(--muted); line-height:1.5; }

    /* Events */
    .evt-badge { display:inline-block; background:#fef3c7; color:#92400e; border:1px solid #fde68a; border-radius:6px; padding:3px 10px; font-size:11px; font-weight:700; margin-bottom:8px; }
    .evt-name { font-size:16px; font-weight:700; margin-bottom:6px; }
    .evt-desc { font-size:13px; color:var(--muted); line-height:1.5; }
    .evt-note { font-size:12px; color:var(--accent); margin-top:8px; font-weight:600; }

    /* Hours */
    .hours { list-style:none; padding:0; margin:0; display:grid; gap:2px; }
    .hours li { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; color:var(--muted); }
    .hours li:last-child { border-bottom:none; }
    .hours li .day { font-weight:600; color:var(--ink); }
    .hours li.today .day,
    .hours li.today .time { color:var(--accent); font-weight:700; }

    /* About tags */
    .tag-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .tag { background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:13px; }
    .sub-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:14px 0 8px; }
    .about-p { font-size:14px; color:var(--muted); line-height:1.8; margin-bottom:14px; }

    /* Card note */
    .note { font-size:12px; color:var(--muted); font-style:italic; margin-bottom:10px; }

    /* Location */
    .loc-addr { font-size:15px; font-weight:600; line-height:1.6; margin-bottom:14px; }

    /* ── Popup Modal ── */
    .popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:2000; overflow-y:auto; padding:20px; }
    .popup-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
    .popup-box { background:#fff; border-radius:16px; width:100%; max-width:780px; padding:28px; position:relative; margin:auto; }
    .popup-close { position:absolute; top:14px; right:14px; background:#f0f0f0; border:none; border-radius:50%; width:36px; height:36px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#555; transition:background .2s; }
    .popup-close:hover { background:#e0e0e0; color:#000; }
    .popup-title { font-size:22px; font-weight:800; margin:0 40px 20px 0; }

    /* Gallery grid */
    .gallery-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media (min-width:500px) { .gallery-grid { grid-template-columns:repeat(3,1fr); } }
    @media (min-width:700px) { .gallery-grid { grid-template-columns:repeat(4,1fr); } }
    .gallery-img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; cursor:pointer; transition:opacity .2s; background:#eee; }
    .gallery-img:hover { opacity:.85; }
    .gallery-caption { font-size:11px; color:var(--muted); text-align:center; margin-top:3px; }
    .popup-pagination { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:20px; }
    .popup-page-btn { padding:8px 20px; border-radius:999px; border:1px solid var(--border); background:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--ink); }
    .popup-page-btn:hover:not(:disabled) { background:var(--accent); color:#fff; border-color:var(--accent); }
    .popup-page-btn:disabled { opacity:.35; cursor:default; }
    .popup-page-info { font-size:13px; color:var(--muted); }

    /* Reviews */
    .review-card { border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
    .review-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .review-author { font-weight:700; font-size:14px; }
    .review-date { font-size:12px; color:var(--muted); }
    .review-stars { color:#f59e0b; font-size:15px; margin-bottom:6px; }
    .review-text { font-size:13px; color:var(--muted); line-height:1.6; }
    .no-content { text-align:center; color:var(--muted); padding:30px 0; font-size:14px; }

    /* Clickable section cards */
    .section-btn { display:flex; align-items:center; justify-content:space-between; width:100%; background:var(--chip); border:1px solid var(--border); border-radius:12px; padding:16px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--ink); margin-bottom:8px; }
    .section-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .section-btn-arrow { font-size:18px; }

    @media (max-width:480px) {
      .bay { flex-direction:column; gap:10px; }
    }
  </style>

<script>
function renderPage() {
  const B = window.BUSINESS_DATA;
  if (!B) { document.body.innerHTML = '<p style="padding:40px;color:red">No business data loaded.</p>'; return; }

  // Set CSS var so sticky section tabs sit right below the header
  const hdr = document.querySelector('.gcr-header');
  if (hdr) document.documentElement.style.setProperty('--header-h', hdr.offsetHeight + 'px');

  // ── Page meta ──
  document.getElementById('page-title').textContent = B.name + ' – Gulf Coast Radar';
  if (B.tagline) document.getElementById('page-desc').content = B.tagline;

  // ── Cover Slideshow ──
  const slides = B.coverImages || [];
  const slidesEl = document.getElementById('js-slides');
  const dotsEl   = document.getElementById('js-dots');
  let currentSlide = 0;

  if (slides.length === 0) {
    // default gradient placeholder
    slidesEl.innerHTML = `<div class="cover-slide"></div>`;
    document.getElementById('js-prev').style.display = 'none';
    document.getElementById('js-next').style.display = 'none';
  } else {
    slides.forEach((src, i) => {
      slidesEl.innerHTML += `<div class="cover-slide"><img src="${src}" alt="${B.name} photo ${i+1}" onerror="this.parentElement.style.background='linear-gradient(135deg,#cfe9ff,#e9f3ff)'"></div>`;
      dotsEl.innerHTML += `<button class="cover-dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`;
    });
    if (slides.length === 1) {
      document.getElementById('js-prev').style.display = 'none';
      document.getElementById('js-next').style.display = 'none';
    }
  }

  function goSlide(n) {
    currentSlide = (n + slides.length) % slides.length;
    slidesEl.style.transform = `translateX(-${currentSlide * 100}%)`;
    document.querySelectorAll('.cover-dot').forEach((d,i) => d.classList.toggle('active', i === currentSlide));
  }
  document.getElementById('js-prev').onclick = () => goSlide(currentSlide - 1);
  document.getElementById('js-next').onclick = () => goSlide(currentSlide + 1);
  if (slides.length > 1) setInterval(() => goSlide(currentSlide + 1), 5000);

  // ── Emoji + Name ──
  document.getElementById('js-emoji').textContent = B.emoji || '🏢';
  document.getElementById('js-name').textContent = B.name;

  // ── Meta row ──
  const meta = document.getElementById('js-meta');
  const addMeta = (icon, text) => meta.innerHTML += `<span class="meta-item">${icon} ${text}</span>`;
  if (B.tagline)      addMeta('', `<em>${B.tagline}</em>`);
  if (B.city)         addMeta('📍', `${B.city}, ${B.state}`);
  if (B.phoneDisplay) addMeta('📞', B.phoneDisplay);
  if (B.rating)       addMeta('⭐', `${B.rating} (${B.reviewCount} reviews)`);

  // ── Badges ──
  const badges = document.getElementById('js-badges');
  (B.about?.features || []).forEach(f => {
    badges.innerHTML += `<span class="badge">${f}</span>`;
  });

  // ── CTA ──
  const cta = document.getElementById('js-cta');
  if (B.phone)      cta.innerHTML += `<a href="tel:${B.phone}" class="btn btn-call">📞 Call Now</a>`;
  if (B.googleMaps) cta.innerHTML += `<a href="${B.googleMaps}" target="_blank" class="btn btn-dir">📍 Directions</a>`;
  if (B.website)    cta.innerHTML += `<a href="${B.website}" target="_blank" class="btn btn-web">🌐 Website</a>`;

  // ── Socials ──
  const social = document.getElementById('js-social');
  if (B.instagram) social.innerHTML += `<a href="${B.instagram}" target="_blank" class="social-btn" title="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;
  if (B.facebook)  social.innerHTML += `<a href="${B.facebook}" target="_blank" class="social-btn" title="Facebook"><svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>`;

  // ── Tabs ──
  const tabsEl = document.getElementById('js-tabs');
  B.sections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.dataset.id = sec.id;
    btn.textContent = (sec.icon ? sec.icon + ' ' : '') + sec.label;
    btn.onclick = () => {
      if (sec.id === 'gallery')  { openGallery();  return; }
      if (sec.id === 'reviews')  { openReviews();  return; }
      const target = sec.scrollTo || sec.id;
      document.getElementById('sec-' + target)?.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    tabsEl.appendChild(btn);
  });

  // ── Helper: menu category block ──
  function menuCatHTML(cat) {
    const isChips = cat.items.every(i => !i.price && !i.desc);
    let html = `<h3>${cat.category}</h3>`;
    if (cat.note) html += `<p class="note">${cat.note}</p>`;
    if (isChips) {
      html += `<div class="chips">${cat.items.map(i=>`<span class="chip">${i.name}</span>`).join('')}</div>`;
    } else {
      html += `<div class="menu-grid">${cat.items.map(i=>`
        <div class="item">
          <div class="name">${i.name}</div>
          ${i.desc  ? `<div class="desc">${i.desc}</div>` : ''}
          ${i.price ? `<div class="price">${i.price}</div>` : ''}
        </div>`).join('')}</div>`;
    }
    return html;
  }

  // ── Build Sections ──
  const container = document.getElementById('js-sections');

  B.sections.forEach(sec => {
    if (sec.scrollTo) return; // shortcut tab only — no section to render
    const el = document.createElement('section');
    el.id = 'sec-' + sec.id;
    let html = `<div class="card"><h2>${sec.icon ? sec.icon + ' ' : ''}${sec.label}</h2>`;

    // ── mealId sections — render all food categories matching that meal group ──
    if (sec.mealId && B.foodMenu) {
      const cats = B.foodMenu.filter(c => (c.meal || 'other') === sec.mealId);
      if (cats.length) {
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        cats.forEach(cat => { el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`; });
        container.appendChild(el);
        return;
      }
    }

    // ── barCat sections — render a single bar menu category ──
    if (sec.barCat && B.barMenu) {
      const cat = B.barMenu.find(c => c.category === sec.barCat);
      if (cat) {
        el.innerHTML = `<div class="card"><h2>${sec.icon||''} ${sec.label}</h2>${menuCatHTML(cat)}</div>`;
        container.appendChild(el);
        return;
      }
    }

    switch (sec.id) {

      case 'about':
        if (B.about) {
          html += `<p class="about-p">${B.about.description}</p>`;
          if (B.about.features?.length) {
            html += `<div class="sub-label">Features</div><div class="tag-row">${B.about.features.map(f=>`<span class="tag">${f}</span>`).join('')}</div>`;
          }
          if (B.about.perfectFor?.length) {
            html += `<div class="sub-label">Perfect For</div><div class="tag-row">${B.about.perfectFor.map(f=>`<span class="tag">${f}</span>`).join('')}</div>`;
          }
        }
        break;

      case 'food':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.foodMenu) B.foodMenu.forEach(cat => {
          el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`;
        });
        container.appendChild(el);
        return;

      case 'bar':
        // fallback — renders all bar categories (not normally hit with barCat sections)
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.barMenu) B.barMenu.forEach(cat => {
          el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`;
        });
        container.appendChild(el);
        return;

      case 'happy-hour':
        if (B.happyHour) {
          html += `<div class="hh-time">🍺 ${B.happyHour.schedule}</div>`;
          B.happyHour.deals.forEach(d => {
            html += `<div class="hh-row">
              <div><div class="hh-name">${d.name}</div>${d.desc?`<div class="hh-desc">${d.desc}</div>`:''}</div>
              ${d.price?`<div class="hh-price">${d.price}</div>`:''}
            </div>`;
          });
        }
        break;

      case 'specials':
        html += '</div>';
        if (B.specials) B.specials.forEach(s => {
          el.innerHTML += `<div class="special">
            ${s.badge?`<div class="special-badge">${s.badge}</div>`:''}
            <div><div class="special-name">${s.name}</div><div class="special-desc">${s.desc}</div></div>
          </div>`;
        });
        container.appendChild(el);
        return;

      case 'games':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.games) B.games.forEach(cat => {
          let catHTML = `<div class="card"><h3>${cat.category}</h3><div class="menu-grid">`;
          cat.items.forEach(i => {
            catHTML += `<div class="item"><div class="name">${i.name}</div>${i.desc?`<div class="desc">${i.desc}</div>`:''}</div>`;
          });
          catHTML += '</div></div>';
          el.innerHTML += catHTML;
        });
        container.appendChild(el);
        return;

      case 'packages':
        html += `</div><div class="pkg-grid">`;
        if (B.packages) B.packages.forEach(p => {
          html += `<div class="pkg">
            ${p.badge?`<div class="pkg-tag">${p.badge}</div>`:''}
            <div class="pkg-name">${p.name}</div>
            <div class="pkg-price">${p.price}</div>
            <div class="pkg-dur">⏱ ${p.duration}</div>
            <div class="pkg-desc">${p.desc}</div>
          </div>`;
        });
        html += `</div>`;
        el.innerHTML = html;
        container.appendChild(el);
        return;

      case 'league':
        if (B.league) {
          const l = B.league;
          html += `<div class="league-price">${l.price}</div>
            <div class="league-sched">📅 ${l.schedule} · ${l.format}</div>
            <div class="league-desc">${l.desc}</div>
            <div class="perks">${(l.perks||[]).map(p=>`<span class="perk">✓ ${p}</span>`).join('')}</div>`;
        }
        break;

      case 'book-a-bay':
        if (B.bookABay) {
          const bay = B.bookABay;
          html += `<div class="bay">
            <div class="bay-price">${bay.price}</div>
            <div><div class="bay-name">${bay.name}</div><div class="bay-cap">👥 ${bay.capacity}</div><div class="bay-desc">${bay.desc}</div></div>
          </div>`;
        }
        break;

      case 'events':
        if (B.events) B.events.forEach(e => {
          const evtName = e.name || e.title || '';
          const evtDesc = e.desc || e.description || '';
          html += `${e.badge?`<div class="evt-badge">${e.badge}</div>`:''}
            <div class="evt-name">${evtName}</div>
            <div class="evt-desc">${evtDesc}</div>
            ${e.note?`<div class="evt-note">📌 ${e.note}</div>`:''}`;
        });
        break;

      case 'fleet':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.fleet) B.fleet.forEach(f => {
          el.innerHTML += `<div class="card" style="margin-bottom:12px">
            ${f.image?`<img src="${f.image}" style="width:100%;border-radius:8px;margin-bottom:10px;max-height:200px;object-fit:cover" alt="${f.name}">`:''}
            ${f.badge?`<div class="pkg-tag">${f.badge}</div>`:''}
            <div style="font-size:18px;font-weight:800;margin:4px 0">${f.name}</div>
            ${f.description?`<div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">${f.description}</div>`:''}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              ${f.halfDay?`<div style="background:var(--chip);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Half Day</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${f.halfDay}</div></div>`:''}
              ${f.allDay?`<div style="background:var(--chip);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px">All Day</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${f.allDay}</div></div>`:''}
            </div>
            ${f.qty?`<div style="font-size:12px;color:var(--muted);margin-top:8px">Fleet: ${f.qty} available</div>`:''}
          </div>`;
        });
        container.appendChild(el);
        return;

      case 'docks':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.docks) B.docks.forEach(d => {
          el.innerHTML += `<div class="card" style="margin-bottom:12px">
            <div style="font-size:16px;font-weight:800;margin-bottom:4px">${d.name}</div>
            ${d.specs?`<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${d.specs}</div>`:''}
            ${d.desc?`<div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">${d.desc}</div>`:''}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              ${d.halfDay?`<div style="background:var(--chip);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Half Day</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${d.halfDay}</div></div>`:''}
              ${d.allDay?`<div style="background:var(--chip);border-radius:8px;padding:10px;text-align:center"><div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:2px">All Day</div><div style="font-size:18px;font-weight:800;color:var(--accent)">${d.allDay}</div></div>`:''}
            </div>
          </div>`;
        });
        container.appendChild(el);
        return;

      case 'addons':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.addons) B.addons.forEach(a => {
          el.innerHTML += `<div class="card" style="margin-bottom:12px;display:flex;gap:12px;align-items:flex-start">
            ${a.image?`<img src="${a.image}" style="width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0" alt="${a.name}">`:''}
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
                ${a.icon?`<span style="font-size:18px">${a.icon}</span>`:''}
                <span style="font-size:16px;font-weight:800">${a.name}</span>
              </div>
              ${a.desc?`<div style="font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:6px">${a.desc}</div>`:''}
              <div style="font-size:16px;font-weight:800;color:var(--accent)">${a.price} <span style="font-size:11px;font-weight:600;color:var(--muted)">${a.perUnit||''}</span></div>
            </div>
          </div>`;
        });
        container.appendChild(el);
        return;

      case 'schedules': {
        let schedHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        if (B.schedules) B.schedules.forEach(s => {
          schedHTML += `<div class="card" style="margin-bottom:12px">
            <div style="margin-bottom:12px">
              <div style="font-size:18px;font-weight:800">${s.time}</div>
              ${s.name ? `<div style="font-size:13px;color:var(--muted);margin-top:2px">${s.name}</div>` : ''}
            </div>
            <div style="display:grid;gap:1px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
              <div style="display:grid;grid-template-columns:1fr auto;padding:8px 12px;background:var(--chip);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">
                <span>Ticket Type</span><span>Price</span>
              </div>
              ${s.tickets.map(t=>`
              <div style="display:grid;grid-template-columns:1fr auto;padding:10px 12px;border-top:1px solid var(--border);background:#fff;font-size:14px">
                <span style="font-weight:600">${t.name}</span>
                <span style="font-weight:800;color:var(--accent)">$${t.price}</span>
              </div>`).join('')}
            </div>
          </div>`;
        });
        el.innerHTML = schedHTML;
        container.appendChild(el);
        return;
      }

      case 'highlights':
        if (B.highlights?.length) {
          html += `<ul style="margin:0;padding-left:0;display:grid;gap:10px;list-style:none">
            ${B.highlights.map(h=>`<li style="display:flex;gap:10px;font-size:14px;line-height:1.5"><span style="color:var(--accent);font-size:16px;flex-shrink:0">✦</span><span>${h}</span></li>`).join('')}
          </ul>`;
        }
        break;

      case 'included':
        if (B.included?.length) {
          html += `<ul style="margin:0;padding-left:0;display:grid;gap:8px;list-style:none">
            ${B.included.map(i=>`<li style="display:flex;gap:10px;font-size:14px"><span style="color:#22c55e;font-weight:700;flex-shrink:0">✓</span><span>${i}</span></li>`).join('')}
          </ul>`;
        }
        break;

      case 'whatToBring':
        if (B.whatToBring?.length) {
          html += `<ul style="margin:0;padding-left:0;display:grid;gap:8px;list-style:none">
            ${B.whatToBring.map(i=>`<li style="display:flex;gap:10px;font-size:14px"><span style="color:var(--accent);font-weight:700;flex-shrink:0">→</span><span>${i}</span></li>`).join('')}
          </ul>`;
        }
        break;

      case 'restrictions':
        if (B.restrictions?.length) {
          html += `<ul style="margin:0;padding-left:18px;display:grid;gap:8px">
            ${B.restrictions.map(r=>{
              const text = typeof r === 'string' ? r : (r.q || r.text || r.rule || JSON.stringify(r));
              return `<li style="font-size:13px;color:var(--muted);line-height:1.5">${text}</li>`;
            }).join('')}
          </ul>`;
        }
        break;

      case 'gallery':
        html += `<button class="section-btn" onclick="openGallery()">
          <span>📸 View Photos (${(B.gallery||[]).length} photos)</span>
          <span class="section-btn-arrow">›</span>
        </button>`;
        break;

      case 'reviews':
        html += `<button class="section-btn" onclick="openReviews()">
          <span>⭐ Read Reviews (${(B.reviews||[]).length} reviews)</span>
          <span class="section-btn-arrow">›</span>
        </button>`;
        break;

      case 'hours':
        if (B.hours) {
          const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
          html += `<ul class="hours">${B.hours.map(h=>`
            <li class="${h.day===today?'today':''}">
              <span class="day">${h.day}</span>
              <span class="time">${h.open} – ${h.close}</span>
            </li>`).join('')}</ul>`;
        }
        break;

      case 'location':
        html += `<div class="loc-addr">📍 ${B.address}<br>${B.city}, ${B.state} ${B.zip}</div>
          <div class="cta-row">
            ${B.googleMaps?`<a href="${B.googleMaps}" target="_blank" class="btn btn-dir">📍 Get Directions</a>`:''}
            ${B.phone?`<a href="tel:${B.phone}" class="btn btn-call">📞 ${B.phoneDisplay}</a>`:''}
            ${B.website?`<a href="${B.website}" target="_blank" class="btn btn-web">🌐 Website</a>`:''}
          </div>`;
        break;

      // ── Generic: any sec.id that matches foodMenu cat.meal renders those categories ──
      default: {
        const mealCats = (B.foodMenu || []).filter(cat => cat.meal === (sec.mealId || sec.id));
        if (mealCats.length > 0) {
          html += '</div>';
          el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
          mealCats.forEach(cat => {
            el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`;
          });
          container.appendChild(el);
          return;
        }
        break;
      }
    }

    html += '</div>';
    el.innerHTML = html;
    container.appendChild(el);
  });

  // ── Scroll spy ──
  const tabs = document.querySelectorAll('.tab');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('sec-','');
        tabs.forEach(t => t.classList.toggle('active', t.dataset.id === id));
        document.querySelector(`.tab[data-id="${id}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      }
    });
  }, { threshold: 0.2, rootMargin: '-70px 0px 0px 0px' });

  document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
  if (tabs[0]) tabs[0].classList.add('active');

  // ── Gallery Popup ──
  const GALLERY_PER_PAGE = 10;
  let galleryCurrentPage = 0;
  const galleryImages = B.gallery || [];

  window.openGallery = function() {
    galleryCurrentPage = 0;
    renderGallery();
    document.getElementById('gallery-popup').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.galleryPage = function(dir) {
    galleryCurrentPage += dir;
    renderGallery();
  };
  function renderGallery() {
    const grid = document.getElementById('gallery-grid');
    const total = galleryImages.length;
    const totalPages = Math.max(1, Math.ceil(total / GALLERY_PER_PAGE));
    galleryCurrentPage = Math.max(0, Math.min(galleryCurrentPage, totalPages - 1));
    const start = galleryCurrentPage * GALLERY_PER_PAGE;
    const page = galleryImages.slice(start, start + GALLERY_PER_PAGE);
    if (page.length === 0) {
      grid.innerHTML = `<div class="no-content" style="grid-column:1/-1">No photos added yet.</div>`;
    } else {
      grid.innerHTML = page.map(img => `
        <div>
          <img class="gallery-img" src="${img.url}" alt="${img.caption||''}" onerror="this.style.background='#ddd'">
          ${img.caption ? `<div class="gallery-caption">${img.caption}</div>` : ''}
        </div>`).join('');
    }
    document.getElementById('gallery-page-info').textContent = total > 0 ? `Page ${galleryCurrentPage+1} of ${totalPages}` : '';
    document.getElementById('gallery-prev-btn').disabled = galleryCurrentPage === 0;
    document.getElementById('gallery-next-btn').disabled = galleryCurrentPage >= totalPages - 1;
  }

  // ── Reviews Popup ──
  const REVIEWS_PER_PAGE = 10;
  let reviewsCurrentPage = 0;
  const allReviews = B.reviews || [];

  window.openReviews = function() {
    reviewsCurrentPage = 0;
    renderReviews();
    document.getElementById('reviews-popup').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.reviewsPage = function(dir) {
    reviewsCurrentPage += dir;
    renderReviews();
  };
  function renderReviews() {
    const list = document.getElementById('reviews-list');
    const total = allReviews.length;
    const totalPages = Math.max(1, Math.ceil(total / REVIEWS_PER_PAGE));
    reviewsCurrentPage = Math.max(0, Math.min(reviewsCurrentPage, totalPages - 1));
    const start = reviewsCurrentPage * REVIEWS_PER_PAGE;
    const page = allReviews.slice(start, start + REVIEWS_PER_PAGE);
    if (page.length === 0) {
      list.innerHTML = `<div class="no-content">No reviews added yet.</div>`;
    } else {
      list.innerHTML = page.map(r => `
        <div class="review-card">
          <div class="review-top">
            <span class="review-author">${r.author}</span>
            <span class="review-date">${r.date||''}</span>
          </div>
          <div class="review-stars">${'★'.repeat(r.rating||5)}${'☆'.repeat(5-(r.rating||5))}</div>
          <div class="review-text">${r.text}</div>
        </div>`).join('');
    }
    document.getElementById('reviews-page-info').textContent = total > 0 ? `Page ${reviewsCurrentPage+1} of ${totalPages}` : '';
    document.getElementById('reviews-prev-btn').disabled = reviewsCurrentPage === 0;
    document.getElementById('reviews-next-btn').disabled = reviewsCurrentPage >= totalPages - 1;
  }

  // ── Close popups ──
  window.closePopup = function(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  };
  document.querySelectorAll('.popup-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) closePopup(overlay.id); });
  });

}
</script>
<script src="js/gcr-api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
