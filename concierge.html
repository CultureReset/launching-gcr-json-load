<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Your Gulf Coast Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0b7a75;
      --teal-dark: #065f5b;
      --sand: #fdf6ec;
      --white: #ffffff;
      --bubble-ai: #f0f4f8;
      --bubble-user: #0b7a75;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --radius: 18px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--sand);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── header ── */
    .chat-header {
      background: var(--teal);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
    }
    .chat-header-avatar {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 1rem; font-weight: 700; }
    .chat-header-status { font-size: .75rem; opacity: .8; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; }

    /* ── messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--teal); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; flex-shrink: 0; margin-top: 2px;
    }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: .93rem;
      line-height: 1.55;
      max-width: 100%;
    }
    .msg.ai   .msg-bubble { background: var(--bubble-ai); color: var(--text); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }

    /* typing indicator */
    .typing .msg-bubble {
      display: flex; align-items: center; gap: 4px; padding: 14px 18px;
    }
    .typing .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted); animation: bounce .9s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: .15s; }
    .typing .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-6px); }
    }

    /* quick replies */
    .quick-replies {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 4px 14px 0;
    }
    .quick-btn {
      background: var(--white); border: 1.5px solid var(--teal);
      color: var(--teal); border-radius: 20px;
      padding: 7px 14px; font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      font-family: inherit;
    }
    .quick-btn:hover { background: var(--teal); color: #fff; }

    /* ── input bar ── */
    .chat-input-bar {
      background: var(--white);
      border-top: 1px solid #e5e7eb;
      padding: 12px 14px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      padding: 11px 18px;
      font-size: .95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border .2s;
    }
    .chat-input:focus { border-color: var(--teal); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--teal); color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background .2s;
      font-size: 1.1rem;
    }
    .send-btn:hover { background: var(--teal-dark); }
    .send-btn:disabled { background: #9ca3af; cursor: default; }
  </style>
</head>
<body>

  <!-- header -->
  <div class="chat-header">
    <div class="chat-header-avatar">🌊</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Gulf Coast Concierge</div>
      <div class="chat-header-status"><span class="status-dot"></span> Online — ask me anything</div>
    </div>
  </div>

  <!-- messages -->
  <div class="chat-messages" id="messages"></div>

  <!-- quick replies -->
  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="send('Best seafood restaurants?')">🦞 Seafood</button>
    <button class="quick-btn" onclick="send('Happy hour deals tonight?')">🍹 Happy Hour</button>
    <button class="quick-btn" onclick="send('Live music tonight?')">🎵 Live Music</button>
    <button class="quick-btn" onclick="send('Kid-friendly places?')">👨‍👩‍👧 Kids</button>
    <button class="quick-btn" onclick="send('Things to do today?')">🏄 Activities</button>
    <button class="quick-btn" onclick="send('Gluten free options?')">🌿 Gluten Free</button>
  </div>

  <!-- input -->
  <div class="chat-input-bar">
    <textarea class="chat-input" id="input" placeholder="Ask me anything about the Gulf Coast..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendInput()">➤</button>
  </div>

<script>
  const API = 'http://localhost:8000'; // change to your server URL
  const params = new URLSearchParams(location.search);
  let sessionId = params.get('s') || null;
  let waiting = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendInput(); }
  });

  function addMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    if (role === 'ai') {
      wrap.innerHTML = `<div class="msg-avatar">🌊</div><div class="msg-bubble">${text}</div>`;
    } else {
      wrap.innerHTML = `<div class="msg-bubble">${text}</div>`;
    }
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai typing';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="msg-avatar">🌊</div><div class="msg-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  async function send(text) {
    if (!text.trim() || waiting) return;
    waiting = true;
    sendBtn.disabled = true;
    document.getElementById('quickReplies').style.display = 'none';

    addMsg('user', text);
    showTyping();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text, session_id: sessionId })
      });
      const data = await res.json();
      sessionId = data.session_id;

      // update URL with session so link stays shareable
      const url = new URL(location.href);
      url.searchParams.set('s', sessionId);
      history.replaceState({}, '', url);

      removeTyping();
      addMsg('ai', data.answer.replace(/\n/g, '<br>'));
    } catch (e) {
      removeTyping();
      addMsg('ai', 'Sorry, something went wrong. Try again in a moment.');
    }

    waiting = false;
    sendBtn.disabled = false;
  }

  function sendInput() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    send(text);
  }

  // opening greeting
  window.addEventListener('load', () => {
    if (sessionId) {
      // returning user — load right in
      addMsg('ai', "Welcome back! 👋 What are you looking for today?");
    } else {
      addMsg('ai', "Hey! 👋 I'm your personal Gulf Coast concierge.<br><br>I know every restaurant, happy hour, live music spot, and activity around here. What can I help you find?");
    }
  });
</script>
</body>
</html>
