<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="page-title">Business Profile – Gulf Coast Radar</title>
  <meta id="page-desc" name="description" content="">
  <link rel="icon" type="image/png" href="logo/gcr-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    :root {
      --bg:     #0b1220;
      --card:   #ffffff;
      --ink:    #0e1726;
      --muted:  #5c6b81;
      --accent: #0ea5e9;
      --chip:   #eef6ff;
      --border: #e6ecf3;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; background:#f6f8fb; color:var(--ink); font-family: 'Inter', system-ui, -apple-system, sans-serif; height: auto; min-height: 100vh; }
    a { color:var(--accent); text-decoration:none; }

    .wrap { max-width:980px; margin:0 auto; padding-bottom:64px; }

    /* Cover Slideshow */
    .cover { position:relative; width:100%; aspect-ratio:1/1; max-height:680px; background:#0c2d48; overflow:hidden; }
    .cover-slides { position:relative; width:100%; height:100%; }
    .cover-slide { position:absolute; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg,#0c2d48,#1a4a6e); opacity:0; transition:opacity .5s ease; pointer-events:none; }
    .cover-slide.active { opacity:1; pointer-events:auto; }
    .cover-slide img { width:100%; height:100%; object-fit:cover; object-position:center center; display:block; }
    /* Gradient overlay + hero text */
    .cover-overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.7) 0%, rgba(0,0,0,.15) 50%, transparent 100%); pointer-events:none; z-index:5; }
    .cover-hero { position:absolute; bottom:28px; left:20px; right:80px; z-index:10; color:#fff; }
    @media (max-width:480px) { .cover-hero { bottom:16px; left:14px; right:60px; } }
    .cover-hero-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,.15); backdrop-filter:blur(6px); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; padding:4px 11px; border-radius:999px; margin-bottom:8px; }
    .cover-hero-name { font-size:clamp(1.4rem,4vw,2.4rem); font-weight:900; line-height:1.15; text-shadow:0 2px 12px rgba(0,0,0,.5); margin-bottom:6px; }
    .cover-hero-meta { display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-size:.82rem; color:rgba(255,255,255,.85); }
    .cover-hero-rating { display:flex; align-items:center; gap:4px; font-weight:700; color:#fbbf24; }
    .cover-hero-open { background:#22c55e; color:#fff; font-size:.68rem; font-weight:800; padding:2px 9px; border-radius:999px; }
    .cover-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,.45); border:none; color:#fff; font-size:22px; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:background .2s; }
    .cover-arrow:hover { background:rgba(0,0,0,.7); }
    .cover-prev { left:12px; }
    .cover-next { right:12px; }
    .cover-dots { position:absolute; bottom:10px; right:56px; display:flex; gap:6px; z-index:10; }
    .cover-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); border:none; cursor:pointer; padding:0; transition:background .2s; }
    .cover-dot.active { background:#fff; }
    .cover-count { position:absolute; bottom:10px; right:14px; background:rgba(0,0,0,.5); color:#fff; font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:999px; z-index:10; }
    .cover-img-chips { position:absolute; top:12px; left:12px; display:flex; gap:6px; flex-wrap:wrap; z-index:10; }
    .cover-img-chip { background:rgba(0,0,0,.52); color:#fff; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; backdrop-filter:blur(4px); white-space:nowrap; }
    .cover-img-chip.music   { background:rgba(109,40,217,.82); }
    .cover-img-chip.water   { background:rgba(14,165,233,.82); }
    .cover-img-chip.outdoor { background:rgba(22,163,74,.76); }
    .cover-img-chip.hh      { background:rgba(217,119,6,.88); }
    .cover-open-badge { position:absolute; top:12px; right:12px; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700; background:rgba(22,163,74,.88); color:#fff; z-index:10; }

    /* Header */
    .header { padding:16px 20px; background:var(--card); border-bottom:1px solid var(--border); }
    .title { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
    .title h1 { font-size:clamp(22px,3.8vw,32px); margin:0; }
    .meta { display:flex; gap:16px; flex-wrap:wrap; color:var(--muted); margin-top:6px; font-size:14px; }
    .meta-item { display:flex; align-items:center; gap:6px; }
    .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .badge { background:var(--chip); color:#0b6aa3; border:1px solid #cfe6ff; padding:6px 10px; border-radius:999px; font-size:13px; }

    /* CTA buttons */
    .cta-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:999px; font-size:14px; font-weight:700; transition:all .2s; white-space:nowrap; text-decoration:none; }
    .btn-call { background:#22c55e; color:#fff; }
    .btn-call:hover { background:#16a34a; transform:translateY(-1px); }
    .btn-dir  { background:var(--accent); color:#fff; }
    .btn-dir:hover  { background:#0284c7; transform:translateY(-1px); }
    .btn-web  { background:var(--chip); color:var(--ink); border:1px solid var(--border); }
    .btn-web:hover  { background:var(--border); }

    /* Social */
    .social-row { display:flex; gap:10px; margin-top:12px; }
    .social-btn { width:36px; height:36px; border-radius:50%; background:var(--chip); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .social-btn:hover { background:var(--accent); border-color:var(--accent); }
    .social-btn:hover svg { fill:#fff; }
    .social-btn svg { width:17px; height:17px; fill:var(--muted); }

    /* Sticky nav — sits below the 64px global gcr-header */
    .sticky-wrap { position:sticky; top:64px; z-index:998; }
    .sticky-nav { background:rgba(255,255,255,0.97); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); box-shadow:0 2px 12px rgba(0,0,0,.10); }
    .tabs { display:flex; overflow:auto; gap:6px; padding:10px 14px; scroll-snap-type:x mandatory; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { white-space:nowrap; padding:8px 14px; border:1px solid var(--border); border-radius:999px; background:#fff; font-size:13px; font-weight:600; cursor:pointer; scroll-snap-align:start; transition:all .18s; color:var(--ink); flex-shrink:0; }
    .tab:hover { border-color:var(--accent); color:var(--accent); }
    .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    /* ── Mobile ── */
    @media (max-width:480px) {
      .wrap { padding-bottom:40px; }
      .info-row { padding:14px 14px 10px; gap:10px; }
      .meta-row { flex-wrap:wrap; gap:6px; }
      .meta-item { font-size:13px; }
      .cta-row { gap:8px; }
      .btn { padding:11px 16px; font-size:14px; min-height:44px; flex:1; justify-content:center; }
      .badge-row { gap:6px; }
      .badge { font-size:12px; padding:5px 8px; }
      .social-row { gap:8px; }
      section { padding:14px 14px; }
      .card { padding:14px; }
      .tabs { padding:8px 10px; gap:5px; }
      .tab { padding:7px 12px; font-size:12px; }
      h2 { font-size:18px; }
    }

    /* Sections — scroll margin = 64px header + ~52px tab bar */
    section { padding:20px; scroll-margin-top:120px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin:12px 0; box-shadow:var(--shadow); }
    h2 { font-size:20px; margin:0 0 8px 0; }
    h3 { font-size:15px; color:var(--accent); margin:16px 0 8px 0; border-bottom:1px solid var(--border); padding-bottom:6px; }

    /* Menu grid */
    .menu-grid { display:grid; grid-template-columns:repeat(1, minmax(0,1fr)); gap:12px; }
    @media (min-width:640px)  { .menu-grid { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (min-width:900px)  { .menu-grid { grid-template-columns:repeat(3, minmax(0,1fr)); } }
    .item { border:1px solid var(--border); border-radius:10px; padding:12px; background:#fff; }
    .item .name { font-weight:600; font-size:14px; }
    .item .desc { color:var(--muted); font-size:13px; margin-top:4px; line-height:1.4; }
    .item .price { font-size:14px; font-weight:700; color:var(--accent); margin-top:6px; }

    /* Chips */
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
    .chip { background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:13px; color:var(--ink); }

    /* Happy Hour */
    .hh-time { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:12px; }
    .hh-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
    .hh-row:last-child { border-bottom:none; }
    .hh-name { font-weight:600; font-size:14px; }
    .hh-desc { font-size:12px; color:var(--muted); margin-top:2px; }
    .hh-price { font-size:16px; font-weight:800; color:#22c55e; }

    /* Specials */
    .special { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; border:1px solid var(--border); border-radius:12px; padding:16px; background:#fff; }
    .special-badge { background:var(--accent); color:#fff; border-radius:8px; padding:6px 12px; font-size:14px; font-weight:800; white-space:nowrap; flex-shrink:0; }
    .special-name { font-weight:700; font-size:15px; margin-bottom:4px; }
    .special-desc { font-size:13px; color:var(--muted); line-height:1.5; }

    /* Packages/Cards */
    .pkg-grid { display:grid; grid-template-columns:repeat(1,1fr); gap:16px; }
    @media (min-width:640px) { .pkg-grid { grid-template-columns:repeat(3,1fr); } }
    .pkg { border:2px solid var(--border); border-radius:12px; padding:20px; background:#fff; transition:all .2s; }
    .pkg:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow); }
    .pkg-tag { display:inline-block; background:var(--accent); color:#fff; border-radius:6px; padding:3px 10px; font-size:11px; font-weight:700; text-transform:uppercase; margin-bottom:8px; }
    .pkg-name { font-size:18px; font-weight:800; margin-bottom:4px; }
    .pkg-price { font-size:30px; font-weight:900; color:var(--accent); }
    .pkg-dur { font-size:12px; color:var(--muted); margin:2px 0 10px; }
    .pkg-desc { font-size:13px; color:var(--muted); line-height:1.6; }

    /* League */
    .league-price { font-size:34px; font-weight:900; color:var(--accent); }
    .league-sched { font-size:13px; color:var(--muted); margin:4px 0 12px; }
    .league-desc { font-size:14px; line-height:1.7; margin-bottom:14px; }
    .perks { display:flex; flex-wrap:wrap; gap:8px; }
    .perk { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:999px; padding:5px 12px; font-size:12px; color:#166534; font-weight:500; }

    /* Bay */
    .bay { display:flex; align-items:center; gap:24px; flex-wrap:wrap; }
    .bay-price { font-size:42px; font-weight:900; color:var(--accent); white-space:nowrap; }
    .bay-name { font-size:18px; font-weight:700; margin-bottom:4px; }
    .bay-cap { font-size:13px; color:var(--muted); margin-bottom:8px; }
    .bay-desc { font-size:13px; color:var(--muted); line-height:1.5; }

    /* Events */
    .evt-badge { display:inline-block; background:#fef3c7; color:#92400e; border:1px solid #fde68a; border-radius:6px; padding:3px 10px; font-size:11px; font-weight:700; margin-bottom:8px; }
    .evt-name { font-size:16px; font-weight:700; margin-bottom:6px; }
    .evt-desc { font-size:13px; color:var(--muted); line-height:1.5; }
    .evt-note { font-size:12px; color:var(--accent); margin-top:8px; font-weight:600; }

    /* Hours */
    .hours { list-style:none; padding:0; margin:0; display:grid; gap:2px; }
    .hours li { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; color:var(--muted); }
    .hours li:last-child { border-bottom:none; }
    .hours li .day { font-weight:600; color:var(--ink); }
    .hours li.today .day,
    .hours li.today .time { color:var(--accent); font-weight:700; }

    /* About tags */
    .tag-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .tag { background:var(--chip); border:1px solid var(--border); border-radius:999px; padding:5px 12px; font-size:13px; }
    .sub-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:14px 0 8px; }
    .about-p { font-size:14px; color:var(--muted); line-height:1.8; margin-bottom:14px; }
    .note { font-size:12px; color:var(--muted); font-style:italic; margin-bottom:10px; }

    /* Location */
    .loc-addr { font-size:15px; font-weight:600; line-height:1.6; margin-bottom:14px; }

    /* Popup Modal */
    .popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:2000; overflow-y:auto; padding:20px; }
    .popup-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
    .popup-box { background:#fff; border-radius:16px; width:100%; max-width:780px; padding:28px; position:relative; margin:auto; }
    .popup-close { position:absolute; top:14px; right:14px; background:#f0f0f0; border:none; border-radius:50%; width:36px; height:36px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#555; transition:background .2s; }
    .popup-close:hover { background:#e0e0e0; color:#000; }
    .popup-title { font-size:22px; font-weight:800; margin:0 40px 20px 0; }

    /* Gallery grid */
    .gallery-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    @media (min-width:500px) { .gallery-grid { grid-template-columns:repeat(3,1fr); } }
    @media (min-width:700px) { .gallery-grid { grid-template-columns:repeat(4,1fr); } }
    .gallery-img { width:100%; aspect-ratio:1/1; object-fit:contain; border-radius:8px; cursor:pointer; transition:opacity .2s; background:#f0f4f8; }
    .gallery-img:hover { opacity:.85; }
    .gallery-caption { font-size:11px; color:var(--muted); text-align:center; margin-top:3px; }
    .popup-pagination { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:20px; }
    .popup-page-btn { padding:8px 20px; border-radius:999px; border:1px solid var(--border); background:#fff; font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--ink); }
    .popup-page-btn:hover:not(:disabled) { background:var(--accent); color:#fff; border-color:var(--accent); }
    .popup-page-btn:disabled { opacity:.35; cursor:default; }
    .popup-page-info { font-size:13px; color:var(--muted); }

    /* Reviews */
    .review-card { border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
    .review-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .review-author { font-weight:700; font-size:14px; }
    .review-date { font-size:12px; color:var(--muted); }
    .review-stars { color:#f59e0b; font-size:15px; margin-bottom:6px; }
    .review-text { font-size:13px; color:var(--muted); line-height:1.6; }
    .no-content { text-align:center; color:var(--muted); padding:30px 0; font-size:14px; }

    /* Clickable section cards */
    .section-btn { display:flex; align-items:center; justify-content:space-between; width:100%; background:var(--chip); border:1px solid var(--border); border-radius:12px; padding:16px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--ink); margin-bottom:8px; }
    .section-btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .section-btn-arrow { font-size:18px; }

    @media (max-width:480px) { .bay { flex-direction:column; gap:10px; } }

    /* Name already shown in hero overlay — hide duplicate in header */
    #js-name, #js-emoji { display:none !important; }
  </style>
</head>
<body>

<div class="gcr-header">
  <div class="gcr-header-top">
    <a href="/index.html" class="gcr-logo-row">
      <img src="gcr-logo.png" alt="Gulf Coast Radar">
      <div class="gcr-logo-text">GULF<span>COAST</span>RADAR</div>
    </a>
    <button onclick="history.back()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:1rem;font-weight:700;padding:8px 16px;border-radius:20px;cursor:pointer;">← Back</button>
  </div>
  <div class="gcr-cat-tabs">

    <a href="feed.html"          class="gcr-cat-tab">📡 Live Feed</a><a href="shopping.html" class="gcr-cat-tab">🛍️ Shopping</a><a href="staying.html" class="gcr-cat-tab">🏨 Staying</a>

    </button>

</div>

<div class="wrap">

  <div class="cover" id="js-cover">
    <div class="cover-slides" id="js-slides"></div>
    <div class="cover-overlay"></div>
    <div class="cover-img-chips" id="js-cover-chips"></div>
    <div class="cover-open-badge" id="js-cover-open" style="display:none"></div>
    <div class="cover-hero">
      <div class="cover-hero-badge" id="js-hero-badge" style="display:none"></div>
      <div class="cover-hero-name" id="js-hero-name"></div>
      <div class="cover-hero-meta" id="js-hero-meta"></div>
    </div>
    <button class="cover-arrow cover-prev" id="js-prev">&#8249;</button>
    <button class="cover-arrow cover-next" id="js-next">&#8250;</button>
    <div class="cover-dots" id="js-dots"></div>
    <div class="cover-count" id="js-cover-count" style="display:none"></div>
  </div>

  <div class="popup-overlay" id="gallery-popup">
    <div class="popup-box">
      <button class="popup-close" onclick="closePopup('gallery-popup')">&#215;</button>
      <div class="popup-title">📸 Photos</div>
      <div class="gallery-grid" id="gallery-grid"></div>
      <div class="popup-pagination">
        <button class="popup-page-btn" id="gallery-prev-btn" onclick="galleryPage(-1)">&#8249; Prev</button>
        <span class="popup-page-info" id="gallery-page-info"></span>
        <button class="popup-page-btn" id="gallery-next-btn" onclick="galleryPage(1)">Next &#8250;</button>
      </div>
    </div>
  </div>

  <div class="popup-overlay" id="reviews-popup">
    <div class="popup-box">
      <button class="popup-close" onclick="closePopup('reviews-popup')">&#215;</button>
      <div class="popup-title">⭐ Reviews</div>
      <div id="reviews-list"></div>
      <div class="popup-pagination">
        <button class="popup-page-btn" id="reviews-prev-btn" onclick="reviewsPage(-1)">&#8249; Prev</button>
        <span class="popup-page-info" id="reviews-page-info"></span>
        <button class="popup-page-btn" id="reviews-next-btn" onclick="reviewsPage(1)">Next &#8250;</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="title">
      <span id="js-emoji" style="font-size:40px"></span>
      <h1 id="js-name"></h1>
    </div>
    <div class="meta" id="js-meta"></div>
    <div class="badge-row" id="js-badges"></div>
    <div class="cta-row" id="js-cta"></div>
    <div class="social-row" id="js-social"></div>
  </div>

  <div class="sticky-wrap">
    <div class="sticky-nav">
      <div class="tabs" id="js-tabs"></div>
    </div>
  </div>

  <div id="js-sections"></div>

</div>

<script>
(async function () {
  const GCR_API = 'https://cybercheck-api-database.vercel.app/api/gcr';
  const slug = new URLSearchParams(location.search).get('id') || window.GCR_SLUG;
  if (!slug) {
    document.body.innerHTML = '<p style="padding:40px;color:red">No business slug in URL (?id=your-slug)</p>';
    return;
  }

  // ── Fetch from new entity API + community photos in parallel ──
  let entityData = null;
  let communityPhotos = [];
  try {
    const [entRes, commRes] = await Promise.all([
      fetch(`${GCR_API}/entity/${encodeURIComponent(slug)}`).catch(() => null),
      fetch(`${GCR_API}/community-photos/${encodeURIComponent(slug)}`).catch(() => null),
    ]);
    if (entRes && entRes.ok) entityData = await entRes.json();
    if (commRes && commRes.ok) {
      const commData = await commRes.json();
      communityPhotos = Array.isArray(commData) ? commData : (commData.photos || []);
    }
  } catch(e) {}

  if (!entityData || !entityData.entity) {
    document.body.innerHTML = `<p style="padding:40px;color:red">Could not load: ${slug}</p>`;
    return;
  }

  if (entityData.entity.is_active === false) {
    window.location.replace('home.html');
    return;
  }

  // ── Redirect to assigned GCR template if set ──────────────────────────────
  const assignedTemplate = entityData.entity.gcr_template;
  if (assignedTemplate) {
    window.location.replace('templates/' + assignedTemplate + '.html?id=' + encodeURIComponent(slug));
    return;
  }

  // ── Redirect specific water sport / tour activity types to activity-profile.html ──────
  const ACTIVITY_SUBTYPES = new Set([
    'parasailing','boat-rentals','boat_rental','boat_rentals','charter-fishing','fishing_charter',
    'dolphin-cruises-tours','dolphin_cruise','dolphin_cruises_tours','jet-ski-rentals-tours',
    'jet_ski','jet_ski_rentals_tours','canoe-kayak-paddleboard-rentals','canoe_kayak_paddleboard',
    'banana-boat-rides','banana_boat','helicopter-airplane-tours','sunset-cruises-tours',
    'boat-tours','boat_tours','watersports','snorkeling','paddleboard','kayak_rental','fishing-charters'
  ]);
  const rawSub = (entityData.entity.entity_subtype || '').toLowerCase();
  if (ACTIVITY_SUBTYPES.has(rawSub) || ACTIVITY_SUBTYPES.has(rawSub.replace(/-/g,'_'))) {
    window.location.replace('activity-profile.html?id=' + encodeURIComponent(slug));
    return;
  }

  // ── Map entity API → BUSINESS_DATA ────────────────────────
  const B = mapEntityToBusinessData(entityData);
  window.BUSINESS_DATA = B;

  function mapEntityToBusinessData(data) {
    const e = data.entity;
    const sections = data.sections || [];

    const B = {
      name: e.name,
      slug: e.slug,
      tagline: e.subtitle,
      emoji: e.icon || '🏢',
      phone: (e.phone || '').replace(/\D/g, ''),
      phoneDisplay: e.phone,
      address: e.address_line_1,
      city: e.city,
      state: e.state,
      zip: e.zip,
      website: e.website_url,
      googleMaps: e.directions_url,
      rating: e.rating,
      reviewCount: e.review_count,
      coverImages: [
        ...(e.hero_image_url ? [e.hero_image_url] : []),
        ...(Array.isArray(e._extra_photos) ? e._extra_photos : [])
      ],
      about: {
        description: '',
        features: [...new Set((data.features || []).map(f => f.label).filter(Boolean))],
        perfectFor: [...new Set((data.perfect_for || []).map(p => p.label).filter(Boolean))],
      },
      tags: [...new Set((data.tags || []).map(t => t.tag).filter(Boolean))],
      highlights: [],
      restrictions: [],
      schedules: [],
      gallery: [],
      reviews: [],
      hours: null,
      sections: [],
      foodMenu: [],
      barMenu: [],
      happyHour: null,
      games: [],
      packages: [],
      specials: [],
      events: [],
      league: null,
      bookABay: null,
    };

    const DRINK_TYPES = new Set(['drink_item','beer_item','wine_item','spirit_item']);

    const ICONS = {
      about:'ℹ️', highlights:'✦', schedules:'🎟️', cruise_times:'🎟️',
      guest_info:'📋', restrictions:'📋', gallery:'📸', reviews:'⭐',
      hours:'🕐', location:'📍', happy_hour:'🍺', food:'🍽️',
      lunch:'🍽️', dinner:'🌙', brunch:'🥂', kids:'👶', gluten_free:'🌿',
      games:'🎮', packages:'🎟️', league:'🏆', book_a_bay:'🏌️',
      specials:'⭐', events:'📅', cocktails:'🍹', beer:'🍺', wine:'🍷',
      draft_beer:'🍺', bottles_cans:'🍾', craft_beer:'🍺', wine_glass:'🍷',
      wine_bottle:'🍾', na_drinks:'🥤', whiskey:'🥃', scotch:'🥃',
      vodka:'🍸', tequila_mezcal:'🍹', tequila:'🍹', rum:'🍹', gin:'🍸',
      bitters_aperitifs:'🍸', frozen:'🧊', chardonnay:'🍷', pinot_gris:'🍷',
      sauv_blanc:'🍷', riesling:'🍷', rose:'🌹', sparkling:'🥂',
      other_whites:'🍷', pinot_noir:'🍷', cab_sauv:'🍷', merlot:'🍷',
      malbec:'🍷', zinfandel:'🍷', other_reds:'🍷', reserve:'🍾',
    };

    const convertToStandardTime = (str) => {
      if (!str) return str;
      return str.replace(/(\d{1,2}):(\d{2})\s*(am|pm)?/gi, (match, h, m, ap) => {
        const hour = parseInt(h);
        if (ap) return match;
        const suffix = hour >= 12 ? 'pm' : 'am';
        const display = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
        return `${display}:${m}${suffix}`;
      });
    };

    sections.forEach(sec => {
      const key  = sec.section_key;
      const type = sec.section_type;
      const icon = ICONS[key] || '';
      const label = sec.section_label;

      if (type === 'rich_text') {
        B.about.description = sec.content?.body_text || '';
        B.sections.push({ id: 'about', label, icon });

      } else if (type === 'bullets') {
        const bullets = (sec.bullets || []).map(b => b.bullet_text);
        if (key === 'highlights') {
          B.highlights = bullets;
          if (bullets.length) B.sections.push({ id: 'highlights', label, icon });
        } else if (key === 'guest_info' || key === 'restrictions') {
          B.restrictions = bullets;
          if (bullets.length) B.sections.push({ id: 'restrictions', label, icon });
        } else if (key === 'specials') {
          B.specials = bullets.map(b => ({ name: b, desc: '', badge: '★' }));
          if (bullets.length) B.sections.push({ id: 'specials', label, icon });
        } else {
          if (bullets.length) B.sections.push({ id: key, label, icon });
        }

      } else if (type === 'grouped_items') {
        const groups = sec.groups || [];
        const allItems = groups.flatMap(g => g.items || []);
        const isTicket = allItems.some(i => i.item_type === 'ticket');
        const isDrink  = allItems.some(i => DRINK_TYPES.has(i.item_type));

        // ── Tickets / schedules ──
        if (key === 'schedules' || key === 'cruise_times' || isTicket) {
          B.schedules = groups.map(g => ({
            time: convertToStandardTime(g.title),
            name: g.subtitle,
            tickets: (g.items || []).map(i => ({ name: i.item_name, price: i.price_numeric || parseFloat((i.price_text||'').replace(/[^0-9.]/g,'')) || 0 }))
          }));
          if (B.schedules.length) B.sections.push({ id: 'schedules', label, icon: '🎟️' });

        // ── Happy Hour (special HH rendering) ──
        } else if (key === 'happy_hour') {
          const schedText = groups.length ? convertToStandardTime((groups[0].title || '') + (groups[0].subtitle ? ' · ' + groups[0].subtitle : '')) : '';
          B.happyHour = { schedule: schedText, deals: allItems.map(i => ({ name: i.item_name, desc: i.item_description, price: i.price_text })) };
          B.sections.push({ id: 'happy-hour', label, icon: '🍺' });

        // ── Everything else — universal: each group = its own tab ──
        // Works for: dinner, lunch, breakfast, brunch, kids, gluten_free, vegan,
        // raw_bar, cocktails, whiskey, wine, beer, games, packages — ANY key
        } else {
          const renderIcon = isDrink ? (icon || '🍹') : (icon || '🍽️');

          if (groups.length <= 1) {
            // Single group — one tab, label from section_label
            const g = groups[0];
            const mealId = key;
            B.foodMenu.push({ category: g?.title || label, meal: mealId, note: g?.note_text, isDrink, items: (g?.items || []).map(i => ({ name: i.item_name, desc: i.item_description, price: i.price_text })) });
            B.sections.push({ id: 'meal-' + mealId, mealId, label, icon: renderIcon });
          } else {
            // Multiple groups — each group gets its own nav tab
            groups.forEach(g => {
              const groupId = key + '-' + (g.title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-');
              B.foodMenu.push({ category: g.title || label, meal: groupId, note: g.note_text, isDrink, items: (g.items || []).map(i => ({ name: i.item_name, desc: i.item_description, price: i.price_text })) });
              B.sections.push({ id: 'meal-' + groupId, mealId: groupId, label: g.title || label, icon: renderIcon });
            });
          }
        }

      } else if (type === 'cards') {
        const cards = sec.cards || [];
        if (key === 'packages') {
          B.packages = cards.map(c => ({ name: c.title, price: c.price_text, duration: c.subtitle, desc: c.description, badge: c.badge_text }));
          if (B.packages.length) B.sections.push({ id: 'packages', label, icon: '🎟️' });
        } else if (key === 'league') {
          const c = cards[0] || {};
          B.league = { price: c.price_text, schedule: c.subtitle, format: c.badge_text, desc: c.description, perks: cards.slice(1).map(x => x.title).filter(Boolean) };
          B.sections.push({ id: 'league', label, icon: '🏆' });
        } else if (key === 'book_a_bay') {
          const c = cards[0] || {};
          B.bookABay = { name: c.title, price: c.price_text, capacity: c.subtitle, desc: c.description };
          B.sections.push({ id: 'book-a-bay', label, icon: '🏌️' });
        } else if (key === 'events') {
          B.events = cards.map(c => ({ name: c.title, desc: c.description, badge: c.badge_text, note: convertToStandardTime(c.subtitle) }));
          if (B.events.length) B.sections.push({ id: 'events', label, icon: '📅' });
        } else {
          // Generic cards → packages view
          B.packages = cards.map(c => ({ name: c.title, price: c.price_text, duration: c.subtitle, desc: c.description, badge: c.badge_text }));
          if (B.packages.length) B.sections.push({ id: key, label, icon });
        }

      } else if (type === 'gallery') {
        B.gallery = (sec.photos || []).map(p => ({ url: p.image_url, caption: p.caption }));
        B.sections.push({ id: 'gallery', label, icon: '📸' });

      } else if (type === 'reviews') {
        B.reviews = (sec.reviews || []).map(r => ({ author: r.author_name, rating: r.rating, text: r.review_text, date: r.review_date }));
        B.sections.push({ id: 'reviews', label, icon: '⭐' });

      } else if (type === 'hours') {
        B.hours = (sec.hours || []).map(h => ({
          day: h.day_of_week,
          open: h.open_time ? convertToStandardTime(h.open_time.slice(0,5)) : null,
          close: h.close_time ? convertToStandardTime(h.close_time.slice(0,5)) : null,
          closed: h.is_closed
        }));
        if (B.hours.length) B.sections.push({ id: 'hours', label, icon: '🕐' });

      } else if (type === 'location') {
        const loc = sec.location || {};
        if (loc.address_line_1) B.address = loc.address_line_1;
        if (loc.city)           B.city    = loc.city;
        if (loc.state)          B.state   = loc.state;
        if (loc.zip)            B.zip     = loc.zip;
        if (loc.directions_url) B.googleMaps   = loc.directions_url;
        if (loc.phone)          { B.phoneDisplay = loc.phone; B.phone = loc.phone.replace(/\D/g,''); }
        if (loc.website_url)    B.website = loc.website_url;
        B.sections.push({ id: 'location', label, icon: '📍' });
      }
    });

    // Add gallery images to cover slides
    if (B.gallery.length > 0) {
      B.coverImages = B.coverImages.concat(B.gallery.slice(0, 3).map(g => g.url));
    }

    // ── NEW DEDICATED TABLES ──────────────────────────────────

    // Entity description
    if (!B.about.description && e.description) B.about.description = e.description;

    // Booking URLs
    B.bookingUrl     = e.booking_url     || null;
    B.reservationUrl = e.reservation_url || null;
    B.orderUrl       = e.order_url       || null;

    // Social
    B.socialInstagram = e.social_instagram || null;
    B.socialFacebook  = e.social_facebook  || null;
    B.socialTiktok    = e.social_tiktok    || null;

    // About bullets → highlights
    if (!B.highlights.length && (data.about_bullets || []).length) {
      B.highlights = data.about_bullets.map(b => (b.icon ? b.icon + ' ' : '') + b.text);
      if (B.highlights.length && !B.sections.find(s => s.id === 'highlights'))
        B.sections.unshift({ id: 'highlights', label: 'About', icon: 'ℹ️' });
    }

    // Photos from entity_photos — is_cover photo goes first in hero slideshow
    if ((data.photos || []).length || communityPhotos.length) {
      const sorted = [...(data.photos || [])].sort((a, b) => (b.is_cover ? 1 : 0) - (a.is_cover ? 1 : 0));
      const officialGallery = sorted.map(p => ({ url: p.image_url, caption: p.caption, isCover: p.is_cover, type: 'official' }));
      const communityGallery = communityPhotos.map(p => ({ url: p.image_url || p.photo_url || p.url, caption: p.caption || p.note || 'Community photo', type: 'community' })).filter(p => p.url);
      if (!B.gallery.length) B.gallery = [...officialGallery, ...communityGallery];
      // Put cover photo first, then all other photos for the hero slideshow
      const coverPhoto = sorted.find(p => p.is_cover);
      if (coverPhoto && !B.coverImages.includes(coverPhoto.image_url))
        B.coverImages.unshift(coverPhoto.image_url);
      B.coverImages = B.coverImages.concat(sorted.filter(p => !p.is_cover).map(p => p.image_url)).filter(Boolean);
      if (!B.sections.find(s => s.id === 'gallery'))
        B.sections.push({ id: 'gallery', label: `Photos${communityGallery.length ? ` (${B.gallery.length})` : ''}`, icon: '📸' });
    }

    // Hours from entity_hours
    const fmtTime = t => {
      if (!t) return null;
      if (t.includes('am') || t.includes('pm')) return t;
      const [h, m] = t.split(':').map(Number);
      const ap = h >= 12 ? 'pm' : 'am';
      return (m ? `${h%12||12}:${String(m).padStart(2,'0')}` : `${h%12||12}`) + ap;
    };
    if (!B.hours && (data.hours || []).length) {
      B.hours = data.hours.map(h => ({
        day: h.day_of_week ? h.day_of_week.charAt(0).toUpperCase() + h.day_of_week.slice(1) : '',
        open: fmtTime(h.open_time), close: fmtTime(h.close_time), closed: h.is_closed
      }));
      if (B.hours.length && !B.sections.find(s => s.id === 'hours'))
        B.sections.push({ id: 'hours', label: 'Hours', icon: '🕐' });
    }

    // Menu sections from new tables
    const menuSections   = data.menuSections || [];
    const menuSubSecs    = data.menuSubSections || [];
    const menuItems      = data.menuItems || [];
    const mapMenuItem = i => ({ name: i.item_name, desc: i.description, price: i.price_text || (i.price ? '$' + i.price : ''), image: i.image_url || i.photo_url || '', allergens: i.allergens || '', tags: i.tags || [] });
    menuSections.forEach(sec => {
      const mealId = 'newmenu-' + sec.id;
      const secItems = menuItems.filter(i => (i.menu_section_id === sec.id || i.section_id === sec.id) && !i.menu_sub_section_id);
      if (secItems.length) {
        B.foodMenu.push({ category: sec.section_name, meal: mealId, note: sec.section_note, isDrink: false, items: secItems.map(mapMenuItem) });
        B.sections.push({ id: 'meal-' + mealId, type: 'food', mealId, label: sec.section_name, icon: sec.icon || '🍽️' });
      }
      menuSubSecs.filter(sub => sub.menu_section_id === sec.id).forEach(sub => {
        const subItems = menuItems.filter(i => i.menu_sub_section_id === sub.id);
        if (subItems.length)
          B.foodMenu.push({ category: sub.sub_section_name, meal: mealId, note: sub.section_note, isDrink: false, items: subItems.map(mapMenuItem) });
      });
    });

    // Drink sections from new tables
    const drinkSections = data.drinkSections || [];
    const drinkItems    = data.drinkItems || [];
    drinkSections.forEach(sec => {
      const drinkId = 'newdrink-' + sec.id;
      const secItems = drinkItems.filter(i => i.drink_section_id === sec.id || i.section_id === sec.id);
      if (secItems.length) {
        B.foodMenu.push({
          category: sec.section_name,
          meal: drinkId,
          note: sec.section_note,
          isDrink: true,
          items: secItems.map(i => {
            const beerParts = [i.item_style, i.abv, i.ibu, i.brewery].filter(Boolean).join(' · ');
            return {
              name: i.item_name,
              desc: beerParts ? (i.description ? i.description + ' · ' + beerParts : beerParts) : i.description,
              price: i.price_text || (i.price ? '$' + i.price : '')
            };
          })
        });
        B.sections.push({ id: 'meal-' + drinkId, type: 'food', mealId: drinkId, label: sec.section_name, icon: '🍹' });
      }
    });

    // Happy hour from new tables
    const hhSections = data.hhSections || [];
    const hhItems    = data.hhItems || [];
    if (!B.happyHour && hhSections.length) {
      const schedule = [e.hh_days, (e.hh_start && e.hh_end) ? `${e.hh_start}–${e.hh_end}` : '', e.hh_description].filter(Boolean).join(' · ');
      const deals = hhItems.map(i => ({
        name: i.item_name, desc: i.description,
        price: i.price_text || (i.hh_price != null ? `$${i.hh_price}` : ''),
      }));
      if (deals.length || schedule) {
        B.happyHour = { schedule, deals };
        if (!B.sections.find(s => s.id === 'happy-hour'))
          B.sections.push({ id: 'happy-hour', label: 'Happy Hour', icon: '🍺' });
      }
    }


    // Specials from entity_specials
    if (!B.specials.length && (data.specials || []).length) {
      B.specials = data.specials.map(s => ({
        name: s.special_name,
        desc: [s.description, s.days, s.start_time && s.end_time ? s.start_time + '–' + s.end_time : ''].filter(Boolean).join(' · '),
        badge: s.discount_text || '★',
      }));
      if (B.specials.length && !B.sections.find(s => s.id === 'specials'))
        B.sections.push({ id: 'specials', label: 'Specials', icon: '⭐' });
    }

    // Things To Do — pricing (dedupe by time+price)
    if (!B.packages.length && (data.pricing || []).length) {
      const seenPkg = new Set();
      B.packages = data.pricing.filter(p => {
        const key = (p.time_slot_start||'') + '|' + (p.price_text||p.price||'') + '|' + (p.package_name||'');
        if (seenPkg.has(key)) return false;
        seenPkg.add(key); return true;
      }).map(p => ({
        name: p.package_name, desc: p.description,
        price: p.price_text || (p.price ? '$' + p.price : ''),
        duration: [p.time_slot_start && p.time_slot_end ? p.time_slot_start + '–' + p.time_slot_end : '', p.price_unit].filter(Boolean).join(' · '),
      }));
      if (B.packages.length && !B.sections.find(s => s.id === 'packages'))
        B.sections.push({ id: 'packages', label: 'Pricing', icon: '🎟️' });
    }

    // Section items — grouped by section (skip if we already loaded from menuSections)
    if ((data.sectionItems || []).length && (data.sections || []).length && !menuSections.length) {
      const itemsBySection = {};
      (data.sectionItems || []).forEach(item => {
        if (!itemsBySection[item.section_id]) itemsBySection[item.section_id] = [];
        itemsBySection[item.section_id].push(item);
      });

      (data.sections || []).forEach(sec => {
        const items = itemsBySection[sec.id] || [];
        if (items.length) {
          // Add items to foodMenu based on section type
          if (sec.section_type === 'menu' || sec.section_label?.toLowerCase().includes('menu')) {
            const mapItem = i => ({ name: i.item_name, desc: i.item_description, price: i.price_text || '' });
            B.foodMenu.push({ category: sec.section_label, meal: 'sec-' + sec.id, isDrink: false, items: items.map(mapItem) });
            if (!B.sections.find(s => s.id === 'meal-sec-' + sec.id))
              B.sections.push({ id: 'meal-sec-' + sec.id, mealId: 'sec-' + sec.id, label: sec.section_label, icon: '🍽️' });
          }
        }
      });
    }

    // Activities
    if ((data.activities || []).length) {
      B._activities = data.activities;
      B.sections.push({ id: 'activities', label: 'Activities', icon: '🎯' });
    }
    // Fleet
    if ((data.fleet || []).length) {
      B._fleet = data.fleet;
      B.sections.push({ id: 'fleet', label: 'Fleet & Equipment', icon: '⛵' });
    }
    // Add-ons
    if ((data.addons || []).length) {
      B._addons = data.addons;
      B.sections.push({ id: 'addons', label: 'Add-ons', icon: '➕' });
    }
    // What's Included
    if ((data.whats_included || []).length) {
      B._included = data.whats_included;
      B.sections.push({ id: 'included', label: "What's Included", icon: '✅' });
    }
    // Requirements
    if ((data.requirements || []).length) {
      B._requirements = data.requirements;
      B.sections.push({ id: 'requirements', label: 'Requirements', icon: '📋' });
    }
    // Policies
    if ((data.policies || []).length) {
      B._policies = data.policies;
      B.sections.push({ id: 'policies', label: 'Policies', icon: '📄' });
    }
    // Meeting Point
    if ((data.meeting_points || []).length) {
      B._meetingPoint = data.meeting_points[0];
      B.sections.push({ id: 'meetingpoint', label: 'Meeting Point', icon: '🗺️' });
    }
    // Q&A
    if ((data.qna || []).length) {
      B._qna = data.qna;
      B.sections.push({ id: 'qna', label: 'FAQ', icon: '❓' });
    }

    // Ensure location section exists
    if (!B.sections.find(s => s.id === 'location') && (B.address || B.city))
      B.sections.push({ id: 'location', label: 'Location', icon: '📍' });

    // Tags / Features / Perfect For section — always at the very bottom
    if ((B.about?.features?.length || B.about?.perfectFor?.length || B.tags?.length)
        && !B.sections.find(s => s.id === 'tags')) {
      B.sections.push({ id: 'tags', label: 'Tags & Features', icon: '🏷️' });
    }

    // Move photos, hours, and tags to the end regardless of API order
    const moveToEnd = ['gallery', 'hours', 'tags'];
    moveToEnd.forEach(id => {
      const idx = B.sections.findIndex(s => s.id === id);
      if (idx > -1) B.sections.push(B.sections.splice(idx, 1)[0]);
    });

    return B;
  }

  // ── Page meta ──────────────────────────────────────────────
  document.getElementById('page-title').textContent = B.name + ' – Gulf Coast Radar';
  if (B.tagline) document.getElementById('page-desc').setAttribute('content', B.tagline);

  // ── Hero overlay text ──────────────────────────────────────
  document.getElementById('js-hero-name').textContent = B.name;
  if (B.tagline || B.city) {
    const badge = document.getElementById('js-hero-badge');
    badge.textContent = B.tagline || (B.city + ', ' + B.state);
    badge.style.display = 'inline-flex';
  }
  const heroMeta = document.getElementById('js-hero-meta');
  if (B.rating) heroMeta.innerHTML += `<span class="cover-hero-rating">★ ${B.rating}${B.reviewCount ? ' <span style="font-weight:400;color:rgba(255,255,255,.7);">(${B.reviewCount.toLocaleString()})</span>' : ''}</span>`;
  if (B.address || B.city) {
    const loc = [B.address, B.city, B.state].filter(Boolean).join(', ');
    heroMeta.innerHTML += `<span>📍 ${loc}</span>`;
  }

  // ── Cover image chips (vibe badges) ───────────────────────
  const chipsEl = document.getElementById('js-cover-chips');
  const tagSet = new Set((B.tags || []).map(t => (t||'').toLowerCase()));
  const CHIP_MAP = [
    { tag:'live music',      label:'🎸 Live Music',      cls:'music'   },
    { tag:'waterfront',      label:'🌊 Waterfront',      cls:'water'   },
    { tag:'outdoor seating', label:'🌿 Outdoor Seating', cls:'outdoor' },
  ];
  CHIP_MAP.forEach(c => {
    if (tagSet.has(c.tag)) chipsEl.innerHTML += `<span class="cover-img-chip ${c.cls}">${c.label}</span>`;
  });
  if (B.happyHour || (B.entity && B.entity.hh_days)) {
    chipsEl.innerHTML += `<span class="cover-img-chip hh">🍺 Happy Hour</span>`;
  }

  // ── Open/closed badge ──────────────────────────────────────
  (function() {
    const openEl = document.getElementById('js-cover-open');
    if (!B.hours || !B.hours.length) return;
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const now = new Date();
    const dayName = days[now.getDay()];
    const h = B.hours.find(x => (x.day||'').toLowerCase() === dayName);
    if (!h || h.closed) { openEl.textContent = '🔴 Closed Today'; openEl.style.display='block'; return; }
    if (h.open && h.close) {
      const toMin = s => { const [hh,mm] = s.replace(/[ap]m/,'').split(':').map(Number); return hh*60+(mm||0)+(s.includes('pm')&&hh!==12?720:0)-(s.includes('am')&&hh===12?720:0); };
      const cur = now.getHours()*60+now.getMinutes();
      const isOpen = cur >= toMin(h.open) && cur < toMin(h.close);
      openEl.textContent = isOpen ? `🟢 Open · closes ${h.close}` : `🔴 Closed · opens ${h.open}`;
      openEl.style.background = isOpen ? 'rgba(22,163,74,.88)' : 'rgba(220,38,38,.82)';
      openEl.style.display = 'block';
    }
  })();

  // ── Cover Slideshow ────────────────────────────────────────
  const slides = B.coverImages || [];
  const slidesEl = document.getElementById('js-slides');
  const dotsEl   = document.getElementById('js-dots');
  let currentSlide = 0;

  const coverCountEl = document.getElementById('js-cover-count');
  if (slides.length === 0) {
    slidesEl.innerHTML = `<div class="cover-slide active"></div>`;
    document.getElementById('js-prev').style.display = 'none';
    document.getElementById('js-next').style.display = 'none';
  } else {
    slides.forEach((src, i) => {
      slidesEl.innerHTML += `<div class="cover-slide${i===0?' active':''}"><img src="${src}" alt="${B.name} photo ${i+1}" loading="lazy" style="cursor:pointer" onclick="openPopup('gallery-popup')" onerror="this.parentElement.style.background='linear-gradient(135deg,#0c2d48,#1a4a6e)'"></div>`;
      if (slides.length > 1) dotsEl.innerHTML += `<button class="cover-dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`;
    });
    // Populate gallery with all cover images
    const galleryImages = slides.map((src, i) => ({ url: src, caption: `Photo ${i+1}` }));
    window.galleryImages = galleryImages;
    window.galleryCurrentPage = 0;
    if (slides.length === 1) {
      document.getElementById('js-prev').style.display = 'none';
      document.getElementById('js-next').style.display = 'none';
    } else {
      coverCountEl.style.display = 'block';
      coverCountEl.textContent = '1 / ' + slides.length;
    }
  }

  function goSlide(n) {
    currentSlide = (n + slides.length) % slides.length;
    document.querySelectorAll('.cover-slide').forEach((s,i) => s.classList.toggle('active', i === currentSlide));
    document.querySelectorAll('.cover-dot').forEach((d,i) => d.classList.toggle('active', i === currentSlide));
    if (slides.length > 1) coverCountEl.textContent = (currentSlide + 1) + ' / ' + slides.length;
  }
  document.getElementById('js-prev').onclick = () => goSlide(currentSlide - 1);
  document.getElementById('js-next').onclick = () => goSlide(currentSlide + 1);
  if (slides.length > 1) setInterval(() => goSlide(currentSlide + 1), 5000);

  // ── Header ─────────────────────────────────────────────────
  document.getElementById('js-emoji').textContent = B.emoji;
  document.getElementById('js-name').textContent  = B.name;

  const meta = document.getElementById('js-meta');
  if (B.tagline)      meta.innerHTML += `<span class="meta-item"><em>${B.tagline}</em></span>`;
  if (B.city)         meta.innerHTML += `<span class="meta-item">📍 ${B.city}, ${B.state}</span>`;
  if (B.phoneDisplay) meta.innerHTML += `<span class="meta-item">📞 ${B.phoneDisplay}</span>`;
  if (B.rating)       meta.innerHTML += `<span class="meta-item">⭐ ${B.rating}${B.reviewCount ? ' (' + B.reviewCount.toLocaleString() + ' reviews)' : ''}</span>`;

  const badges = document.getElementById('js-badges');
  (B.about.features || []).forEach(f => { badges.innerHTML += `<span class="badge">${f}</span>`; });

  const cta = document.getElementById('js-cta');
  if (B.phone)          cta.innerHTML += `<a href="tel:${B.phone}" class="btn btn-call">📞 Call Now</a>`;
  if (B.googleMaps)     cta.innerHTML += `<a href="${B.googleMaps}" target="_blank" class="btn btn-dir">📍 Directions</a>`;
  if (B.bookingUrl)     cta.innerHTML += `<a href="${B.bookingUrl}" target="_blank" class="btn btn-dir" style="background:#7c3aed;border-color:#7c3aed;">📅 Book Now</a>`;
  if (B.reservationUrl) cta.innerHTML += `<a href="${B.reservationUrl}" target="_blank" class="btn btn-call" style="background:#059669;border-color:#059669;">🍽️ Reserve a Table</a>`;
  if (B.orderUrl)       cta.innerHTML += `<a href="${B.orderUrl}" target="_blank" class="btn btn-web" style="background:#d97706;color:#fff;border-color:#d97706;">🛵 Order Online</a>`;
  if (B.website)        cta.innerHTML += `<a href="${B.website}" target="_blank" class="btn btn-web">🌐 Website</a>`;

  const social = document.getElementById('js-social');
  if (B.socialInstagram) social.innerHTML += `<a href="${B.socialInstagram.startsWith('http') ? B.socialInstagram : 'https://instagram.com/'+B.socialInstagram.replace('@','')}" target="_blank" class="social-btn" title="Instagram"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;
  if (B.socialFacebook)  social.innerHTML += `<a href="${B.socialFacebook}" target="_blank" class="social-btn" title="Facebook"><svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.514c-1.491 0-1.956.93-1.956 1.886v2.269h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg></a>`;
  if (B.socialTiktok)    social.innerHTML += `<a href="${B.socialTiktok.startsWith('http') ? B.socialTiktok : 'https://tiktok.com/@'+B.socialTiktok.replace('@','')}" target="_blank" class="social-btn" title="TikTok"><svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg></a>`;

  // ── Tabs ───────────────────────────────────────────────────
  const tabsEl = document.getElementById('js-tabs');
  B.sections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.dataset.id = sec.id;
    btn.textContent = (sec.icon ? sec.icon + ' ' : '') + sec.label;
    btn.onclick = () => {
      const target = sec.scrollTo || sec.id;
      const el = document.getElementById('sec-' + target);
      if (!el) return;
      const hdrH = getHeaderH ? getHeaderH() : 64;
      const tabH = stickyWrap ? stickyWrap.offsetHeight : 52;
      const top = el.getBoundingClientRect().top + window.scrollY - hdrH - tabH - 8;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    };
    tabsEl.appendChild(btn);
  });

  // ── Helper: menu category block ────────────────────────────
  function menuCatHTML(cat) {
    const isChips = cat.items.every(i => !i.price && !i.desc);
    let html = `<h3>${cat.category}</h3>`;
    if (cat.note) html += `<p class="note">${cat.note}</p>`;
    if (isChips) {
      html += `<div class="chips">${cat.items.map(i=>`<span class="chip">${i.name}</span>`).join('')}</div>`;
    } else {
      html += `<div class="menu-grid">${cat.items.map(i=>`
        <div class="item">
          <div class="name">${i.name}</div>
          ${i.desc  ? `<div class="desc">${i.desc}</div>` : ''}
          ${i.price ? `<div class="price">${i.price}</div>` : ''}
        </div>`).join('')}</div>`;
    }
    return html;
  }

  // ── Build Sections ─────────────────────────────────────────
  const container = document.getElementById('js-sections');

  B.sections.forEach(sec => {
    if (sec.scrollTo) return;
    const el = document.createElement('section');
    el.id = 'sec-' + sec.id;
    let html = `<div class="card"><h2>${sec.icon ? sec.icon + ' ' : ''}${sec.label}</h2>`;

    // barCat sections
    if (sec.barCat && B.barMenu) {
      const cat = B.barMenu.find(c => c.category === sec.barCat);
      if (cat) {
        el.innerHTML = `<div class="card"><h2>${sec.icon||''} ${sec.label}</h2>${menuCatHTML(cat)}</div>`;
        container.appendChild(el);
        return;
      }
    }

    // Handle food sections with type='food' and optional mealId
    if (sec.type === 'food' || sec.id.startsWith('meal-')) {
      html += '</div>';
      el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;

      // If this section has a specific mealId, show just that meal category
      if (sec.mealId && B.foodMenu) {
        const cat = B.foodMenu.find(c => c.meal === sec.mealId);
        if (cat) {
          el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`;
        }
      } else if (B.foodMenu) {
        // Otherwise show all food menu items
        B.foodMenu.forEach(cat => { el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`; });
      }
      container.appendChild(el); return;
    }

    switch (sec.id) {

      case 'about':
        if (B.about && B.about.description) html += `<p class="about-p">${B.about.description}</p>`;
        break;

      case 'tags':
        if (B.about?.features?.length) {
          html += `<div class="sub-label">Features</div><div class="tag-row">${B.about.features.map(f=>`<span class="tag">${f}</span>`).join('')}</div>`;
        }
        if (B.about?.perfectFor?.length) {
          html += `<div class="sub-label">Perfect For</div><div class="tag-row">${B.about.perfectFor.map(f=>`<span class="tag">${f}</span>`).join('')}</div>`;
        }
        if (B.tags?.length) {
          html += `<div class="sub-label">Categories</div><div class="tag-row">${B.tags.map(t=>`<span class="tag" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534;">${t}</span>`).join('')}</div>`;
        }
        break;

      case 'happy-hour':
        if (B.happyHour) {
          if (B.happyHour.schedule) html += `<div class="hh-time">🍺 ${B.happyHour.schedule}</div>`;
          (B.happyHour.deals || []).forEach(d => {
            html += `<div class="hh-row">
              <div><div class="hh-name">${d.name}</div>${d.desc?`<div class="hh-desc">${d.desc}</div>`:''}</div>
              ${d.price?`<div class="hh-price">${d.price}</div>`:''}
            </div>`;
          });
        }
        break;

      case 'highlights':
        if (B.highlights?.length) {
          html += `<ul style="margin:0;padding-left:0;display:grid;gap:10px;list-style:none">
            ${B.highlights.map(h=>`<li style="display:flex;gap:10px;font-size:14px;line-height:1.5"><span style="color:var(--accent);font-size:16px;flex-shrink:0">✦</span><span>${h}</span></li>`).join('')}
          </ul>`;
        }
        break;

      case 'restrictions':
        if (B.restrictions?.length) {
          html += `<ul style="margin:0;padding-left:18px;display:grid;gap:8px">
            ${B.restrictions.map(r=>`<li style="font-size:13px;color:var(--muted);line-height:1.5">${r}</li>`).join('')}
          </ul>`;
        }
        break;

      case 'specials':
        html += '</div>';
        (B.specials || []).forEach(s => {
          el.innerHTML += `<div class="special">
            ${s.badge?`<div class="special-badge">${s.badge}</div>`:''}
            <div><div class="special-name">${s.name}</div><div class="special-desc">${s.desc||''}</div></div>
          </div>`;
        });
        container.appendChild(el); return;

      case 'games':
        html += '</div>';
        el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
        (B.games || []).forEach(cat => {
          let catHTML = `<div class="card"><h3>${cat.category}</h3><div class="menu-grid">`;
          cat.items.forEach(i => { catHTML += `<div class="item"><div class="name">${i.name}</div>${i.desc?`<div class="desc">${i.desc}</div>`:''}</div>`; });
          catHTML += '</div></div>';
          el.innerHTML += catHTML;
        });
        container.appendChild(el); return;

      case 'packages':
        html += `</div><div class="pkg-grid">`;
        (B.packages || []).forEach(p => {
          html += `<div class="pkg">
            ${p.badge?`<div class="pkg-tag">${p.badge}</div>`:''}
            <div class="pkg-name">${p.name}</div>
            ${p.price?`<div class="pkg-price">${p.price}</div>`:''}
            ${p.duration?`<div class="pkg-dur">⏱ ${p.duration}</div>`:''}
            ${p.desc?`<div class="pkg-desc">${p.desc}</div>`:''}
          </div>`;
        });
        html += `</div>`;
        el.innerHTML = html;
        container.appendChild(el); return;

      case 'league':
        if (B.league) {
          const l = B.league;
          html += `${l.price?`<div class="league-price">${l.price}</div>`:''}
            ${l.schedule||l.format?`<div class="league-sched">📅 ${[l.schedule,l.format].filter(Boolean).join(' · ')}</div>`:''}
            ${l.desc?`<div class="league-desc">${l.desc}</div>`:''}
            <div class="perks">${(l.perks||[]).map(p=>`<span class="perk">✓ ${p}</span>`).join('')}</div>`;
        }
        break;

      case 'book-a-bay':
        if (B.bookABay) {
          const bay = B.bookABay;
          html += `<div class="bay">
            ${bay.price?`<div class="bay-price">${bay.price}</div>`:''}
            <div>
              ${bay.name?`<div class="bay-name">${bay.name}</div>`:''}
              ${bay.capacity?`<div class="bay-cap">👥 ${bay.capacity}</div>`:''}
              ${bay.desc?`<div class="bay-desc">${bay.desc}</div>`:''}
            </div>
          </div>`;
        }
        break;

      case 'events':
        (B.events || []).forEach(e => {
          html += `${e.badge?`<div class="evt-badge">${e.badge}</div>`:''}
            <div class="evt-name">${e.name}</div>
            ${e.desc?`<div class="evt-desc">${e.desc}</div>`:''}
            ${e.note?`<div class="evt-note">📌 ${e.note}</div>`:''}`;
        });
        break;

      case 'schedules': {
        html += '</div>';
        let schedHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;

        // Group schedules by ticket structure, dedupe duplicate times
        const ticketKey = s => JSON.stringify((s.tickets||[]).map(t => `${t.name}:${t.price}`).sort());
        const grouped = {};
        (B.schedules || []).forEach(s => {
          const key = ticketKey(s);
          if (!grouped[key]) grouped[key] = { times: new Set(), tickets: s.tickets || [] };
          if (s.time) grouped[key].times.add(s.time);
        });

        Object.values(grouped).forEach(group => {
          const times = [...group.times].join(', ');
          schedHTML += `<div class="card" style="margin-bottom:12px">
            <div style="margin-bottom:12px">
              <div style="font-size:16px;font-weight:800">${times}</div>
            </div>
            <div style="display:grid;gap:1px;border:1px solid var(--border);border-radius:8px;overflow:hidden">
              <div style="display:grid;grid-template-columns:1fr auto;padding:8px 12px;background:var(--chip);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">
                <span>Ticket Type</span><span>Price</span>
              </div>
              ${(group.tickets||[]).map(t=>`
              <div style="display:grid;grid-template-columns:1fr auto;padding:10px 12px;border-top:1px solid var(--border);background:#fff;font-size:14px">
                <span style="font-weight:600">${t.name}</span>
                <span style="font-weight:800;color:var(--accent)">$${t.price}</span>
              </div>`).join('')}
            </div>
          </div>`;
        });
        el.innerHTML = schedHTML;
        container.appendChild(el); return;
      }

      case 'gallery':
        html += `<button class="section-btn" onclick="openGallery()">
          <span>📸 View Photos (${(B.gallery||[]).length} photos)</span>
          <span class="section-btn-arrow">›</span>
        </button>`;
        break;

      case 'reviews':
        html += `<button class="section-btn" onclick="openReviews()">
          <span>⭐ Read Reviews (${(B.reviews||[]).length} reviews)</span>
          <span class="section-btn-arrow">›</span>
        </button>`;
        break;

      case 'hours':
        if (B.hours?.length) {
          const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
          html += `<ul class="hours">${B.hours.map(h=>`
            <li class="${h.day===today?'today':''}">
              <span class="day">${h.day}</span>
              <span class="time">${h.closed ? 'Closed' : (h.open||'')+(h.close?' – '+h.close:'')}</span>
            </li>`).join('')}</ul>`;
        }
        break;

      case 'location':
        html += `<div class="loc-addr">📍 ${B.address||''}<br>${[B.city,B.state,B.zip].filter(Boolean).join(', ')}</div>
          <div class="cta-row">
            ${B.googleMaps?`<a href="${B.googleMaps}" target="_blank" class="btn btn-dir">📍 Get Directions</a>`:''}
            ${B.phone?`<a href="tel:${B.phone}" class="btn btn-call">📞 ${B.phoneDisplay||B.phone}</a>`:''}
            ${B.website?`<a href="${B.website}" target="_blank" class="btn btn-web">🌐 Website</a>`:''}
          </div>`;
        break;

      case 'activities':
        (B._activities || []).forEach(a => {
          html += `<div class="card" style="margin-bottom:8px">
            <div style="font-weight:700;font-size:15px">${a.activity_name}</div>
            ${a.activity_type ? `<div style="font-size:12px;color:var(--accent);font-weight:600;margin-top:2px">${a.activity_type.replace(/_/g,' ')}</div>` : ''}
            ${a.description ? `<div style="font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5">${a.description}</div>` : ''}
            <div style="display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--muted)">
              ${a.duration ? `<span>⏱ ${a.duration}</span>` : ''}
              ${a.min_age ? `<span>👤 Ages ${a.min_age}+</span>` : ''}
              ${a.max_capacity ? `<span>👥 Max ${a.max_capacity}</span>` : ''}
            </div>
          </div>`;
        });
        break;

      case 'fleet':
        html += `<div class="menu-grid">`;
        (B._fleet || []).forEach(f => {
          html += `<div class="item">
            <div class="name">${f.item_name}</div>
            ${f.description ? `<div class="desc">${f.description}</div>` : ''}
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;font-size:12px;color:var(--muted)">
              ${f.capacity ? `<span>👥 Capacity: ${f.capacity}</span>` : ''}
              ${f.weight ? `<span>⚖️ ${f.weight}</span>` : ''}
              ${f.dimensions ? `<span>📐 ${f.dimensions}</span>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
        break;

      case 'addons':
        html += `<div class="menu-grid">`;
        (B._addons || []).forEach(a => {
          const price = a.price_min != null && a.price_max != null ? `$${a.price_min}–$${a.price_max}` : a.price != null ? `$${a.price}` : '';
          html += `<div class="item">
            <div class="name">${a.addon_name}</div>
            ${a.description ? `<div class="desc">${a.description}</div>` : ''}
            <div style="display:flex;justify-content:space-between;margin-top:6px">
              ${price ? `<span class="price">${price}</span>` : ''}
              ${a.price_type === 'included' ? `<span style="font-size:12px;background:#f0fdf4;color:#166534;border-radius:999px;padding:2px 8px;font-weight:700">Included</span>` : ''}
            </div>
          </div>`;
        });
        html += `</div>`;
        break;

      case 'included':
        html += `<ul style="margin:0;padding-left:0;list-style:none;display:grid;gap:8px">`;
        (B._included || []).forEach(i => {
          html += `<li style="display:flex;gap:10px;font-size:14px;line-height:1.5"><span style="color:#22c55e;font-weight:800">✓</span><div><strong>${i.item_name}</strong>${i.description ? '<br><span style="color:var(--muted);font-size:13px">'+i.description+'</span>' : ''}</div></li>`;
        });
        html += `</ul>`;
        break;

      case 'requirements': {
        const seenReq = new Set();
        html += `<ul style="margin:0;padding-left:18px;display:grid;gap:8px">`;
        (B._requirements || []).forEach(r => {
          const norm = (r.requirement_text||'').trim().toLowerCase().replace(/\s+/g,' ');
          if (!norm || seenReq.has(norm)) return;
          seenReq.add(norm);
          html += `<li style="font-size:14px;color:var(--muted);line-height:1.5">${r.requirement_text}</li>`;
        });
        html += `</ul>`;
        break;
      }

      case 'policies': {
        const seenPol = new Set();
        (B._policies || []).forEach(p => {
          const norm = (p.policy_text||'').trim().toLowerCase().replace(/\s+/g,' ');
          if (!norm || seenPol.has(norm)) return;
          seenPol.add(norm);
          html += `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            ${p.policy_type ? `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px">${p.policy_type.replace(/_/g,' ')}</div>` : ''}
            <div style="font-size:14px;color:var(--muted);line-height:1.6">${p.policy_text}</div>
          </div>`;
        });
        break;
      }

      case 'meetingpoint': {
        const mp = B._meetingPoint || {};
        html += `${mp.location_name ? `<div style="font-weight:700;font-size:16px;margin-bottom:8px">${mp.location_name}</div>` : ''}
          ${mp.address ? `<div style="font-size:14px;color:var(--muted);margin-bottom:8px">📍 ${mp.address}</div>` : ''}
          ${mp.parking_info ? `<div style="font-size:13px;margin-bottom:6px"><strong>Parking:</strong> ${mp.parking_info}</div>` : ''}
          ${mp.checkin_instructions ? `<div style="font-size:13px;margin-bottom:6px"><strong>Check-in:</strong> ${mp.checkin_instructions}</div>` : ''}
          ${mp.what_to_bring ? `<div style="font-size:13px;margin-bottom:6px"><strong>What to Bring:</strong> ${mp.what_to_bring}</div>` : ''}`;
        break;
      }

      case 'qna': {
        const grouped = {};
        (B._qna || []).forEach(q => {
          const label = q.section_label || 'FAQ';
          if (!grouped[label]) grouped[label] = [];
          grouped[label].push(q);
        });
        Object.entries(grouped).forEach(([label, items]) => {
          html += `<h3>${label}</h3>`;
          items.forEach(q => {
            html += `<div style="margin-bottom:14px">
              <div style="font-weight:700;font-size:14px;margin-bottom:4px">${q.question}</div>
              ${q.answer ? `<div style="font-size:13px;color:var(--muted);line-height:1.6">${q.answer}</div>` : ''}
            </div>`;
          });
        });
        break;
      }

      default: {
        // Universal: any section key with grouped_items renders here
        const mealId = sec.mealId || sec.id.replace('meal-','');
        const mealCats = (B.foodMenu || []).filter(cat => cat.meal === mealId);
        if (mealCats.length > 0) {
          html += '</div>';
          el.innerHTML = `<h2 style="padding:0 4px 8px;font-size:22px">${sec.icon||''} ${sec.label}</h2>`;
          mealCats.forEach(cat => { el.innerHTML += `<div class="card">${menuCatHTML(cat)}</div>`; });
          container.appendChild(el); return;
        }
        // barCat fallback
        if (sec.barCat && B.barMenu) {
          const cat = B.barMenu.find(c => c.category === sec.barCat);
          if (cat) { el.innerHTML = `<div class="card"><h2>${sec.icon||''} ${sec.label}</h2>${menuCatHTML(cat)}</div>`; container.appendChild(el); return; }
        }
        break;
      }
    }

    html += '</div>';
    el.innerHTML = html;
    container.appendChild(el);
  });

  // ── Sticky tab bar (JS-driven, works in all browsers) ────────
  const stickyWrap = document.querySelector('.sticky-wrap');
  const stickyPlaceholder = document.createElement('div');
  stickyPlaceholder.style.display = 'none';
  stickyWrap.parentNode.insertBefore(stickyPlaceholder, stickyWrap);

  function getHeaderH() {
    const hdr = document.querySelector('.gcr-header');
    return hdr ? hdr.getBoundingClientRect().bottom : 64;
  }

  let isFixed = false;

  function updateSticky() {
    if (!stickyWrap) return;
    const HEADER_H = getHeaderH();
    const navH = stickyWrap.offsetHeight;
    const triggerY = isFixed
      ? stickyPlaceholder.getBoundingClientRect().top + window.scrollY
      : stickyWrap.getBoundingClientRect().top + window.scrollY;

    if (!isFixed && window.scrollY + HEADER_H >= triggerY) {
      const rect = stickyWrap.getBoundingClientRect();
      stickyPlaceholder.style.cssText = `display:block;height:${navH}px;`;
      stickyWrap.style.cssText = `position:fixed;top:${HEADER_H}px;left:${rect.left}px;width:${rect.width}px;z-index:998;`;
      isFixed = true;
    } else if (isFixed && window.scrollY + HEADER_H < stickyPlaceholder.getBoundingClientRect().top + window.scrollY) {
      stickyWrap.style.cssText = '';
      stickyPlaceholder.style.cssText = 'display:none;';
      isFixed = false;
    }
  }

  window.addEventListener('scroll', updateSticky, { passive: true });
  window.addEventListener('resize', () => { isFixed = false; stickyWrap.style.cssText=''; stickyPlaceholder.style.cssText='display:none;'; updateSticky(); }, { passive: true });

  // ── Scroll spy ─────────────────────────────────────────────
  const tabs = document.querySelectorAll('.tab');
  const SCROLL_OFFSET = getHeaderH() + (stickyWrap ? stickyWrap.offsetHeight : 52);
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id.replace('sec-','');
        tabs.forEach(t => t.classList.toggle('active', t.dataset.id === id));
        document.querySelector(`.tab[data-id="${id}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      }
    });
  }, { threshold: 0.15, rootMargin: `-${SCROLL_OFFSET}px 0px 0px 0px` });

  document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
  if (tabs[0]) tabs[0].classList.add('active');

  // ── Gallery Popup ──────────────────────────────────────────
  const GALLERY_PER_PAGE = 10;
  let galleryCurrentPage = 0;
  const galleryImages = B.gallery || [];

  window.openGallery = function() {
    galleryCurrentPage = 0; renderGallery();
    document.getElementById('gallery-popup').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.galleryPage = function(dir) { galleryCurrentPage += dir; renderGallery(); };
  function renderGallery() {
    const grid = document.getElementById('gallery-grid');
    const total = galleryImages.length;
    const totalPages = Math.max(1, Math.ceil(total / GALLERY_PER_PAGE));
    galleryCurrentPage = Math.max(0, Math.min(galleryCurrentPage, totalPages - 1));
    const page = galleryImages.slice(galleryCurrentPage * GALLERY_PER_PAGE, (galleryCurrentPage + 1) * GALLERY_PER_PAGE);
    grid.innerHTML = page.length === 0
      ? `<div class="no-content" style="grid-column:1/-1">No photos added yet.</div>`
      : page.map(img=>`<div><img class="gallery-img" src="${img.url}" alt="${img.caption||''}" loading="lazy" onerror="this.style.background='#ddd'">${img.caption?`<div class="gallery-caption">${img.caption}</div>`:''}</div>`).join('');
    document.getElementById('gallery-page-info').textContent = total > 0 ? `Page ${galleryCurrentPage+1} of ${totalPages}` : '';
    document.getElementById('gallery-prev-btn').disabled = galleryCurrentPage === 0;
    document.getElementById('gallery-next-btn').disabled = galleryCurrentPage >= totalPages - 1;
  }

  // ── Reviews Popup ──────────────────────────────────────────
  const REVIEWS_PER_PAGE = 10;
  let reviewsCurrentPage = 0;
  const allReviews = B.reviews || [];

  window.openReviews = function() {
    reviewsCurrentPage = 0; renderReviews();
    document.getElementById('reviews-popup').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.reviewsPage = function(dir) { reviewsCurrentPage += dir; renderReviews(); };
  function renderReviews() {
    const list = document.getElementById('reviews-list');
    const total = allReviews.length;
    const totalPages = Math.max(1, Math.ceil(total / REVIEWS_PER_PAGE));
    reviewsCurrentPage = Math.max(0, Math.min(reviewsCurrentPage, totalPages - 1));
    const page = allReviews.slice(reviewsCurrentPage * REVIEWS_PER_PAGE, (reviewsCurrentPage + 1) * REVIEWS_PER_PAGE);
    list.innerHTML = page.length === 0
      ? `<div class="no-content">No reviews added yet.</div>`
      : page.map(r=>`<div class="review-card">
          <div class="review-top"><span class="review-author">${r.author||'Guest'}</span><span class="review-date">${r.date||''}</span></div>
          <div class="review-stars">${'★'.repeat(r.rating||5)}${'☆'.repeat(5-(r.rating||5))}</div>
          <div class="review-text">${r.text||''}</div>
        </div>`).join('');
    document.getElementById('reviews-page-info').textContent = total > 0 ? `Page ${reviewsCurrentPage+1} of ${totalPages}` : '';
    document.getElementById('reviews-prev-btn').disabled = reviewsCurrentPage === 0;
    document.getElementById('reviews-next-btn').disabled = reviewsCurrentPage >= totalPages - 1;
  }

  // ── Close popups ───────────────────────────────────────────
  window.closePopup = function(id) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  };
  document.querySelectorAll('.popup-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) closePopup(overlay.id); });
  });

})();
</script>
<script>
function updateHeaderVar() {
  const h = document.querySelector('.gcr-header');
  if (h) document.documentElement.style.setProperty('--header-h', Math.ceil(h.getBoundingClientRect().height) + 'px');
}
document.addEventListener('DOMContentLoaded', updateHeaderVar);
window.addEventListener('load', updateHeaderVar);
window.addEventListener('resize', updateHeaderVar);
</script>
<script src="js/claim-modal.js"></script>
</body>
</html>
