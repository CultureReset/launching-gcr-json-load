<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rental – Gulf Coast Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Inter', system-ui, sans-serif; background: #f4f6f9; color: #0e1726; }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    .top-nav { background: #0b1f3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-logo { color: #fff; font-weight: 900; font-size: 1.1rem; letter-spacing: .5px; }
    .nav-logo span { color: #38bdf8; }
    .nav-back { color: #94a3b8; font-size: .85rem; font-weight: 600; cursor: pointer; }
    .nav-back:hover { color: #fff; }

    /* ── HERO ── */
    .hero { position: relative; min-height: 480px; background: linear-gradient(135deg, #0c2d48, #0b4f78); display: flex; align-items: center; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; opacity: .15; font-size: 18rem; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .hero-content { position: relative; z-index: 2; max-width: 680px; padding: 60px 32px; }
    .hero-badge { display: inline-block; background: rgba(56,189,248,.2); color: #38bdf8; border: 1px solid rgba(56,189,248,.4); font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; padding: 5px 14px; border-radius: 999px; margin-bottom: 16px; }
    .hero-title { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; color: #fff; line-height: 1.15; margin-bottom: 14px; }
    .hero-sub { font-size: 1rem; color: rgba(255,255,255,.75); line-height: 1.7; margin-bottom: 28px; max-width: 520px; }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .hero-btn-primary { background: #0b7a75; color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-family: inherit; font-size: .95rem; font-weight: 800; cursor: pointer; transition: background .2s; }
    .hero-btn-primary:hover { background: #096560; }
    .hero-btn-secondary { background: rgba(255,255,255,.1); color: #fff; border: 1.5px solid rgba(255,255,255,.3); padding: 14px 28px; border-radius: 12px; font-family: inherit; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .2s; }
    .hero-btn-secondary:hover { background: rgba(255,255,255,.2); }

    /* ── HERO STATS ── */
    .hero-stats { position: absolute; bottom: 0; right: 0; display: flex; background: rgba(0,0,0,.35); backdrop-filter: blur(8px); border-radius: 16px 0 0 0; overflow: hidden; }
    .hero-stat { padding: 18px 24px; text-align: center; border-left: 1px solid rgba(255,255,255,.1); }
    .hero-stat:first-child { border-left: none; }
    .hero-stat-val { font-size: 1.5rem; font-weight: 900; color: #fff; }
    .hero-stat-lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: rgba(255,255,255,.6); margin-top: 2px; font-weight: 600; }
    @media (max-width: 600px) { .hero-stats { position: relative; width: 100%; border-radius: 0; } .hero { min-height: auto; } }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

    /* ── SECTION ── */
    .section { background: #fff; border-radius: 16px; padding: 28px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
    .section-title { font-size: 1.05rem; font-weight: 800; color: #0b1f3a; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .section-sub { font-size: .85rem; color: #64748b; margin-top: -14px; margin-bottom: 20px; }

    /* ── FLEET GRID ── */
    .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .fleet-card { border: 1.5px solid #e2e8f0; border-radius: 16px; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
    .fleet-card:hover { border-color: #0b7a75; box-shadow: 0 4px 20px rgba(11,122,117,.12); }
    .fleet-card-img { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 5rem; background: linear-gradient(135deg, #0c2d48, #1a5276); position: relative; }
    .fleet-card-badge { position: absolute; top: 12px; left: 12px; background: #0b7a75; color: #fff; font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 10px; border-radius: 999px; }
    .fleet-card-cap { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.5); color: #fff; font-size: .75rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
    .fleet-card-body { padding: 18px; background: #fff; }
    .fleet-card-name { font-size: 1.05rem; font-weight: 900; color: #0b1f3a; margin-bottom: 6px; }
    .fleet-card-desc { font-size: .82rem; color: #64748b; line-height: 1.6; margin-bottom: 16px; }
    .fleet-card-specs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .spec-chip { background: #f1f5f9; color: #475569; font-size: .75rem; font-weight: 600; padding: 4px 10px; border-radius: 999px; }

    /* Pricing table */
    .price-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    .price-table th { font-size: .68rem; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; font-weight: 700; padding: 6px 8px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    .price-table td { padding: 8px 8px; font-size: .85rem; border-bottom: 1px solid #f8fafc; }
    .price-table tr:last-child td { border-bottom: none; }
    .price-table .price-val { font-weight: 800; color: #0b7a75; }
    .price-table .price-slot { font-weight: 600; color: #334155; }
    .price-table .price-time { font-size: .75rem; color: #94a3b8; }

    .fleet-book-btn { width: 100%; background: #0b7a75; color: #fff; border: none; border-radius: 10px; padding: 12px; font-family: inherit; font-size: .9rem; font-weight: 800; cursor: pointer; transition: background .2s; }
    .fleet-book-btn:hover { background: #096560; }

    /* ── INCLUDED ── */
    .included-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .included-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; }
    .included-icon { font-size: 1.3rem; flex-shrink: 0; }
    .included-name { font-size: .83rem; font-weight: 700; color: #166534; }

    /* ── ADD-ONS ── */
    .addons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .addon-card { border: 1.5px solid #e2e8f0; border-radius: 14px; padding: 18px; background: #f8fafc; display: flex; gap: 14px; align-items: flex-start; }
    .addon-icon { font-size: 2rem; flex-shrink: 0; }
    .addon-name { font-weight: 800; font-size: .9rem; color: #0b1f3a; margin-bottom: 4px; }
    .addon-desc { font-size: .78rem; color: #64748b; line-height: 1.5; margin-bottom: 8px; }
    .addon-price { font-size: .85rem; font-weight: 800; color: #0b7a75; }
    .addon-promo { display: inline-block; background: #fef3c7; color: #92400e; font-size: .68rem; font-weight: 800; text-transform: uppercase; padding: 3px 8px; border-radius: 999px; margin-top: 4px; }

    /* ── HOW IT WORKS ── */
    .steps { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .step { text-align: center; padding: 20px 16px; }
    .step-num { width: 44px; height: 44px; border-radius: 50%; background: #0b1f3a; color: #fff; font-size: 1.1rem; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .step-icon { font-size: 1.6rem; margin-bottom: 10px; }
    .step-title { font-size: .9rem; font-weight: 800; color: #0b1f3a; margin-bottom: 6px; }
    .step-desc { font-size: .78rem; color: #64748b; line-height: 1.6; }

    /* ── PHOTO GALLERY ── */
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    .gallery-thumb { aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; }
    .gallery-thumb .ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; background: linear-gradient(135deg, #dbeafe, #eff6ff); transition: transform .2s; }
    .gallery-thumb:hover .ph { transform: scale(1.05); }

    /* ── REVIEWS ── */
    .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .review-card { border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; background: #f8fafc; }
    .rev-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .rev-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #0b7a75, #38bdf8); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: .9rem; flex-shrink: 0; }
    .rev-name { font-weight: 700; font-size: .88rem; color: #0b1f3a; }
    .rev-date { font-size: .74rem; color: #94a3b8; }
    .rev-stars { color: #f59e0b; font-size: .88rem; margin-bottom: 8px; }
    .rev-text { font-size: .83rem; color: #475569; line-height: 1.65; }

    /* ── INFO COLUMNS ── */
    .info-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 640px) { .info-two-col { grid-template-columns: 1fr; } }
    .info-block-title { font-size: .8rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: #94a3b8; margin-bottom: 12px; }
    .info-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: .87rem; color: #475569; }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 1rem; width: 20px; flex-shrink: 0; text-align: center; margin-top: 1px; }
    .info-label { font-weight: 600; color: #0b1f3a; min-width: 70px; }

    /* ── MAP ── */
    .map-ph { width: 100%; height: 220px; border-radius: 14px; background: linear-gradient(135deg, #dbeafe, #bfdbfe); display: flex; align-items: center; justify-content: center; font-size: .9rem; color: #3b82f6; font-weight: 700; gap: 8px; }

    /* ── STICKY BOOK BAR ── */
    .book-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0b1f3a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; z-index: 99; box-shadow: 0 -4px 20px rgba(0,0,0,.2); }
    .book-bar-info { color: #fff; }
    .book-bar-name { font-size: .85rem; font-weight: 800; }
    .book-bar-price { font-size: .78rem; color: #94a3b8; margin-top: 2px; }
    .book-bar-btn { background: #0b7a75; color: #fff; border: none; padding: 12px 28px; border-radius: 10px; font-family: inherit; font-size: .9rem; font-weight: 800; cursor: pointer; white-space: nowrap; transition: background .2s; }
    .book-bar-btn:hover { background: #096560; }
    .book-bar-phone { color: #38bdf8; font-weight: 700; font-size: .85rem; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  
    @media (max-width: 480px) {
      .carousel { height: 220px; }
      .car-hero { bottom: 16px; left: 16px; right: 16px; }
      .car-hero-name { font-size: 1.4rem; }
      .section { padding: 14px; border-radius: 12px; }
      .page-wrap { padding: 14px 12px 90px; }
      .action-bar { padding: 0 8px; }
      .action-tab { padding: 12px 14px; font-size: .78rem; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .hh-banner { padding: 14px; }
      .hh-icon { font-size: 1.6rem; }
      .biz-filter { padding: 0 8px; }
      .biz-filter-btn { padding: 7px 14px; font-size: .78rem; }
      .stats-bar { flex-wrap: wrap; gap: 8px; padding: 14px; }
      .stat-item { min-width: 80px; }
      .fleet-card { padding: 16px; }
      .price-row { font-size: .78rem; }
      .book-bar { padding: 12px 16px; }
      .top-nav { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="nav-logo">GULF<span>COAST</span>RADAR</div>
    <span class="nav-back" onclick="history.back()">← Back to listings</span>
  </nav>

  <!-- HERO -->
  <div class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-content">
      <div class="hero-badge" id="heroBadge">Rentals</div>
      <div class="hero-title" id="heroTitle">Loading...</div>
      <div class="hero-sub" id="heroSub"></div>
      <div class="hero-btns">
        <button class="hero-btn-primary" onclick="document.getElementById('fleet').scrollIntoView({behavior:'smooth'})">View Rentals & Pricing</button>
        <button class="hero-btn-secondary" onclick="document.getElementById('howItWorks').scrollIntoView({behavior:'smooth'})">How It Works</button>
      </div>
    </div>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="page-wrap">

    <!-- FLEET -->
    <div class="section" id="fleet">
      <div class="section-title">🚤 Our Fleet</div>
      <div class="fleet-grid" id="fleetGrid"></div>
    </div>

    <!-- WHAT'S INCLUDED -->
    <div class="section">
      <div class="section-title">✅ What's Included</div>
      <div class="included-grid" id="includedGrid"></div>
    </div>

    <!-- ADD-ONS -->
    <div class="section" id="addons">
      <div class="section-title">➕ Add-Ons & Extras</div>
      <div class="section-sub" id="addonPromo"></div>
      <div class="addons-grid" id="addonsGrid"></div>
    </div>

    <!-- HOW IT WORKS -->
    <div class="section" id="howItWorks">
      <div class="section-title">⚡ How It Works</div>
      <div class="steps" id="stepsGrid"></div>
    </div>

    <!-- GALLERY -->
    <div class="section">
      <div class="section-title">📸 Gallery</div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- REVIEWS -->
    <div class="section">
      <div class="section-title">⭐ Guest Reviews</div>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
        <div style="font-size:2.8rem;font-weight:900;color:#0b1f3a;" id="revScore">–</div>
        <div>
          <div style="color:#f59e0b;font-size:1.1rem;" id="revStars"></div>
          <div style="font-size:.8rem;color:#94a3b8;margin-top:2px;" id="revCount"></div>
        </div>
      </div>
      <div class="reviews-grid" id="reviewsGrid"></div>
    </div>

    <!-- INFO + LOCATION -->
    <div class="section">
      <div class="section-title">📍 Location & Hours</div>
      <div class="map-ph" style="margin-bottom:20px;">🗺️ Interactive Map</div>
      <div class="info-two-col">
        <div>
          <div class="info-block-title">Contact & Hours</div>
          <div id="infoContact"></div>
        </div>
        <div>
          <div class="info-block-title">Location Details</div>
          <div id="infoLocation"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- STICKY BOOK BAR -->
  <div class="book-bar">
    <div class="book-bar-info">
      <div class="book-bar-name" id="barName">Book a Rental</div>
      <div class="book-bar-price" id="barPrice">Starting from $–</div>
    </div>
    <div class="book-bar-phone" id="barPhone" onclick="handleCall()">📞 Call</div>
    <button class="book-bar-btn" id="bookBtn" onclick="handleBook()">Book Now →</button>
  </div>

  <script>
    (function() {
      const slug = new URLSearchParams(window.location.search).get('slug') || 'beachside-circle-boats';
      const s = document.createElement('script');
      s.src = 'data/' + slug + '.js';
      s.onload = function() {
        const d = window.BUSINESS_DATA;
        render(d);
        if (!d.bookingUrl) { const b = document.getElementById('bookBtn'); if(b) b.style.display='none'; }
      };
      document.head.appendChild(s);
    })();
  </script>
  <script>
    let RENTAL;

    // ── RENDER ─────────────────────────────────────────────────────
    function render(data) {
      RENTAL = data;
      const R = data;
      document.title = R.name + ' – Gulf Coast Radar';
      document.getElementById('heroBadge').textContent = R.badge;
      document.getElementById('heroTitle').textContent = R.tagline;
      document.getElementById('heroSub').textContent   = R.description;
      document.getElementById('heroBg').textContent    = R.heroEmoji;
      document.getElementById('barName').textContent   = R.name;
      document.getElementById('barPrice').textContent  = 'Starting from $' + R.priceFrom;
      document.getElementById('barPhone').innerHTML    = '📞 ' + R.phone;
      document.getElementById('revScore').textContent  = R.rating.toFixed(1);
      document.getElementById('revStars').textContent  = '★'.repeat(Math.round(R.rating)) + '☆'.repeat(5 - Math.round(R.rating));
      document.getElementById('revCount').textContent  = R.reviewCount + ' Google reviews';

      // Hero stats
      R.stats.forEach(s => {
        document.getElementById('heroStats').innerHTML +=
          `<div class="hero-stat"><div class="hero-stat-val">${s.val}</div><div class="hero-stat-lbl">${s.lbl}</div></div>`;
      });

      // Fleet
      R.fleet.forEach(b => {
        const rows = b.pricing.map(p =>
          `<tr><td class="price-slot">${p.slot}<br><span class="price-time">${p.time}</span></td><td class="price-val">${p.price}</td></tr>`
        ).join('');
        document.getElementById('fleetGrid').innerHTML +=
          `<div class="fleet-card">
            <div class="fleet-card-img">
              ${b.emoji}
              <span class="fleet-card-badge">${b.badge}</span>
              <span class="fleet-card-cap">👥 ${b.capacity}</span>
            </div>
            <div class="fleet-card-body">
              <div class="fleet-card-name">${b.name}</div>
              <div class="fleet-card-desc">${b.desc}</div>
              <div class="fleet-card-specs">${b.specs.map(s => `<span class="spec-chip">${s}</span>`).join('')}</div>
              <table class="price-table">
                <thead><tr><th>Time Slot</th><th>Price</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
              <button class="fleet-book-btn" onclick="handleBook('${b.name}')">Book ${b.name} →</button>
            </div>
          </div>`;
      });

      // Included
      R.included.forEach(i => {
        document.getElementById('includedGrid').innerHTML +=
          `<div class="included-item"><span class="included-icon">${i.icon}</span><span class="included-name">${i.name}</span></div>`;
      });

      // Add-ons
      if (R.addons.some(a => a.promo))
        document.getElementById('addonPromo').textContent = '🎉 ' + R.addons.find(a => a.promo).promo;
      R.addons.forEach(a => {
        document.getElementById('addonsGrid').innerHTML +=
          `<div class="addon-card">
            <div class="addon-icon">${a.icon}</div>
            <div>
              <div class="addon-name">${a.name}</div>
              <div class="addon-desc">${a.desc}</div>
              <div class="addon-price">${a.price}</div>
              ${a.promo ? `<span class="addon-promo">${a.promo}</span>` : ''}
            </div>
          </div>`;
      });

      // Steps
      R.steps.forEach(s => {
        document.getElementById('stepsGrid').innerHTML +=
          `<div class="step">
            <div class="step-num">${s.num}</div>
            <div class="step-icon">${s.icon}</div>
            <div class="step-title">${s.title}</div>
            <div class="step-desc">${s.desc}</div>
          </div>`;
      });

      // Gallery
      R.gallery.forEach(g => {
        document.getElementById('galleryGrid').innerHTML +=
          `<div class="gallery-thumb"><div class="ph">${g.emoji}</div></div>`;
      });

      // Reviews
      R.reviews.forEach(r => {
        document.getElementById('reviewsGrid').innerHTML +=
          `<div class="review-card">
            <div class="rev-top"><div class="rev-avatar">${r.initials}</div><div><div class="rev-name">${r.name}</div><div class="rev-date">${r.date}</div></div></div>
            <div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
            <div class="rev-text">${r.text}</div>
          </div>`;
      });

      // Contact
      const contact = document.getElementById('infoContact');
      R.hours.forEach(h => {
        contact.innerHTML += `<div class="info-row"><span class="info-icon">🕐</span><span class="info-label">${h.day}</span><span>${h.time}</span></div>`;
      });
      contact.innerHTML += `<div class="info-row"><span class="info-icon">📞</span><span class="info-label">Phone</span><span>${R.phone}</span></div>`;
      contact.innerHTML += `<div class="info-row"><span class="info-icon">✉️</span><span class="info-label">Email</span><span>${R.email}</span></div>`;

      // Location
      const loc = document.getElementById('infoLocation');
      R.location.forEach(l => {
        loc.innerHTML += `<div class="info-row"><span class="info-icon">${l.icon}</span><span>${l.label}</span></div>`;
      });
    }

    // ── ACTIONS ────────────────────────────────────────────────────
    function handleBook(item) { if (RENTAL.bookingUrl) window.open(RENTAL.bookingUrl, '_blank'); }
    function handleCall()     { window.location.href = 'tel:' + RENTAL.phone; }

  </script>
</body>
</html>
